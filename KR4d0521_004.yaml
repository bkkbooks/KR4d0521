body:
  text: 筠軒集卷四元唐元撰七言古詩桐江舟行翫月作平生慣賞山中月胡床穏坐依林樾小池雲影自去來山風吹衣冷到骨閉門亦知江海大政坐信書生白髮今年八月買扁舟卧看銀濤浮玉闕光涵萬丈驚潛虬寒逼千巖聴栖鶻天公賜我一段竒鼓枻中流從傲兀百年知已喜在眼皓彩陸離殊未歇蓬瀛仙子今在無亦欲乗風徑趨謁是行已拚幾大醉願挹北斗斟溟渤倚篷假寐待微醒船人屢報晨星沒見雪吟兒時見雪喜欲顛刻畫素猊自矜巧皚皚庭樹窺百回直疑天地不愛寶中年聞雪意凄然無衣無褐兒滿前挩蔬盈掬闕甘㫖束薪不辦晨炊煙白駒在谷鷹在鞲山中之人胡淹留長夜歌殘白石爛杜陵茅屋風颼颼孟使君游黄山温泉歌吾聞古初未鑿混沌竅水火之精化𤣥武扶桑十日爍天地鱗毛渇死走無所帝令二物居神池權衡七宿圖書府人言坎裏陽泉翻豈識離中隂火煮祝融鼓氣𤣥㝠合一竇丹砂沸千古使君紫馬苕霅來三生石上精神開懸崖絶棧不畏險杖扶石齒縁莓苔猿猱起舞虎豹遁三竿瑞日升蓬萊臨流解帶一湔祓清飇微動朱波迴暖騰黍谷非律吕雷從地復常胚胎千崖滴翠管迎送浮邱仙人揮酒盃謂侯骨相貴且壽姓字久矣標丹臺寧從博局爛馬䇿懶共冠蓋爭衢埃千齡竒事一朝取新詩磊落收瓊瑰尚憐拘官計日月重遊有約登崔嵬聞角辭山月未墮窺牕明霜風掠户簷鈴驚城頭吹角山月墮此時凄切難為情荒涼天地角聲老朱顔未幾白髮生角聲無情聴自苦多少征人念鄉土豈如年少聞角時擁衾熟睡心不悲次韻黄總管十一月望月蝕天門虎豹猛莫當二十八宿森其旁妖蟇輪囷怒腹强敢負膽氣吞蟾光山城霜冷夜未央髙人起視懷感傷月中老桂千丈長古人往矣遥相望吳剛斫桂月窟藏曷不斧彼妖蟇亡天人受職鳴琳琅樞機萬象分低昂誅蟇投畀無何鄉專車骨粉令風揚月行九道邦家昌天盲不復求醫王題何生江天疊嶂圖我生無封侯之骨相萬里成功勳又不能飛鷹走狗洒血看繽紛白頭兀兀據書几昕昏童穉嗟為羣長廊盡日絶人迹西曛焮熱氣如焚授書過午暍欲死冰盤雪藕誰見分眼明忽閱何郎畫萬疊江山心為快爭先蕩槳向中流無復求魚有餘嘬摧頽兩翁似偶語傴僂癡童攜一介驅驢下坂太凌兢尚憶邛郲行者戒因嗟吾人受形役百嵗膏煎棲大塊看君所畫亦勞生未辨脫身塵土界不如學取巖前樹鐵榦銅柯烟雨挂日月成丸弄豈休苔蘚為衣色不壞枯榮暗與世推移擁腫可逃人睚眦莫言與語不㸃頭樹若㸃頭吾即拜願將此意商西風祗恐傍觀猶未解趙與春逺遊贈别阿翁抱器鬚眉蒼見客布武聲琅琅汪祠醉墨龍鳳翥壯士讀之増慨慷至今蕭齋兩大字風雨不動生神光月梁誤喜承翁面化劍上天留帝旁郎君翩然慰岑寂袖攜滕句秋瑟瑟看君身榦如翁長岐經孔思填胷香敬亭清嘯鳳臺去想見白雲思故鄉近有同舍嘲余頭童齒豁者次孫阿彬生齒喜而有作阿彬生齒涎滿頤稍能學步縁堦墀老翁攤書讀且倦時復提抱相遨嬉翁方齒落汝不知為汝而喜吾自悲朝來舉櫛髮如絲頗被年少相輕欺願君朱顔常保守莫見齒髮當衰時奉題御史四忠詩卷五華臺土漬膏脂諫疏明朝上玉墀駢死難逃時宰譖兩賢甘作楚囚悲朝廷公道初開日墓隧哀榮無已時萬里生還承寵渥旌忠正在挈民彞御史之官帝耳目直言不畏龍鱗觸動摇山嶽亦雄哉紛紛佞臣總奴僕華臺寶刹切雲髙汗流滴土嗟民勞寧使臣身伏斧鉞天王聖明容可逃雷霆奮怒那回笑爭相為死交相弔倉黄逺謫塞沙寒悵望虎闗誰與叫忠肝義膽有明時皇天后土照臨之欽聞温詔為洗雪九原可作銜恩私生還重拜聖天子霜臺柏冷除音美四忠耿耿照乾坤留取聲名付青史夜航行偪仄偪仄秋夜航吳音雜遝汗流漿柂樓劣容六七輩焮髯熏耳炊烟黄袽衣失戒俄水入神驚膽落成倉皇羊腸雖陿無此險尚有餘地停車箱彌明鼾睡那辦此得跛男子應非常鷄號四野曙光合鄰舟稍稍希燈光浪遊湖海别作計駕舟萬斛升扶桑杜希聖經厯生辰拾遺有孫真仙人手持六六峰頭雲靈湫喚雨洗八極向來旱氣空如焚焦枯頃刻作潤澤書生甚訝非前聞精誠所致貫金石笑爾詭論徒紛紜嗸嗸待哺萬姓活直與造物爭竒勳先生無言天欣欣永錫眉壽鮐背文聞角有感城頭角聲嗚嗚昔年十四五挑燈讀我書月照池東樹月明未棲烏暮年聞角空齋裏猶喜讀書心不死烏啼還是舊時聲霜毛羞殺臨池水牕月欲墮未墮時凄涼心曲誰能知蛩吟蛩吟蛩吟促機杼念爾愁牽千萬緒如何也遣達官聞月影郵亭自來去啾啾唧唧草根多幾家機杼空長梭短襦不掩脛骨冷瘠土禾低飢柰何皇華使者行原隰斟酌民情寛賦籍感時撫物一凄然豈比寒生操翰墨蛩吟雖小入豳風曽識東山赤舄公直須制禮扶明主明朝且聽隨車雨次韻程仲潛惠詩虚簷墜葉錚孤清穏著黄公山字屏每憐俗物敗人意老眼頗為看山青春風不度東城側閉門聊作灰中畫神駒汗血始見之向來枉恨雲林隔金盤擎露九霄危人間芻豢真無竒芙蓉為裳蕙為帶瓊瑶結珮天風吹轉蓬正自嗟南北雲錦時時看墨色嵗闌擬訪水心仙攜手東阡與南陌舟寓臨平書懷臨平寺前烟水昏鐘聲隠隠揺山門篙師繫纜古松下坐對月色波中翻年光盡付旅瑣瑣西風微動菰蒲根居人燈火自喧雜稍憶學語吾家孫秋田已穫粳米白浮蛆老甕山妻温一錢不直客氊冷出門大類三家村平生心友喜在眼襟期稍許中宵論誰憐老氣尚耿耿跛鼈强逐南溟鯤贈表姪李廷獻歸星源石山寺前黄葉道我曽去訪江東翁清池對酒躍赤鯉五十年來一夢中里巷蕭條礎石換孫枝挺挺今黄童駢章雖未到老眼已覺逸氣追天風明珠白璧闕藏護丈夫暫爾遭途窮君不見盤根仙李非凡種培植應看香葉動願言得句如得官一笑人間朱紫重白紵辭一首答鮑仲安白紵亭𣺌何許白紵歌歌者苦君王微時擲百萬風流尚覺傳千古生長佳人舊有山嵗嵗春風芳草路何人纎指撚銀條寒機自語隨驚飇織成邊幅凝秋濤殷勤熨帖鮫人綃君家贈我心亦勞剪裁稱體驅炎囂何以報之雙瓊瑶題貢友瞻巖巖圖茂深十年金石交洒洒筆力專雄豪南湖溔𣺌入我屋側耳似聽𤣥猿號青山千摺染空翠瀑練萬丈懸崖髙行者回頭坐者坐謂近非近遥非遥長松夭矯奮鬚鬛誰家置屋新誅茅山橋野店迷徑入稍疑艇子呼招招問君此圖為誰作南湖之濵人卓犖石為肝肺水為文襟珮芳菲紉杜若泰山巖巖舊魯瞻楚尾吳頭並廬霍君家文靖玉堂仙彭澤令君聨韡萼諸孫班班如虎豹眉目秀異承家學蒼頭勿使捲圖去要洗炎囂倚冰壑寄金陵滕義夫用第六韻金陵坊裏識滕君喬嶽具瞻千萬丈怡然桑梓有餘恭顧我何殊魯三望賦詩尚骨不尚肉盤摺老蒼銷隊仗黄昏屢過南軒廬經行九里清溪上賀家酒好隔屋香對酌懽呼忘老壯子衿學校廢已久正賴斯文扶堡障新晴老悖欲何之泮藻池頭逺相訪寒威可柰粟肌膚雪髪無情垂領項書冊如山許亂抽竝頭比鯽生徒旺齋㕑留我共杯羮似憐久客凄涼狀方來太室歌邪許鴉墨宜徵將作匠姓名已在丞相府抱案曹郎非久曠何年種石必成玉天將𤣥雲為雨釀為吾多謝林董君扣戸曽驚青竹杖十一月二十九日先君子忌日朔風吹度簾旌長博山爐焚楓木香渚芹可擷亦可湘奠以桂酒仍椒漿山空嵗晚霜露慘魂來白日雲中藏萱花不待顔色老大椿至竟成凄涼萊衣縱在為誰舞何况孤鴈摧炎方髙吟手澤付煨燼粗有遺墨堪尋行報親無路學詞藻竊從碑刻書潛光兒生作詩五千首情鍾諱日含悲傷舊山種梅身轉大窺花弔影何能忘林烏趁曙叫不已放聲慟哭迴穹蒼汪子翼遊黄山以詩示教作七言以謝之黄山髙哉四千仞白日照耀金芙蓉軒皇御風覽八極問道來訪浮邱翁鈞天樂奏鸞鳳舞從臣結軫隨飛龍當時欬唾落幽閴至今草木生香風神丹一粒走澗谷化為百沸朱砂紅遊人下浴代湯熨一嚥再嚥顔還童靈苗採劚換金帛異烏啁哳聞笙鏞飛泉布石挂疋練翠蓋倚空翹萬松霞裳遥自剪刀出仙果直與桃源通素書欲讀字漫滅石髓可掬芝成叢初平羊頑叱不起令威鶴老衣蒙戎鉢盂下覆送天粒玉山禾發常年豐華岳先生來假寐蔡家兄弟書重封汪君妙年骨骼聳拖笻棧道凌虚空詩魂上据獅子背石人大笑欣相逢昔年鄉老横鐵笛約客夜宿天都峯爛銀盤出涼似水仰麾箕尾為前鋒百年竒觀豈易致力挽溟海湔塵胷嗟予衰謝付坐想惟將圖障懸庭中氣為車馬任超忽眼明鶖鷺厯始終君謡未已歌繼作寄聲以謝無是翁請王復初公禱雨于郡齋寰間老人星天上蒼水使翩然下新安兩袂挾雲氣四郊如赭良苗空符師誕謾嗟無功先生霹靂潛膚胸并州快剪摧妖虹靈湫投檄驅老龍傾江倒海須臾中函闗紫氣香溟濛揮手起救吾民窮明當奏最陽平宫千二百嵗住崆峒相從倘學鷄窠翁苦雨狂歌寧可崇朝艱粒食寧可暮夜無安席老翁不願聞春霖朝朝暮暮鳴不息寧可南征負戈矛寧可募戰黒山頭老翁不願聞淫霖朝朝暮暮鳴不休浣花翁家床床漏頽垣通豕犬穿竇麥田草青三尺長閒殺耕夫手通袖山桃野杏鬭時粧為爾空霑泥土香佳禽噤語蝶褪粉蝸牛蚯蚓升髙堂老夫經年剛制酒無術澆愁傾一斗閉車新婦皺眉尖汗墨流巾衣露肘慿陵大叫訴蒼穹下土蟣蝨誠難通安得赤龍萬丈捧朝日四海九州光赫赫四海九州光赫赫蒼茫萬象生顔色聞雨歌以官為市者良可嘆也春來日日愁多雨夜聞怪禽聲嘯鬼去年城市再焚巢兒廢錐刀女機杼金淘沙盡賤如泥壓殘官馬不能嘶客來勿嗔身障簏幾家聞雨妻兒哭彈琴峽朔風吹野日沈沈何年天造無絃琴黄牛三峽所未見奔崩沙漠聞斯今光浮漭蒼自太古下視幽窈餘千尋秦風猛鷙寫遺韻南國下俚嗟荒淫至音淡薄似𤣥酒疾響暗黒迴空林儒林丈人騎駿馬清風為佩雲為襟黄金莫為子期鑄後世豈少能知音政須露坐審宫徵遲迴魏闕朝王心鷄鳴度闗有誰子倉黄四顧經危岑丁繼道索茶于天寧方丈次韻平生愛殺趙州茶老禪茁髭如茁芽紅蓮幕下斵輪手僧牕醉卧忘公家醍醐養性近亦厭雲腴泛椀相矜誇瀑流井收各有味三丫路頭行勿差撚松戒傍菩提樹汲水借潤優曇花心安不用拽牛鼻吟豪直欲拔鯨牙樓船將軍下横浦陋邦震攝逃吕嘉分題得嵗寒亭嵗寒亭嵗寒亭乃在白雲古縣之閒㕔蒼松鐵面奮鬚鬛老柏羅絡青㝠㝠屋頭好山作屏障階下琴筑泉泠泠黄門何年此傾蓋三十六詩新發硎如何昔賢所坐嘯離筵瞻此郎官星潭潭丞相府胷中分渭涇天網既下罩藥籠收蔘苓援毫贊機務抗志惜娉婷㑹前賈生席無愧草堂靈得銅井潭送克用公戍績溪大鄣山揚之水灘三百從兹始銅井豢神龍鱗張角而犄驅雨帶餘腥草木常披靡潭幽窺愈深石剗平如机潭以寫吾心石以礪吾齒百煉之剛固竒節上出為功汲寒洌詩書謀帥朱侯來馬試新鞍黒如鐵山君川后亦起舞五月平林尚啼鴂胷中兵甲貴不用獷俗懷柔任車鍥詩成石鏡擲金聲楮産龍須連玉潔次韻陳子貞公家肉山肥似瓠餉我清談烹日注巷北巷南寧幾家不用挐舟渡旁渡吳王臺上歌舞新回首斜陽荆棘路羇懷况值秋蕭索意行且止悲歌屢兒曹頗嘗見此客世事悠悠首難聚清陂百頃魚作租擬向漁郎商去住舊山茅屋撼風雨夢囘不省棲身處神交千載落空言心知正用頻來顧我家父子一青燈君家兄弟雙珠樹登山臨水定何時更約門生侍巾屨聞角歌城頭角聲轉悲霜凄凄誰解吹霜天解吹惟健兒健兒健兒十年戍遼西閨中少婦輕别離裁衣未寄寒刺骨嗚嗚咽咽空相思南征北伐昇平了刁斗聲沈太白曉當官不用猛虎將歸來妻子常自保健兒吹角不知悲汝身不是遼西時如今却付荒齋客還家有夢萬山隔城烏𦕈𦕈月窺牕一掬酸心禁不得癡童鼾睡爾何知明日霜髯増百尺敘南蒲學正制登歌雅樂留吳作詩贈别蒲君軒然虎豹姿傲兀官舫來吳㑹路經越巂萬餘里自春徂秋暑將退命銜宣府敢辭勞廟成作樂當昭代仲尼日月行中天聲教旁敷大無外金鏞石磬在堂下登歌進盥環衿佩朱絃疏越鳳凰鳴虡栒鱗而加粉繪儒臺史君惠裏言薇垣好事多才賢鳩工稽度罄其巧往往補乏捐金錢聞韶可但向齊國名與季子相周旋黄鍾不待諧賈鐸語以緜蕝知媸妍虎皮包裹槖駞載尚煩愛護令完全歸來上官念逺役庖人催喚開華筵坐令祀典配内郡逺臣夙夜思承宣功成紀實上奏牘星馳願到明堂前龍顔咫尺有餘喜率土共樂堯仁天踏車行青天無雲蒸赫日大車嘈嘈小車急誰家小姑比嫂長牽手登車齊借力可憐力盡汗流漿揮手不見蛾眉長却愁新秧未入土哭殺林鳩天不雨安得浩蕩銀河翻山後山前涼葉舉海塘罷築民把鋤萬嵗千秋荷明主後踏車行吳天不雨日光赭桔橰遞響徧原野祗消三日雨滂沱水雲萬頃揺新禾君不見前年苦雨圩塍破敗屋斜穿小舟過至今怕聽雨聲長㸃㸃滴滴割人腸街頭二千得斗米紅粧洗米官河水不愁圩破雨翻多柰此白粲珠璣何題松壑御史鶴慶亭君不聞胎仙來自蓬萊宫𤣥裳縞袂丹頂紅禾非芝田不肯啄雙雙弄影瑶池中巢居松頂出至性綢繆牖户仍玲瓏如何東道乗驄客百金逺致棲樊籠頸長閣軀費呼喚庭除步武旋西東九臯送響透寥泬孔牆宻邇驚盲聾雝雝似是鸞鳳侶亹亹相應雌雄同應嫌乗處志專一闗雎復見周南風生子墮地光照夜愛之謂是靈禽宗經時啅殻出黄口弱羽帶濕垂氋氃金九火七孕神質千六百嵗乗虚空青溪道士僅一隻清獻公家不多得雪堂夢裏聞戛然絶妙文章傳赤壁不如公家二生四兮四又八數衍羲經宗太極龜魚下䕃小亭新竹樹成隂長晝寂茶烟輕裊對文楸皓首寓公分半席請公下筆自作鶴慶圖醉墨淋漓雲霧濕次韻烏程謡寄于尹鄧攸居官惟飲水晨炊不淅吳中米武陵長史歸裝輕沙堤取石壓船底于公宦海經幾年有眼不識床頭錢寒機弄月耕徧野政成老子風牕眠今代昌黎持繡斧華篇枉贈能知賢任昉當年清似水歸舟僅載桃花米烏程長官廉且仁況肯吹毛翻檢底秋風䆉稏歌有年訟庭荒蘚生紫錢兒童三尺知雉性老翁八十看牛眠向非清臺掲明鑑妍媸孰辨區中賢上塘行吳人不愛馬官河抵平陸婦女小兒齊駕船牽路雨收泥沒足君不見上塘篙師更苦辛髙桅挂足兩肩赬波濤急瀉石齒齒力與涎蛟較生死我願舍舟取長途南山風動嘯於菟人生行路難如此兩髩易秃紅顔枯歸來山中誰與娛良朋過我酒滿壺老妻紉綻弄孫雛但為鴒原引恨増驚呼鴈何來鴈何來天之涯朔風吹汝急念汝寒無家南翔慎飲啄幸不離罿罝羇棲萬里影慘澹含烟沙鴈兮鴈兮歸有時有弟有弟今何之炎州十月雷虺虺朱鳥吐焰熏髩眉遥夜夢見君翕忽隨飇馳人言生别心欲折死别痛極那得知青山對白髮歌青山對白髮白髮對青山有時問山山不語但見草木春風寒登髙望白雲雲泊松樹間引手攀雲入襟袖雲去浩浩何能還丈夫有筆無塵滓不作征西露布獻天子文如古劍夜生光誰令子作真符禆國史朝研朱墨誦琅琅夜剔青燈應媿死我願學樵童丁丁㺯斧深山中又願持釣竿嚴陵灘上收魚筒溪神未必愚辱汝栁州栁是囚山翁十四夜大風始寒往年吳㑹厭風饕老屋揺搖連地動遊麋臺下少逢人衆鳥枝頭無宿夢庾臺千艘出海口檣折帆傾驚匈匈飢蛟鋸齒食人肉愁絶京都望輸貢青山四遶閉車帷勢急何自掀茅茨我欲上天訴風伯虎豹守關安致辭王師南行甚勞苦迴旃捲斾當何時征衣未寄寒刺骨上霧下潦熏蒸之遥遥閨婦隔萬里可憐中夜啼痕垂短衣掩骭歌石爛硯田荒落吾奚悲腐儒所思在逺道鄰鷄三叫増凄其苦雨行龍公吸海填銀河散作千林夜蕭瑟曦輪仄御入太隂若木扶桑少顔色苔生客位紫斑斑蚯蚓上堂蝸繞壁香盤曲篆屢供焫幘墨流頤驚溢出黄雲爛熟混泥沙田父涕滂憂水厄先生不出掩柴扉吟作飢鳶空太息願從馬上奪天瓢擲付祝融燔朽質三竿瑞日麗中天四海歸心仰宸極晨盥衣間墮一髭白甚戲為短歌愚生四十髭始變把鏡嗔人為吾摘蹉跎偃蹇二十秋霜雪滿頤何啻百衰顔想似葉禁寒粗喜眼明對方冊書成豈救妻子饑奈此秋風鏖四壁舊遊澤國畏波濤嵗晚歸來風雪厄林棲勉作遂初賦燕坐可觀虚室白有時懷土夢魂驚起据藜床猶作客昨夜燈花綴玉蟲艶艶語人光照席淮南猶有未歸兒安得行人報消息終焉我髪不再𤣥勿羨天涯春草色和程仲山失鷄行君不見少陵杜老苦為鷄蟲分得失又不見東坡居士亦為二蟲辨隨逆不如且讀仲山甫失鷄行鷄飛上樹從人得啁啁粥粥爾何為鼎釜新封湯沐邑宋牕幸免聒兩耳風雨膠膠長邪慝漫誇助叫海翻波孟嘗君家唯此客我聞失鷄付等閒天山鳳食青琅玕千年覽德始一下世人莫作翰音看君不見魏世熒惑亡在匏𤓰中昆明池上煽融風又不見黄帝𤣥珠遺赤水象罔得之心獨喜蕭何暫去漢皇驚四皓入山寧餓死天人至寶衆所重豈比紛紛鷄犬似誰教鵝鴨惱比隣為嫌口吻令人嗔鑽籬菜僅俗僧飽詛盟待汝揺其唇寧從紀渻養木雞三旬不鬭全天真吁哉少驚世之人文㑹堂前以磁罌貯牡丹一枝著雨離披古松賦詩簡吕廣文元輒次韻以廣其意牡丹紅者呼狀元黄紫類有佳名存東園壽安大如斗花時擾亂蜂蝶魂輕攀要是纎玉指滿插雅稱玻瓈盆主人何處得瓿甊上具口耳中昆侖嫣然一朶若有訴名色以聘元非奔雕欄遐憶風日麗平地下接沙塵昏暗投明月誤魚目得時蕭艾欺蘭蓀願從汲引上几格賜之湔祓令蒙恩翠屏掩映嫵媚態玉井噴噀醺酣痕忍言零落拾殘馥酥煎故待供盤飱憶昔洛下潛溪緋買種動以千金論歐公出口譏天巧至今傳誦數百年豈非大巧淳朴散主人養拙之為尊天香國艶雖醖藉自開自落隨乾坤城北詩家陳孟公愛松愛花心一源瓦瓶深貯見吟咏珠璣何啻百斛繁偶逢想亦被花惱何不弄筆伸花寃銀罌闕金闕有物情醜好隨手翻東園百本方爛熳少頃佳客開芳樽蒼顔正愛花壓帽投鑷未用慚諸孫枝梧詩律謝沈宋真持布鼓過雷門小疾戒飲戲作長歌人言天上有酒星又言地下有酒泉杜康儀狄酒之精至今垂名千萬年酒星不照新安郡筠軒先生據寒氊蕭齋非無酒盈榼柰何衰疾來相纒既不學灌夫罵坐忤丞相又不學方朔殿上遺小便家有宿釀五百斛不如買田二頃扶烏犍誰憐脅腐客不悟爾謂得趣吾豈然子雲寂寂待好事彭澤歸來無一錢從今賓至但茗飲白雲椀裏銷晝眠速營糟邱亦過計笑我自號茶中仙不然飽餐脫粟飯縱逢麯車豈流涎問翁空洞果何有惟有風月三千篇國寶程公幼子叔固年十四機警可愛賦長句以勉之學大鵬初生羽未乾抗志藐在青雲端虎纔墮地文隠霧氣已食牛威百步何況羽成文炳時九萬直上須臾期風低草木百獸避不數尋常么兔貍人間小兒千百輩羅衣楚楚同隊嬉喚爺但覔梨與栗幾何把筆塗鴉兒公家幼子十二三發硎快劍冰為鐔眉眼分明畫中得髧髦漆黒垂毿毿試令吟詩拂蠒紙瑟瑟食葉聞吳蠶荒齋邂逅阿戎語白晳那知逢阿咸鄴侯家書髙似屋字比錢大光煜煜五行並下抹紫電意迎理解如破竹青燈拚作十年讀掇取巍科收世禄一枝祖笏篋中香留眼崑岡看片玉田家苦嘉禾洒洒溝塍間有如少壯矜容顔黄金散漫堆場圃幾年無此逢秋雨東家打稻西家聞細聽聲中含太古問君如何是古聲七月豳風始西土人言田家樂我言田家苦春耕泥沒膝呼牛耳濕濕禾長費周防露草慿茵席藜莧不充腸憔悴見顔色林寒向夕烟火微主家扣戸徵租急舊逋未了新逋積倒甕傾罃無一粒田父拊膺向天啼瑟瑟秋風吹四壁明月璫一首戲贈安處善令郎之婺源結姻于鮮于必仁之門鮮于君有鸞鳳女安處善生麒麟兒兩小無嫌好姻對瓊林皎皎春風枝刺繡床前性聰慧讀書窓下聲吾伊蹇脩寛作十年計宛轉為傳青鳥意羨君買紅纒酒缸何以贈之明月璫以虎圖贈如軒楊簿歸臨江楊侯手持西江雲散作分陽溪上雨千家小邑户不閉食葉吳蠶如欲語語公解織雲錦裳明當補衮春風香問之胡為捨我去店頭栁色揺離觴有虎有虎南山巔咆哮百獸不敢前尾掉雲旂眼出火盤礴畫史由心傳似聞騶虞異天性村村牛羊自歸徑唐朱姬召嘯風聲況是闗西縣祖印朱虎召虎松溪道人歌巖前偃蓋松百尺下有清溪千古碧無朝無暮撼風雨淺深見底光相射此松太極為根柢老幹中心藏鐵石㝠㝠濛濛香霧生壘對冰霜天與力為苓為珀通神明塞谷漫山鄙樠液明堂太室伻獻圖囘首萬牛俱辟易溪流上接銀河津地占淮壖分澤國纎蝦寸鱗不敢動但許蛟龍為窟宅樵風半棹日色暮璧月中天幽鬼泣清溪道士太離羣竹溪六逸疑爭席不如松溪溪上人自主自賔無媿色黄庭總是悟真篇冉冉飛騰豈無術天上神仙厭驅使且向寰中守虚白松脂一丸飽即休嚥以清冷毛髪立今年鼓棹過分陽紫氣度闗人罕識竹皮為冠風吹女追隨步武庚桑役但恐故山松有語莫遣溪聲罷瑶瑟歸來朗誦采芝歌信宿雲端度雙舄八月八日過嘉興捕蝗行東村柝喧天西村叫傾市捕蝗官雖來無救我禾黍圩田已破今無秋舊淚未乾新淚流富家有米量玉子菰蒲昨夜風颼颼民窮乃至此萬一寛征求君不見往年北殍來南州纍纍老稚令人愁筠軒集卷四
