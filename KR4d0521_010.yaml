body:
  text: 筠軒集卷十元唐元撰記周彥明繼善堂記出城二里而近曰南宫里光輩周先生元仁居之先生明麟經學身幹修整音吐洪暢余生晚與先生同肄郡庠因得互借文字甚相好也後四十年始識其曽孫原誠彥明時番克用朱君創詩㑹因造其廬焉穹其門閎種竹數萬箇環拱几席大稱先人隱居之勝酒罷賔退彥明有請于七十八叟唐元曰吾祖敝陋數椽經二百祀不庇風雨嘗侍家尊撤而新之今祀先有室宴賔姻有堂寒燠有寢棲典籍有􅍥吾父以繼善扁其楣願丐先生一言夫繼善雖本易系然繼志述事於子道尤切大抵涵養本源莫大於讀書大父麟經故藏尚無恙生其讀之矣聖人直書其事而美惡自見生其深究之其可以自巳乎昔嘗互借文字猶記有浩然王維審言三大家詩生其讀之矣盛唐風氣醇厚無纎巧蔞薾之陋生其玩索之其必有新得乎人生莫大於孝友出而授諸生有講誦之煩歸侍其親有溫凊之問叢篠未直者扶而正之菘韭已割者行而補之清溪在前可釣可逰以為甘㫖之助羣峯崒峍可吟可嘯以適性情之真昔人有言為善最樂爾祖之嘉言善行尚有考也以善為繼善不已多乎况生為後來之秀其於世學善廓之而有餘地矣董氏存誠堂記董氏之先以良史直筆見於春秋以正義不謀利之說髙視漢儒家傳丕緒有自來矣鄉大儒朱文公學繼濓洛前追洙泗當時門人髙第散居四方惟淑重董先生當文公過家上塜為書數百言極論自修之要治人之方我文公深加器賞想其鳴騶入谷賔友咸在咳唾珠玉散之草木發為幽香至今郁郁芬芬未已也四世孫宗敬永懷前猷兾保不墜乃作堂於繡水之上榜曰存誠志念深矣乾之九二釋彖曰間邪存誠邪既間誠斯存矣西銘言大人存誠心見帝則此作聖功用在後學涵養須用敬耳君字宗敬於義甚協苟於事親從兄親師取友應事接物之際一以敬為吾心之主常思若祖謁見文公時進退有度唯諾必恭於是乎抽關啓鑰得聞至論昔之心法今之家法也由是進而存誠固其所也宗敬日玩編簡趨向端方蓋將大其家聲而無忘其先人介鄉友余宗文來乞銘銘曰卓爾先哲篤生紫陽先哲伊何吾道之綱我出我車過家上塜英英學徒有來叔重實與道契昌哉其言亦既寵嘉以貽後昆雲孫作室戰兢是競由敬達誠用宏先訓醒心亭記星源之嚴田古號山水之勝風氣蓄聚鍾為衣冠之區非易地比余二十餘一再過家上塜乃拜伯父直軒先生於堂上居有間經石山僧舍尋青羅石洞因謁江東表兄江東有學而文吾樂與之談焉初未知醒心亭之所在也後五十年為至正乙酉秋七月表兄深谷翁書來曰吾兒某從族家購醒心故址今亦亭於其間亭在上田市心鼻祖所創不知所由始而朱文公父韋齊先生所為記尚如星月炯然地延袤若干中闢一大池嵗蓄魚利以供賔養傍植花竹果木有足觀者吾弟號能文其為記之元謂醒心之旨非儒先何能知之世之人醉而醒夢而醒似喜豁然過一關矣然醒而復醉醒而復夢膠擾紛雜何時而可已耶苟知吾心之常醒則不墮非僻日進髙明亦曰持吾敬而已昔淵明愛臥醉石德裕愛臥醒酒石二公至竟沉酣於麯糵之中未可定議元又聞歐公創亭於滁州泉水之涯亦名醒心吾鼻祖必有默契焉南豐曽氏為之說曰今同逰之賔客尚未知公之難遇後千百年有慕公之為人而不可得也元每讀至此有異代尊賢之嘆兄今年八十二清健如五六十人子孫環侍酒後耳熱想其意氣豪邁不减年少時以是知兄之亦難遇也走也病足槃散雖欲一見公而不可得又何論千百年之逺哉其所感發有甚於歐公之在門者雲林蒼蒼南山在望祝兄之壽惟朝夕惓惓耳吾家仲容力還故物上以悅親可謂有志者宜得以書是為記竹林讀書所記竹林讀書所者潘子彛之所構也子彛幼從從父月菴延師講授天姿警悟步趨應對異常兒從父甚愛之比長而修讀志不輟乃去祖居故廬若干步於萬竹中營一室焉深靚間雅買書數百種庋而列之每於治生奉親之暇日事吟諷不以寒暑廢屢介仲氏信卿請為記余雖不識子彛重信卿之請得無言乎余謂嵇阮與諸賢為竹林逰唐李白孔巢父輩為竹溪之飲不過放浪形骸沉酣麯蘖耳樂廣所言名教內自有樂地舍讀書之外他無有也想其扶踈蕭瑟響振鸞鳳即吾音吐之宫商也霜凌雪厲獨立不懼即吾志操之堅貞也大者儼立小者拱侍即吾閨門之孝友也縱橫瑣細摸寫地文即吾辭藻之絢麗也又使吾視聽無非僻之干動靜有夾持之益古人謂一日不可無此君豈直為逰觀之適哉書吾嚴師也竹吾交友也師以問道友以輔德也此豈非月菴之昔所期待而余之所以三致意也生其力勉之余家武山下三十年來種竹盈門於子彛所好似有瓜葛江湖士大夫有繪為圖以見貽者頃自金陵懸車益自培植然為饑所驅而未遂杜門讀書之願因是而有感焉第恨平生未見之書尚多吾豈甘衰老而自棄哉或有聞而嘲笑者亦在所不答可也是為記徽州路重建行用鈔庫記泉布之制其昉於巾古乎夏商以前幣為三品太公設九府圜法周置外府而掌邦布泉泉有流行之義布有分布之義皆所以崇國本而厚民用也厯代小大輕重不侔惟漢五銖號合中制閲世變更而勢不能久子毋相權然後楮幣興焉國朝郡設平凖行用鈔庫官吏胥徒各有其人京師嵗給鈔本上下民數用以為等差乃命長官提挈綱領較其出入之多寡嚴其扄鐍禁其移貸日從民便若互市者焉夫以鏤銅為貿丹墨其文託尺紙之書而行千金之貨良賈規利細民資出旦旦委命於營求而甚於水火手持篋探摩挲尉帖而不能保其勿壞於是又立郤故易新之法其於國計損之者寡於民計益之者多損之益之與時宜之是法之行蓋有掩前代之所未有者盛哉盛哉至正二年壬午正月徽民不戒于火延燒管庫路逹嚕噶齊某公用是憂懼起謀作新乃諗于寮屬曰構室莫重於立基未有立基而室不永固者舊址湫隘迫邇民廬今欲闢之延袤若干而售民以書院地若庫若堂若門有嚴位置穹其垣墉以為扞蔽役大而期不亟功就而民不勞侯之用心勤矣掄畀邑丞張某以董其役父老來請記元謂宣上德而重國資起宿弊而圖逺略太守能事也百世之利其在兹歟其在兹歟徽州路重建譙樓記徽為郡因山為城水自鄣山來東走百里而匯於城下前導㕔事纍土石為臺而屋其上麗譙攸始事載郡乘北據乾而有金蓮之竒南面離而有紫陽之勝西挹兊而為黃羅靈山東引震而為花屏仙宅大江之南號為大州得非山水有絶特之異耶厥壤剛瘠梯耕寸耨經灘三百餘下抵浙江勢在半天上以故潦至蔑以容而嵗以旱告民生其間亦艱矣至正二年壬午正月居民弗戒延燒官寺庫藏而樓例灾於是合寮佐以重建稽春秋鄰國恤灾之故而勤其事於屬邑休寧輸財庀工考示圖式咸曰老於近民通練庶務無如别駕李公之賢者今觀其柱石凝定以堅以固甍桷比密若翔若舞厯階斗折無登陟之勞列楣矢直無垂堂之懼民有子來之喜而侯無厭射之容心匠殫巧介石自規可謂有終始者自某月甲子始事至某月甲子卒工父老請於郡士唐元曰子其記之夫有宇宙以來則有此山川上棟下宇制繇往哲寒暑迭禪興廢相乘使智無遺謀而勞不弛力此侯所以功成而事周者歟今夫霧靄溟濛廓然光霽而登于兹者其思探幾測隱而公道有必伸者乎祁寒暑雨以遊以衍而登于兹者其思挾纊重於溫言而省耕苦於塗淖者乎録囚奏讞擇勝髙爽而登于兹者其思簿責異情僞而寬宥之有道者乎豆觴使客相羊休沭其思品嘗雋永而何所自致者乎古之所謂循良吏而重民事者大類此大抵國有臺所以望氛祲而察灾祥處臺榭所以即髙明而舒眺望于以蠲凝雪滯于以啓益聰明注靈想於埃壒之外以為出政令之本豈徒觀覽哉由是論之紀事銘庸申言歆動合工針之義誦以所聞其敢不恭侯名榮祖廣平肥鄉人今為奉政大夫徽州路總𬋩治中主休寧縣簿柴某實董其役上無慢命下無違情宜得牽聯書之山林讀書所記延祐丁巳秋余與平叔鮑生同舟遊錢塘周旋旅席者彌月始得其為人大抵年妙而多聞盛氣不屈殆有志於學者也别去四年一日訪余郡庠且告之曰吾世居歙之鮑潭自吾之先以儒名于鄉居則粗有山林池圃以娛其生遊則粗有杖屨釣弋之具以節其勞賔至則粗有魚稻蔬果酒醪以致其禮吾知繼述之為難而凛凛乎其恐墜也於是朝夕守詩書之業而不敢肆焉里之隱君子名吾室曰山林讀書之所願徴言於子子以為何如余曰凡物必得其所而後為安者物之情也是故善遊江湖者必擇其所於舟趨越而走燕者必擇其所於車有方體而不可易是其迹之所繫而安焉者雖他物有弗能奪也猿狖之所家樵牧之所羣此好紛華者之唾棄而有志于學者之所安也抑子之能擇以為進修之所豈非軒窗之凄潤而簷楹之開明耶嗚呼特其寓者耳吾之一心在理為太極在天為北辰大而彌綸天地之化而一言可盡曰誠推而為三千三百之儀其要惟在於持敬是以君子之所其無逸蓋以是而為安之大者苟一為不善不能少忍於須臾則有操君子之名而去之者此為士之甚懼也今而知吾子之氣有不屈者足以亢其宗志益厲者足以進於學無昔人之懼有鄉人欲之之榮其可毋得於聖賢膏馥之所溉灌耶謹身節用率妻子以奉其親聯其兄弟豈止事夫章句詞藻之末而已哉雖然余猶將有以復于子者夫通都大邑萃天下之材意必有洽聞之士觀㑹通以行典禮固非滯一隅以為道者子其出而求之余也操觚執槧居困而欲不失其所子其何以處我耶艮軒記䡼星止車金柅亦止車衣袽止水囊沙亦止水凡物尚爾况於人乎是故言止無憂行止無辱飲知止則悟濡首之戒食知止則無吐茵之嫌鐘鳴漏盡而夜行不休與功成名遂身退何翅相千萬也吾友君章朱君居城之東北隅踞山面市榜其軒曰艮蓋勞形知止而恥於夜行者也君綿厯邑吏考滿居休孰不奮臂掀袂日期君則呐呐然斂退不暇方灑掃丈室左圖右書種花蒔竹為娛老計殆知止而逃夫憂辱者歟某遂告之曰腓隨足動心與物移目因色奪耳逐音馳惟艮其背物各有止匪背而艮止其大耳昔淵明休官歸栗里風致髙甚平生好飲忽復止酒平日携子姪逰遽曰步止蓽門豈劉柴桑諸人所能伯仲者耶余與君總角交今皆為六十人寓齊相去尺咫時復往還君不勝杯杓聊復一中則可飲可逰毋乃益賢於淵明者耶君相視大笑請次第其說為記賔雲菴記乾明誠齊程公營壽藏於問政之原即其東偏築屋數楹經卷藥爐具在槃桓於其間暇日告余且朂之逰時濟南程生益與之俱自東城抵候賢亭五里而近山光盤鬱松篁掩冉已可人意又自候賢至原頭里許直前延矚超忽無際有黃山梯空煙雲吐吞長溪東走蜿蜒澄深殘曛微漏青紫溢野於是引清嘯躋層巒天風吹衣令人有神逰八表之想顧謂程生曰今日之逰樂矣遂造其居公作而言曰吾構室稍久未思所以名之子寧無意於斯余為題之曰賔雲夫雲水土輕清氣也獨不見膚寸而起不崇朝而雨天下非覃物之功乎若烟非烟郁郁紛紛非瑞世之應乎解形而遺世乘白雲而上賔又非學道之志願乎公曰唯請以是名雖然余聞方外之士吹詬呼吸吐故納新金丹既成白日飛升古今謬愆誤世甚矣公學老于法為黃冠師乃不泥其師說若有究夫人道終始而預計埋骨之所焉可謂不惑也已是宜書公名應誠自號誠齊嘗道録吾郡宣授提㸃乾明觀事克承先業興修有功具見觀志西南隅新建土地祠記按后土為顓頊氏之子孫官民得以通祀者豈非嘗治水土而有功於民者歟今之里巷各立土地祠至若家自為祀事之彌謹不啻如所親然考諸禮經或為中霤之神儒先又謂即古之社稷如是則有功於世官民通祀為宜西南隅富山之麓昭慶院之前井亭土地有祠厯年最深元貞乙未罹焮既而里人解德創樓張炬為忠烈汪王慶生樓之稍東繪像立祠故基狹陋弗稱神居至治初元鄉之長者汪浩與其猶子某議遷今址於是募衆鳩庸式新厥宇復得塑工自西江來執藝惟良衣冠襜如衛從嚴竦靈光動蕩觀者稱異夫神依人而行人所自為而神實鑒之里俗仁厚則福以類應毋諂毋怠事神之道偹矣謂豫不信請質之后土氏是為記興道觀張公捨田奉先記三代而上教出於聖人故生事祭葬為人子者得以盡其心三代而下教或移於二氏乃有離形獨立而天倫之愛有不得而完者矣然其徒以傳法為父子兄弟則長幼後先初不可紊其囿於聖人之仁而不自覺者歟異時親者疏疏者親其所謂霜露凄其之感事亡如存之誠往往又以清虛障礙之說自勝馬醫夏畦之子猶兾子孫上邱墓具人心者得無少警之乎哉明善張公應元系出於儒早領𤣥教逮逰京師被㫖授興道觀提㸃以歸益用慮材繕治中外整飭遂捐已資買田若干畝入木觀供聶仙焚修又斥其餘二十五畝有奇助𤣥妙道衆半嵗午膳于以祠事其先人願與兹山相為久長焄蒿悽愴若接於心目其亦知儒者禮經大意天倫之愛庶幾少完焉後人見其祠而思其賢視公之祖父不啻如已所自出則晨香夕燈嵗時祭享毋以世逺而遂亡其初則今日之捨田建祠者非無所為而然也住持知觀事洪君天禧欲俾來者知作之所由始徴言于余不敢以固陋辭顧將有以告于其徒者嗟夫父師罔極之恩疇得而忘觀明善公之為可無憾矣然食其土之毛而身得脫於公上之役若知其所事耶是宜相與守淡泊去健羡期進於師之道焉公之意亦在是故余得併發之書以為記提調海運府什物記航海以漕朝廷重寄也故割行省大臣以綱維之然宿留再時凡供張之具率需諸坊隅參知政事呼圖克哈雅公不忍困民於是命通守劉某等謀之某遂捐俸以倡創什器若干事仍慮主者移易乾沒俾勒石示久逺夫器用小物爾公尚興惻怛則忠藎事國惠行列郡者從可知矣滕坑族姪壁間小記乙亥嵗元侍先母程氏避亂山中後五十四年當天厯己巳夏五頃自吳門歸携耆芹二稚重逰世故紛紜霜露交感夜臥小閣澗聲淙淙常如風雨驟至邂逅佳景塵襟脫然審樂土之餘音享屠門之殘嘬雖晚何恨青山白雲當賞斯言紫陽書院增置學田記學校之設舊矣其教焉養焉皆三代遺法也文備成周菁莪樂育洋洋德意為士何修而幸逢斯辰風教陵夷羣居弗養趨為游說揣摩捭闔迷本失真嗚呼斯文在穹壤曷可一日廢哉厯炎劉而瀛而奎漸追古典至慶厯則天下郡縣皆有學有田禮義浸灌河嶽發祥而七大儒繼生盡啓羣聖關鑰幾復三代之懿我文公先生其一人焉異時與門人髙弟陟降星墟卜居未果神逰故都山川草木尚有餘耀今書院曰紫陽從先正志也始創於城南隅則韓侯補魏侯克愚為之也再遷南阜則山長張公炳為之也百年舊制輪奐翬飛廪稍未充延佇方來後至元三年郡守嘉議公浩善慨然自任命天台楊某直學吳國英節縮浮費為市田圖嵗㑹其贏得錢以貫計若干既而教諭蔣某攝書院事與直學貢某積資益加又得錢以貫計若干買田三十畝有奇為養士之助公勤懇篤至弗啻視為私家事前所罕有贊之者知事張侯為有力是不可無述元謂搜財庀工以据髙明凡𨽻于學者皆可居焉也拓疆增庾以食其徒凡以儒名者皆可進焉也孟子曰誦其詩讀其書不知其人可乎知其人者知其心也先生之書具在讀其書而知其心又以知先生集賢聖之大成也二三子其務學哉公西域人果毅有力略嘗為部使者用法平允方大新孔子廟以雄特稱從事張侯三衢人由科第起家以文行著于時履畝宣勞則程元道姚廷用張珽孔彬孔榮也歙縣儒學修造記天下惟理最大古有是言矣故教修而理明理明而後彛倫叙上帝降衷之心存焉聖人垂世之教行焉曰校庠序者鄉學也曰學者國學也三代而上士逰於學故人人有士君子之行三代而下士逰於客不幸而狙詐傾側之俗成學校之廢興關乎世運之升降嗟呼六藝燔而嬴祚促太牢祀而炎運興創業之君鑒悟前轍嘗有意斯文矣逮夫表章六經則邪侈禁而不行正配孔顔則聖道彰而益大好文令主後先相望厥勳爛焉或者猶議漢儒掇拾殘缺補亡信僞散失本真固當恕而論之訓詁字義矣聽學者因句讀以自求詳定制數矣後之作者有所依据西京專門之業未可少也貞觀疏義辭纍繁猥徒守故習愈磨愈昏必待關洛諸賢東南大老而後能深探而力挽之如日星在天聖心始白於千七百祀之下而吾鄉朱夫子實與焉觀其釋傳旨嚴如經斷史繩以麟獲集賢聖大成洞視萬古淵乎微哉漢唐以來廣學舍招弟子貟不為不盛然郡縣之學賜書頒田養育士類則自慶厯始至今浙右一區之校積廪如山狡獪者因魚肉之邑學在萬山間猶恨屯膏視他學最號單弱前乎此非倚席不講則假途在告坐視荒茀弗思弗謀教諭趙某自吳興來敦願好修允愜士論天巧其逢舊尹懸車邑丞進義葉侯巴延攝判書提學政奮然以修葺為己任其西自櫺門階而升為孔子廟其東自門而入有池焉有橋焉以至正門兩廡論堂朱子祠凡甍桷之黑腐者更之垣墉之缺圮者補之脊者崇之窪者浚之塗之塈之丹之黝之神竒化腐功埒作者諸生請為記且欲聞紫陽之垂法者元愚昧曷從而知吁脫去凡近以逰髙明立志之方也嚴立限程寬著意思修讀之方也下學上逹由是而知天明誠兩盡由是而希聖至若一物一太極則深闢老莊過髙無極之非西江頓悟則深惡掃滅章句以趨西方之誕皆所以扶植孔孟大正人心本於身施之家國天下裕如也聖朝誕錫尊崇設科復古合一世而甄陶之豈私父母鄉哉元雖老矣願與公等共勉之葉侯括蒼人確守廉行明達吏事輔以文學令行禁止民歌舞之朔望命胥吏駢立堂下聳聽講誦俾知禮義此豈俗吏所能為哉惟我僚宷二三從事之賢協贊攸同是皆宜書姓氏以朂方來俾勿壞汪氏敬義堂記汪氏之先出汪芒氏其在新安則以忠烈為始祖焉東城之隅喬木蒼然而仲逹君居之仲逹承先大夫之遺址益自充拓大構厥宇据乾面離以敬義顔於楣間曰叟其為我記之竊聞孔孟之論敬論義皆本於易其散在於方册更僕未易數也文言曰直其正也方其義也君子敬以直內義以方外吾夫子以敬改正者何居正則靜而專敬則動而活有味乎哉由是論之敬者守於此而不易也義者施於彼而無不宜也持守講學兼行並進直上而至天德為學而希聖希天同一機耳或疑告子仁內義外孟氏嘗闢之易之說得無近似乎曰不然義亦敬也孟子言義曰行吾敬而已仲逹少而機警長益慎恭源流二千石之門蚤被三遷之教魁然一佳士也計君之構是堂也而有髙明深靚之觀內營奧室安安言言甘㫖日陳有順無強其奉親也有道矣已而凉風佳日嵗時珍賞良朋四面而至君必倒屣歡迎及升其堂則左圖右書前觴後奕初不待子之請而釃醇擊鮮略無靳惜實以愛其子以求樂益也愛其子則延賔之禮優矣古所謂陶母之賢者其在兹歟其在兹歟吁一敬之持循衆義之所集也故以之而事親事長則庭無間言以之而酬酢羣動殆見無一之不當名堂之旨深切著明矣君其深思而力勉之哉先大夫德甫公長余兩嵗嘗於鄉校聨事有一日之雅異時受薦者言出應時須提舉江浙財賦猶嗇取而留贏以畀後之人汪氏之興其未艾也乃為之記一齊記函三為一一為太極萬化之樞紐品彚之根柢也一大為天天道生物首元而為誠之通復者也鴻荒顓蒙為吾始祖一人上下數千年子焉孫焉來者無有窮已猶一粟至千萬粟也雖曰一為數始吾近之而不見其首曷知散而為百千萬億而復歸于一哉易六十四卦重之十二畫是為四千九十六卦始於隂一畫而陽一畫水火木金土質生於地氣行于天百姓日用而不知於天一而生水精一之傳寂寥簡短咸有一德魚水君臣洙泗一貫猶虞廷君臣告語也知乎一萬事畢淵淵乎深哉吾友吳寧之以一名齊蓋取得一以寧人法地也隱居里閈恂恂似不能言事母以孝謹稱友二季怡怡庭無間言以資雄其鄉而驕矜之色不形嘗以拯施存心延師訓子樂善不倦君子其人哉乃謂余曰子其記諸余謂君大父月壺翁晚年修鍊勤至形神完厚類有道者得一之㫖其有所受顧余將何以復命則曰猶龍翁言地之得一其合於坤之有元否耶人能體坤之元地之一以靜為吾心之主舍孔門主一之敬吾將安倣重簷宏敞風露凄潤君燕坐其中事無事焉固為可樂若夫應接羣動猶不能撓此一則虛心逰世雖五兵呪虎所不能加焉往而不浩浩然哉筠軒記吾家居烏聊山麓四世矣室陋甚猥以儒見稱然其可憾者四吾自知之先君子抱子遲暮生不逮養一冝憾少母齡雖髙貧莫具甘㫖二冝憾辛勤哺兒家纍幾四百指而伏臘不給三宜憾蚤孤嬰難更事馳騖晚始知學而聖言浩若煙海常懼精力就衰卒未有成四宜憾頃來恇怯退避如畏蛇蝎思欲遵古人髙蹈之誼而跡未超于流俗計無一可者夫以多憾之心而進退於無一可之時是宜行而隱憂臥不安席其自處當何如亦曰無可奈何而安之命也秋漏向永甕牖疏明霜筠萬枝影落上下老夫於是時亟呼兩兒相與背誦聖賢之書若鼓琴然彼扣則此鳴若撞鐘然機鋒所值頗解人意如昔人負暄食芹自以為至美但未知他人以為何如也須臾即枕夢一丈夫修幹玉立告余曰吾族素蕃碩自黃帝嶰谷受姓以來不屑寵祿於人世少許可汝若可教授爾虛中篇讀之可以練性除妄輕身延年乃載拜謝曰謹受教矣曙分臨盥第五兒桂芳進楮墨請書為筠軒記孤也不天二十年矣披閲敬堂遺藁得筠軒記遂請舒君道原題圖上豈特文字可傳一時範模百世况道原斯文契厚足以相稱第不肖孤摧頺白髮迫於老境不能孝顯為可愧耳是月戊申日南至孤桂芳泣識之棣華樓記槐塘程氏宋相文清公之宗也有字仲垕者與其兄伯原弟季髙同居友愛因以棣華名樓樓成謁豫請記豫謂兄弟之愛本諸天而偹諸人亘古今而不可改也夫乾坤大父母震坎艮為男巽離兊為女非若兄弟之倫乎在人以手足為喻者以其同衛心腹也在物以鴻鴈為喻者以其不亂羣也角弓取其內相向束箭取其衆難摧至於棠棣則同幹相依有不相離者由棠棣之華蕚而推其本根則父母所當尊而同氣所當愛較然明矣借使今日登君之樓拾級而上有兄弟先後之序焉柱楹嚴正有兄弟偕立之義焉榱角聮比有兄弟密勿之情焉窗牖之開闔則樞簨無異制也碧瓦之參差則溝溜無異注也左圖右書晨飱夕酌歡焉以相接陶焉以相語日奉怡愈塤箎迭奏以周公數千年不能一之心而能究圖於公之昆季之門由昔及今而培護益密英華日宣是紫荆之樹無可枯之年而棣華韡遂長春之樂矣且公昆季皆人中英俊篤實謙厚知人緩急萬一慿虛望逺其有見於荒野寒烟之際必待夫人舉火而食者量力而周之民吾同胞之心大父母之心所切切焉者也此孝友之所充也腐儒舉論濶疏如此請槩與好義之士商之則元龍百尺干霄漢矣筠軒唐長孺敬書筠軒集卷十
