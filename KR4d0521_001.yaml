body:
  text: 筠軒集卷一元唐元撰五言古詩藝圃小園僅百步花竹藝兩行垂垂結夏實蕭蕭吹晝涼盆池曉更靜照我鬚鬢長復有青青蒲風至互低昻人生百嵗內弱草栖螢光亮無貞堅節何以禦雪霜達人豈求名進善貴自强用世苟不能退居固其常又舊種竹數十生笋已滿園今年笋更繁􅋾􅋾穿鄰垣山童劚煙雨便欲供朝餐獨不忍饞口保此青琅玕物微志則逺當異今日觀平生遲暮心與爾同嵗寒又種莧甲已坼苦菜行亦秀耰鋤不憚勤常恐地力瘦旦旦望其長灌溉那敢後牆頭有蓬蒿不種而自茂此意定如何為爾吟清晝感寓朝光上疏牖開門望青天小雀已啾雜老鸛何盤旋造化生萬物營營孰不然大小固分殊過得非爾賢所以盤中蠅不及枝上蟬風露腹亦果立蛻如飛仙又入山復出山風雨飽迎送重雲莽回互百卉同機綜野獸號我前山禽發幽哢團團青油蓋路永力愈重茅簷喜暫息趣去勤僕從一牛上荒壠畢意在耕種牧兒徐驅之鞭朴幸勿用上憲使疏齊盧公苕苕椅桐樹茂茂岐山陽深根託髙岡修幹凌穹蒼威鳳來何從栖止有輝光鮮羽曜朝日五色成文章所飲必醴泉竹實充飢吭衆鳥不敢鳴況乃相頡頏覽輝下千仞一來效禎祥何當命師䕫聲此邦家昌又幽蘭在中林靡靡裛朝露豈不羅衆芳芬菲乃天賦枝莖蔽荆杞況當薪蒸路晚嵗益自珍豈以無人故佩紉弗見收好潔元非誤志士感蕭晨念此令人懼贈于履道山風吹我衣山石嚙我足隂壑迷寒雲陽岡曜晴旭坡陀陟峻嶺迢遞下平陸舉頭望前人烏帽屢出沒百年白髮新名利紛馳逐胡為不歸來芋栗山中熟又君詩一角麟我句蚿百足同吟旅瑣瑣寒燈幾昏旭益窺所抱竒江潘而海陸功名貴自强射石期矢沒願言比雲龍上下相隨逐歸歟力硯田肯愧稊稗熟過瑶嶺有懷孫君玉嶺下即君玉所居前登陂陀嶺却望青林隈青林淡朝暉雲氣相徘徊念我故人居軒户臨溪開圖書列左右琴酌無氛埃懷寶固待價傾國寧求媒晚定金石交顧我非其才崇墉若萬里未見心為摧露零竹輿語短褐寒風催微醺續殘夢未省先驚回思製芙蓉裳與子同剪裁汪氏孝節堂觀泉得清字靈巖蓄𤣥德斗斛匪自盈神女之所唾千古留琮琤苔竹映佳色窗户含餘清如何市廛底斯境得若驚人間涸澤時石溜方流行溥博雖寡用浚潔寧無情伊余二三子屏迹庶自名於焉俯清影幸不慚塵纓屢游意始愜杯炙非所營煩君慎水符煮茗頻相迎九日偕景韶練溪君王諸先輩宴桂泉菊圃分韻得菊字平生劉子政便便笥經腹鴻寶誤信書遲暮返初服廛中地百弓手蒔三春菊養苗待秋深倏已耀人目畦荒韭尚腴槽鳴酒初熟隨騧美周士衆輻共一轂餐英政使癯未因鄙粱肉搖搖燭見跋艷艷月出屋請席願淹留清談侈文郁黟山絶妙玩不忍去輿夫老苦鈍足繭肩亦赬堅坐我不忍趍走便且輕後乘幸勿亟前有黟山迎平生所未識目駭而心驚委蛇出異態婉娩含深情長虬挂碧落巨怪浮溟瀛冠冕或儼立甲胄何縱橫未吟先惝恍欲畫難經營邑連壤最沃俗美人不爭意有隱君子依阻仍深耕遺世了榮辱避俗變姓名尋之不可見晤言誰與傾桂泉席侍飲湯北村楊志行郭祥卿諸公構堂俯虛市把酒對逺山竹樹愛深密石溜聆潺湲行吟墜葉響坐遲孤雲還撫物景易變觀化心自閒肅肅文翰賔悠悠霄漢間問答綴道論愈懌貽好顔情中志未畢反斾何由攀病起行圃閉門了三春萬事一木榻衰病苦見侵懶慢日相軋心兵百戰罷頗亦厭紛奪瘡痏費爬搔癢定痛若割匪惟交親疏往往廢書札腐儒困朝餐正不辦粗糲酒徒逐鳥散招呼謝嘈聒茗粥定差賢庶以慰羌渴今晨偶窺園雨後葵韭活物生寓至理二氣妙旋斡細響出清渠微青迸枯枿適豫病初瘳而乃心目豁聖道嚴階梯坡陀積毫末行當理舊學志肯憂短褐申情布同志夫豈貴専達病後雜書江南地卑濕重膇得其偏先子年半百此疾懷憂煎我時在侍旁常恨無酒錢典衣喚軟腳沃之令醉眠呻吟尚挂耳翻思淚迸泉大塊亦寡恩衰疾蚤見纒稚子饋我藥我懷何可言晴簷看蛛網經緯整且勻極知心獨苦正爾營一身小智罩飛蟲用意乃不仁虎狼甫墮地氣已欲食人天地且不言志士空愴神好風池上來吹我微岸巾沈痾遂一快步月歸柴門忍飢陳正字不識治生理妻子依婦翁豈顧流俗鄙平生檳榔䬳不滿一餐齒可憐兒啼飢中夜成坐起貧病若膠漆吾事乃如此丈夫不能食出口已可恥世無魯公賢乞米徒勞耳送楊志行廣文還金陵楊侯歌雅南俚俗豈同調昻昻氣沖霄肅肅容在廟清臺早湔祓霧隱出文豹詞林侈瓊琚一世稱獨妙人言薄采芹脂轄匪前料蕭蕭霜露嚴寒蟲夜相弔士習久不古過眼幾髙蹈千鈞一髮危愷悌神所勞薛山甫與僕並鄰見過甚數益齊宋公以廉能治邑山甫實賔其門喜其得賢主人也作詩寄之鷙鳥雖纍百一鶚乃為竒鶚鳴集鬼蜮衆謂鳯凰兒爾曹飽欲死此生常忍飢碧眼送晴空朝來有新詩又陶鄰劉柴桑杜亦鄰朱阮時情甘若醴但覺古風逺清談玉屑霏共此晴雲捲寒燈勗苦心嵗晚以無倦又萬物皆托體蟫魚食文字蛣蜣但轉丸亦復事汝事君子有時愚小夫任私智清裁豈無人酒食何足議又桃花光灼灼春風滿琴堂此客須此主正直如羔羊為政但飲水此味真悠長區區期㑹間葛屨行朝霜九月二十八日督校廪如東閣偶偕同遊登西嶺作西上坡陀嶺天風吹我衣齊雲矗其南獨聳髙巍巍霧收淡晨暾窈窕開巖扉巒石互馳騁水木相因依顧瞻百里間行人如蟻微山下誰歟居寒塘嘉果肥鳴雞破午寂犬卧來客稀四序有代謝秋令行當歸蹇豫事校廪委瑣遭評譏倚杖督朝穫日暮常歔欷幸接田父言耕也理不違同游愜心賞天馬方辭鞿煩局自兹釋寶唾時一揮贈石庵道者道人東吳來空山挂瓶錫空山何所有中有浮雲白蕭條紅樹秋渺漭寒溪碧髙閣繞層阿荒階絶人迹焚香禮大士幽磬了晨夕勞生我未已衰鬢稍見迫慨兹區中緣愛彼松下石出門馬長鳴倉皇又行役題使君渡水羅漢圖愛河浪滔天萬境同一夢髙僧鼓慈航與法作梁棟應緣聊住世振迹還靈洞偶來涉清澗白足聊玩弄明明十六輩妙相疑伯仲湛然諸漏盡心與潭月共鞋笠費提擎天風落吟諷此水本空明誰牽萬波動塵根待湔祓行腳我何用願言八功德散作人天供西江戒口吸長者煩囊送灌溉法王苗有情俱可種示阿桂小桂四齡日暴下如驚湍三日不水漿氣息垂厭厭迎醫自外來告我脾氣完投藥僅刀圭久之忽話言晨興喚阿娘舉頭索朝餐纍卵勢已危槁面回渥丹誰云久竟忘思之熱肺肝今我亦卧疾展轉春將闌扶牀問安否念汝知艱難眼明骨骼聳聰慧令人歡百圍長豫章固在拱把間善言山下泉所貴養蒙端我病行可起共汝書燈寒送吕廣文滿歸宣城吕公非熊孫況是釣鼇客紛紛較錙銖度越流輩百平生名父子傾心研六籍至今老桂秋英英浮雲白膏粱無餘味猶抱詩酒癖作詩動百篇飲酒輒一石壯游輦轂下揮金無顧惜結交盡老蒼思奮沖霄翮誰白冠蓋場薦牘中朝出咸言曳長裾頗善坐重席道固在八方歸求乃有獲眷焉紫陽墟士子多於鯽吾人遭眼青斯道立幟赤飛夢切星漢環像拱圭璧浮言川騰波定力射中的誰能絃誦餘而肯為茲役曠野草木黃嚴冬霜雪積旅館半開扉殘燈猶在壁當歌欲一放轉畏離腸劇引領岐路間渺渺望行色僕曩過海寧東閣之墟伏讀許郎中義田碑心竊敬慕不已今觀祈川許公買田于姑孰昆弟異居垂三十年復與其二猶子家而食焉吁何許氏之多賢也作詩草二韻兼書其事云貧賤重骨肉富貴驕天倫淮南斗粟謡千古餘悲辛飢劬篤孝友或在閭閻人風習曽未間庶保孩提仁苟無激頽波人道將荆榛粲粲田家花異代為之珍物情尚離合恩義微故新有懷評旦公夙志吾其伸錙銖游麴富衣被鄒魯醇委源祈水上拓壤采江濵離居三十秋猶子隨天申即事曠百載奚止驚邦鄰坐令殘忍徒愧汗沾車茵善端一以開天地臨明神眷言壽且康亹亹雲來春我昔東閣遊列屋觀魚鱗中有省郎碑義庾髙嶙峋緦功動百輩一飽甑靡塵山川盤鬱在行客咨嗟頻宗盟何多賢一髮懸千鈞史䇿幸見收詔此風俗淳對菊無酒錢陶公同一嘆恨牆隈一種號嵗寒者開最遲第三兒堅編茅以屋之因成二詩呈桂泉執丈謙父與幾二友兄菊開已彌月幸脫風雨厄清晨繞幽叢嗅盡不忍摘黃中自爾尊未數紛紛白清酤僅一觴把我二三客可憐乏酒資相見少顔色同堂不知心對面千里隔無酒豈病我子言猶未擇霜露氣已肅我菊將離披染白竟成紫日就顔色衰物變乃化漸至理於焉窺兒曹强解事欣言以為竒束藁像茅茨䕃此嵗寒姿惟兹嵗寒種蘂細開常遲蕭然抱幽貞寒梅托深知元夕喜雪以萬事付一尊分韻得一字火城何煌煌風雪集萬室離披陸地蓮照此瓊瑶質百卉不敢春天公亦多術此時游衍人輪蹄聲瑟瑟尚嫌濺焚膏開簾看疏密回風忽已定殘片沾書帙晴光漸可舒寒事固宜黜顔巷廣文賢僦居初暖席髙吟黃竹章夢冷傳柑實呼我二三友肴核共真率良辰愜清賞把筆競題述誰家百丈竿光漾星毬一髙樹玉龍寒拿空戲珠出送趙石照學録衛綰無他腸更生漢宗老喜公春秋髙髮白面不槁學省以文鳴用世亦已蚤撫視昆明灰僑居養吾浩頗從諸生請薄言采芹藻雲槐午屋涼石壁晴波繞長嘯宇宙間袖手忘餘巧分甘原憲貧孰計侏儒飽歸橐不留金愛惜天下寶居然見山立偉甚回瀾倒走也實後生故典從探討三年費雞談白日疾飛鳥四月下浙江舟穩風濤少禾黍猶未秋湖魚去深渺巴川天一方醹醁愁可掃公朝重老儒瑾瑜方藉繅行知矍鑠翁髙議雲臺表送趙子善趙君天資髙秋空上鵰鶚勇猛趨道途於菟嘯風壑岷江始濫觴道山隔蓬弱居然入無底萬里費行腳槃槃石照翁皓首麟經學誰言厭家雞端待啓𤣥鑰蹇豫同嗜好四壁詩盈橐城隅遞往來三見秋槐落語别已良難分攜真作惡竹萌美羊羫湖魚具羮臛川塗奉晨昏至哉天下樂送尤山長歸浮梁朔方無弓車南粵無田鎛舉國以為良夫人不待學浮梁士淵藪公其才落落正色坐紫陽師道可無怍又倜儻明大節瑣細推秋毫得失寧幾何用志亦已勞士習橘化枳時情黍雪桃抱甕息機人智不如桔橰又千金市肥馬聚鄰餉猴羮伯樂坐長嘆易牙斯骨驚屋頭對山色屋外喧溪聲一卷考亭書聊以陶吾情又孟孺不由介鄭莊能薦賢立談苟有合遂賞朱絲絃古人不我欺古心時自鞭下言曳尾龜上言風秋蟬又齊居小如舟坐卧日為嵗孔牆昏墊餘捨我諸生去循資待青紫咀嚼無厚味行矣薦賢良朝賈上書疏庭竹今嵗頗盛瓜蔓復有生意閒居志喜賦古體二章始余植幽篁但愛一䕫足傍出者兩竿夷齊想髙躅今年忽六七環衛若臣僕雖無渭川多已可洗塵俗柔枝不自持老幹相依緑月明琉璃滑風度琅玕觸亡羊笑多岐白駒在空谷飯飽時一嬉相看忘寵辱又牙籌竹下算手版誤倒持富貴可憐生憂懼亦隨之荷鋤學老農頑鈍人見嗤春來種瓜蔓三秋以為期牆根植芳楥亂翠相紛披露襦見襞積璀璨黃英宜老夫日抱甕子母看纍纍貧家羮不糝爛煮供晨炊客來莫轑釡大笑山人癡一飽政爾難辛苦何人辭題吳維申壽藏人生類蟲蟄壞戶各有時當其未蟄藏啁哳仍優伊彼我鳴其天至樂豈强為天地性情露百果觀纍纍華實自後先至理不待推掘泥取芋啖殷勤種芋兒面目或少異一氣中貫之大哉死生說得髓遺骨皮金丹誤末俗嬴劉例見欺退之服硫黃胡不決信疑吳公善觀生繭窩計早施泉明欲自挽征西無愧辭吾嘗評其人圭璧絶瑕疵居鄉既恂恂友愛亦怡怡世人欲刳心老子不皺眉讀書廢寢食不用較黠癡白頭托交晚久别輒相思相思即命駕屢日相追隨青山共對酒小閣還題詩尋徑踏黃葉入寺看殘碑下榻無倦色佳客同遨嬉多公嵗寒意願贈青松枝三月四日與思樂諸生遊東山以花落家童未掃雨餘山客猶眠分韻得猶字春風如少年盛氣不少收紛華悅衆目緑稚而紅稠剪裁出纎巧苞蕚相綢繆風雨一夕至飄蕩隨東流黃粱幾清夢閲世等浮漚不如閉門坐思與天者游殷勤二三子共泛晴川舟漾沙日色薄飄衣風力柔新禽吭乍圓宿麥穗稍抽荒嬉重前聞小出聊夷猶幸毋多酌我舉眼瞻雲頭次韻何季通春遊長句窮愁抱書癡念我得所獨空堂寂無人幽憤時仰屋出門逢所歡如魚脫網目杜陵雖詩豪遺恨曲江曲何如值昭代薄言此休沐登城見桃李大勝芙蓉褥繁花難久居亦可暫延矚居焉衆甫集豈但一䕫足遊絲蕩晴空好鳥鳴幽谷躋危出樹杪列坐依巖腹恍遊麻源中下視泰山麓怡然接妙語不翅拱圭玉春風天上來野水涵芳醁能令醒者醒不洗俗士俗輦石誰氏橋振鷺何巖瀑平生愛浪遊穆駿競神速晚知養靈源已失鬢根緑癡黠不同條萬事隨轉燭後車且勿催前夢已難續聊為倚樹吟蒙莊有前躅次韻許簿馳驛對菊霜露日凄厲出門何所為游子畏簡書方舟泝江湄對酒聊自慰望雲不堪持緬懷鄰曲閒同賦斜川詩久行邈難值枉覿心自竒番番黃髮翁歡言進針規人生會有役誰能抱長思天馬困塵路娉婷多乖離明鑑豈自照枯蓍寧決疑曰余返初服林下申幽期嘯歌籠鶴起穩睡床龜支明當過衡宇有酒君酌之送許方所主簿人生風轉燭苦宦如飛蛾以身償寸膏固寵將奈何所以古賢達投紱居山阿上逃朝市辱稍喜漁樵過平生習主簿風采世未多拄笏望白雲觀物同漚波忽復念柴桑歸來盼庭柯夜月照初心鮮飇散微和幸有種秫田小酌令顔酡亦有琴與書不樂理則那紅塵溢人海萬室沈酣歌特立見此士髙哉名不磨願酌冷泉水祝公壽婆娑九月十七日以長女疾重訪吳溪姻舊感而有作人生寓宇內一欣間百憂憶昔始來時炎風被層邱聞雞覔村巷有屋山之幽上堂集姻友樽罍相勸酬寒暑互變化嵗厯俄十周及兹履舊迹還為田舍遊渺渺烟樹遙㶁㶁泉聲流所遇異故物木拱狐兔投村媪怪我老秋霜漭盈頭餘生諒幾何夜壑誰藏舟嗟卑而嘆老舉俗槩豆漚紓餘顧內慙逺慕前哲儔寸隂倘自惜庶幾桑榆收寄吳仲文兼柬定宇陳先生我文如蛛絲雖巧無所用不如懶婦緝亦可入機綜君家有婦翁名與泰山重窮年工著書白日不虛送平生邱壑心嵗晚充賓貢金鸞恥司晨天馬辭羈鞚歸來洗肺肝泉石聊可弄十年不見公夜夜勞飛夢又仲文懶修飾政喜從俗嗔偶然過荒齊略語已可人讀書五行下交久意愈真門單力役重鬱鬱懷不伸賃傭以月計寸取如魚鱗剝床已切膚范甑空生塵誰與告巨公援出清波津天髙日月速天也胡不仁冬夜寫懷簡清之弟我年十二三事母極小心兄弟尤知愛同床僅一衾中年忽逺别海嶺音沈沈歸來悲喜集淚下霑衣襟老大以為期素髮各盈簪胡不日對酒人事好﨑􅋂年光催發棹悲來不自任展轉復展轉風振簷鈴音再用韻謝吳長孺寒風攪旅舍夜月搖歸心更長不能寐攬衣無重衾周南嘆留滯寓迹非陸沈壯士歌易水感激義盈襟字行偶有合邂逅成朋簮古人貴淡交世路多嶇􅋂平生汗血駒道逺當自任非君願寂寞嵗晚畏知音諸生社日約遊東郊分韻得九字東風吹草青胡不及老醜霜莖日夜生壯志嗟負久諸生强我遊良辰共杯酒林塘過午寂鳥鳴向髙阜腰頑漸可伸亦足開笑口平生坐綺語未畏龜首九揮手問天公何者端不朽願言尊所聞浮華付芻狗入祈山簡程南山兒時侍先輩游咏風泉間蹉跎五十年日夜雕朱顔六經浩烟海何能窺一斑後生益寡學嗜利爭觸蠻讀書被笑姍短褐慚雕鞍槃槃河南公孫枝長琅玕從師已善問下筆初翻瀾吾兒年十八編簡苦研鑽兩門有書種稍稱儒家冠吾曹老何恨但勸長加餐縣博吳子剛坐雨屋以詩來輒和四首兼録呈邑中諸士友杜陵拙治生屋漏連床床朝來勢愈急傾倒河漢旁四野漭為壑屹立祈山蒼倚欄一舒眺輕翾羡鷗行又北斗不挹酒七襄那用織人言越瀛島相去豈咫尺衆方􅕽虛聲君獨尚古色可憐倚市門却笑繡紋刺又積雨潦盈屋民窮嗟剝床蝌蚪産竈下蚯蚓升階旁吳君後來秀文字兀老蒼紛紛俗學徒數墨而尋行又雨久懶出門但覺愁如織清溪走渾黃何翅髙百尺魚龍自驚恐雲樹那辨色中流漁家婦船尾亦解刺寄鄭子美鄭君熊虎姿痼疾居煙霞老天畏竒崛而乃斂爪牙四大願安隱觀妙維摩家趨庭近朝夕勿藥岸烏紗但恨遊吳人孤此雲窗茶又中年愛巖棲蛙步不出步誰能驅使之乃向吳門路平生鄭公賢作尉歌來暮是父生是兒問字滿戶屨語別遽相違悵望烟中樹程南山手痛呻吟殊甚先君子嘗苦此疾忽爾觸懷江南地卑濕重膇什八九疾痛欲呼天呼天聽之否遐思四十年父疾痛在手張燈為摩尉典衣沽美酒酌殘稍安穩酒散復何有至今夢寐間恍聽呻吟口程公天戮民據床誰掣肘真宰惡雕刻罰作獅子吼天風吸梅溽晴光泛疏牖珍禽啼樹顛祝公千百壽宿胡村口憶汪處謙暮投三家村熏衣聊乞火山樓半宿雲風回墜殘果喬松不知年霜筠如許大民窮耄耊耕幽谷魑魅過泛醪水爭清秣馬僮倦銼魂驚屢展轉長歌誰與和自憐羇旅中身同蟻旋磨遙知長洲人擁衾猶未卧問余來何遲數日艤江柂夜宿仰村始見江水安流溪行畏惡灘驚波柂欲折篙師自駭汗客子咸失色亭午過睦境潭清見魚鱉同舟稍笑言快士飛玉屑夜泊仰村口石壁黑如鐵夢回俯安流漁燈互明滅淡月漾清波澒洞浮白雪人生足憂患過者帆檣閲居然餘一嬉申言警前轍風從蘋末來且濯中宵熱登釣臺羊裘輕衮衣臺石重鼎鉉加腹亦偶然誰令客星見蒼茫夕照間猶見先生面心惟在江湖足不躡金殿巢由去已久士習趨苟賤固祿甚乞墦紛紛競麟楦名節始浚源黨錮終成傳士或甘義死恥共朝花變炎祚賴苟存往恨逐朝電萋萋臺上草嵗晚青自獻范公侈雄文一字金百煉重遊嗟白髮素壁敢自占燕市求良弓疾讀有深羡與友人論詩因成五言奉寄稱隱府判無日不把筆無日不作詩於兹五十年毁譽常半之江湖諸大老吾友亦吾師機鋒倘相值喜極摩白髭經史擁卧內理窟容可窺化盡至無迹斯乃稱神竒善沒至海底始得珊瑚枝晴空轟霹靂驚走世上兒或來問詩法正爾吾不知汪侯五年長蒼顔仍秀眉憶昔童丱日精舍相追隨公能早悟入大吐瓊琚辭遺我紫陽篇滿紙含風漪思公不可見此意將告誰又有客為余言詩也何所用溫柔養性真絃歌資詠誦古人浩浩去花鳥分晴哢今人浩浩來各自出機綜人面詎能同發矢必竒中騷雅正大宗漢魏亦羣從陶韋尚沖淡黃杜千鈞重平生三千篇莎徑咽寒蛩或人嘲余有耽吟之癖者聊以自解上天出雲雨祇在須臾間江漢流滔滔日夜不得閒物大聲乃雄吼地南山斑寒蛩咽幽草百鳥鳴間關孰非天者機强遏斯致患一日不作詩有如廢朝餐積之五十年簡牘髙於山平生傲孤枕禀性拙且頑問君胡能然嵗晚肌骨完吐辭輒成章自知不作難再拜謝或人抵掌翻狂瀾筠軒集卷一
