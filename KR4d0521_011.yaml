body:
  text: 筠軒集卷十一元唐元撰說余志賢晦村說上饒志賢余君嫉世之機巧衒鬻以自詡者故晦其村以居之間嘗俾元疏其義元謂閉塞成冬雷在地復必極乎嚴凝而後陽生焉東方未曙大星將沒先以昏黑而後大明出焉故曰晦者明之母明者晦之子先正謂無極以前為陰含陽元不始於元而始於貞意殆類此易論箕子之明夷而得其用晦而明之義蓋晦於殷雖為奴而不辱明於周而禹疇以之有傳武王之養晦與顔子之龍德而隱因其時而為隱顯道何異哉計君之晦其村為未足必晦其室焉晦其身焉以之寓於起居衣服無所不用其晦焉是故居則晦於繩甕衣則晦於緇垢巾則晦於墊角履則晦於下穿琴則晦於無絃壺則晦於刓缺無一而與時俯仰又不知是間之山川草木其果甘於君之命晦而晦者耶其亦强承君之命號而兩難耶是未可知也詩曰昊天曰明及爾出王昊天曰旦及爾遊衍是何天示人以昭昭而人以昏昏自處耶老子曰良賈深藏若虛盛德容貌若愚又曰大巧若拙大辨若訥與晦而明一而已矣吾故曰嫉其世之機巧衒鬻以自詡者其欲還其淳而反其朴志賢豈真晦乎哉醫者孫仲仁字說仁之為說舊矣儒者論醫書以手足痿痺為不仁最善名狀此言一氣不貫於四體則壅滯乖張而疾生焉凡天下罷癃殘疾顚連無告其將坐視而不顧歟抑將起而救之歟然欲起而救之必在位有力者可為豈閭巷之人可及哉故惟醫者為近甚如救焚援溺亦可以觀其所存矣自古任生人之責在君相當是時民無夭札憂今稽諸岐黃之經是已後世誅求征役毫分縷析於米鹽竹木間其所以活吾民者一聽其自為若秦越之相視肥瘠者獨貞觀主視明堂針灸經而慨然有減於鞭背斯庶幾焉余竊謂古今之號為醫四一曰神醫二曰良醫三曰世醫四曰時醫扁鵲授禁方於桑君飲上池水見垣一方人太倉公受禁方於乘陽慶五色診病知人生死故曰神醫古者以一種藥療病即造其微如屠牛坦奏刀而衆理解若開多門以偵伺之則恐非是故曰良醫醫不三世不服其藥所謂醫門多疾者以其收效者衆而信之者篤故曰世醫乃若揚揚驕氣偶值時行招之不來益自珍異則又量其資貨以為輕重謂之時醫醫奚暇問仁不仁哉同里孫仲仁生於世醫之門蚤得良醫之訣溫乎其容而確乎其言也不肆不詡以自將不震不竦以求功與余交稔甚屢請為文而未果顧仁之義大有不易言惟力行於藝業之中汲汲焉有濟物之念起虢之功豈容越人專美哉故為仲仁字說以歸之徐至剛字說易論三才之道陰陽剛柔仁義而已故剛為乾為陽為君為父為善柔為坤為隂為臣為子為慝在人得火金之氣多而性剛得水木之氣多而性柔然剛不可偏柔克之柔亦不可偏剛克之而後成夫正直之德舂陵周子於是乎又有剛善柔善剛惡柔惡之論無餘藴矣孟子善養浩然之氣以直養無害即乾之剛健坤之直方大者耶吾友徐生從學於余且再朞矣尊翁敏夫府推比執别山莊請為子易字與名僕謝不敏乃言曰生性稍柔柔則恐緩不及事故行千里之途者志先立而後氣益振計日以至焉是志為帥而氣為卒徒也請名曰至剛而字直卿知乎此則善柔之為友色厲內荏之為心者皆可謝去也以直自養而交於人者無往而不直也夫剛不以義制則近暴直不以義制則近愚子去而無少惑乎哉汪信翁字說碧崖汪公之季子國錡字信翁鄉先生嘗序其字矣余近過其門以先君子與君家忝世交乃踵其門明日報謁如禮復請為說謹不敢辭夫禮有器者必先其誠誠為重器次之故曰苟非其人道不虛行其誠之謂乎錡一也蘋藻之薦詩人詠之左氏又言之器也有誠焉苟有明信可以薦鬼神羞王公與詩言有齊季女同一義耳余嘗怪左氏論周鄭交惡信不由中堂堂天王下質小國履鮮加枕甚矣何暇論其信與中哉先正謂丘明以事論事不復尋究義理重可慨也雖然稽錡釡之用而逹明信之本與黍稷非馨明德惟馨皆千載不磨之正論吁孔門以兵食可去而信不可去錡者食之寓也信者民之常也居家承學淵懿聞此熟矣其勉之哉毒鼓菴說聖人仁治天下瞿曇慈憫衆生其道一也而有異焉古者畫衣冠而民不犯使吾民畏法如避江海當是時地獄果報之說未之聞故推而創是說者自瞿曇始其亦禁民之非而為善歸耶又懼夫人之不悉聞也於是以諸毒塗鼓用曉聾瞶其使之入耳著心而有所懲艾者耶在易有之聖人行師毒天下而民從周官痬醫用五毒而疾愈彼以毒攻毒而去之而非藴毒於中至於潰爛而不收亦明矣嗚呼深山大澤有龍蛇之毒羽族有鴆鳥之毒草木有鳥啄之毒微而蜂蠆亦能螫手然善避之則人無所犯而毒之尤者惟人心為然人心本無毒也氣拘而習染焉故有心兵笑刀之喻奈何人不之悟而疲津梁者深愛憫焉吳郡開元首座毒鼓余近識之而竊怪夫號之駭也曰吾師取涅槃經語而錫吾名吾教視之固其常耳上人嚴冷有林下風特徴吾言而余與之異教苦未究其義姑以見聞所及者復之雖然由致毒而實無所毒由聞鼓而實無所聞子之師言詳矣余何言哉魏君實謙牧齊說牧有字養之義故牧牛羊者謂之牧州長亦謂之牧坤為牛兌為羊牛性順故牧者易制羊性狠故牧者難為以至不齊之衆而繫於一夫之手其所謂牧者皆在外者也惟人之生驕氣盈各氣慊忌嫉者志不廣好辨給者言數窮而其用意與好謙者不能相通夫謙在我者也能祛夫人之驕吝忌嫉而辨給者也六十四卦謙不言凶則君子之所自牧從可知矣蜀士魏君實今為吳人平生好讀易一夕隱几而寐若有告者曰世人美稱宜無踰謙牧子其識之乃徴其說於新安唐元元謂之曰君為吳人讓之為太伯乎故古今稱至德異時延陵季子父兄之所屬望而亟去之遂使宗社為墟是謙之過而不能裁之以義也苟知謙為德之柄則事無過中失正而鶴山之祖風不墜矣銘齊自警疇不謂宜施宜之雅山說詩有小雅大雅古者朝廷郊廟之樂歌也雅正也小而宴享大而蒸嘗皆禮文之正也在易艮為山艮有止之象止為山之體止得其所則正矣故艮之初爻曰艮其趾無咎利永貞釋傳以為未失正也然則山之雅者正之道也君子持身以正者似之宜之施君吳郡翩翩公子也别墅在穹窿山側有支阜曰雅宜山乃取雅以名齊宜以字行君早生紈綺而能去泰甚謙謙謹厚宜為吳産之良也抑聞仁者樂山山之體靜而有常其效可得天年之永夫詩之雅易之艮為仁者之資也名下無虛士君其思之句容杜彬叔菊泉堂說余飫聞杜彬叔之賢而未之識已而稚子桂芳客授其門君以菊泉榜其堂而請余釋其義乃為之說曰嘻余聞菊育黃華異乎衆卉泉出山下恥混于濁是二物遍穹壤間何好之者為竒而樂之者不多見也子獨不聞採菊悠然而見南山者非晉處士乎自臨釣石而取深清者非蘇長翁乎悠然出乎無意自臨無與于他人論者美淵明為千載人東坡為百世士彬叔兼而慕之可以知其為人矣抑猶有說菊曰壽客風霜凌厲晚益馨香泉號清流石淨沙寒鏘鳴石竇是壽而清者夫人之所願欲而士君子之所嘉尚也雖然侃母淑賢愛子剪髮躬勞運甓自力功名其後有淵明則休官晏如恥事二代老泉﨑嶇西蜀辭駕風霆晚試一官位不償德其後生坡公則風節峻厲髙視九流今考二賢之所自出甚不凡矣宜乎子焉孫焉好焉樂焉之不多見也固異乎世俗紛華之悅成其身而不自覺也由是而知君之尊生有道矣安處善樂循理以廣養壽之源定泰宇發天光以造至清之境惟清故靜靜故壽聖言可法也菊耶泉耶其假二美以自鑒者耶况飲菊潭而壽者有前言之足徴耶吁余老矣他日或過君之門掇秋英於􅌬醁分小杓於夜瓶試扣夔州以後家法何似彬叔尚肯以刀圭乞我否乎遂為說刻諸楣間汪璜隱兩峰堂說吾觀天地覆載日月代明山川流峙寒暑更禪莫不以兩所謂一故神而兩故化也易上經首乾坤下經首咸恆兩也邵子論太極兩儀以上為加一倍法兩也同心之言其臭如蘭一人行則得友非同門合志之道乎下至羽毛鱗介咸知所偶植物么微枝葉相當猶有聲氣之可求者豐城之劔望夫之石其精神所通有出於聲氣之外者夫孰使之然哉吁兼山之艮聖人有取乎數千載上者則盈乎寰區又奚止乎松蘿天寶之兩山耶然究其鍾竒藴異必不獨在於草木之靈金寶之藏而實係乎其人此吾畏友璜隱公所以名堂而亦何嫌乎自任之重也今觀其雄特莊毅兩不相下而羣峯俯伏不敢少抗其為海寧之鎮望冝哉公日為余言將謀移竹二百箇蓄書二千卷置長短琴二張茶爐酒榼種種對設棋枰壺具不俾孤立庶求以翼夫兩峰者公且日宴坐其中不知年嵗之我加而老境之將至也公兒古言古文古行古不媚時好得魯兩生之義其庶乎無愧兩峯哉同郡唐元與公同年生相知最久故不辭而為之說跋題二子徐桂與張定夫漁梁泛舟圖道義之樂無窮朋友之益甚大洪濤際天一舟如葉豈非朋友之益遂忘風濤之險耶雖然苟明需有孚之誼濡首之戒入乎坎者敦若出坎之為安也二三子其識之題太白圖太白蜀郡人或曰山東人平生倜儻豪邁好劔術任俠不自拘檢吾嘗評其為人如東方朔詼諧避世之流觀其醉卧溷迹於市人奴視髙將軍而不顧存玩世不恭之意然武帝能容之而明皇不能用之也豈太白猶病於介而未若方朔之通耶困謫夜郎氣不少衰世傳委身自沈事與屈子異或謂其托水仙以自化誠耶否耶然其為詩閎肆雋偉沒世遺榮千百載之下凛凛然猶有生氣也書程洺水遺范甥可起字說後按爾雅母之考為外王父母之妣為外王母然則舅視甥若從子甥視舅若諸父以其同氣也昔人有以額類外祖者王筠之於袁粲是已有酷似舅氏者何無忌之於劉牢之是已此特其淺淺者若楊惲讀司馬遷史記而頗為春秋李靖與韓擒虎論兵而嘆其可語孫吳可謂機鋒交值肝膽相照又何深哉世之為名父子正不多見况甥舅哉比讀鄉先逹翰林洺水先生與彌甥范氏翰墨其以詩書之澤期望深逺傳至壽朋久而不墜山前山後惟有清風無恙想分半席還肯借我茶具否願相與談程范瓜葛幾世于兹岐黃之術與六藝並行似不當為之優劣也燕叔毅練江送别圖引天地間流峙為山川今山川猶古山川也人生而寓諸别離古别離猶今别離也圖本無係於别而好事者獨先焉蓋有以考其人之賢否與其交誼之厚薄夫豈苟然哉練江源出鄣山東流至海經子陵之瀨直走浙江是為江東大州古今文人逹士來逰有暫數意緒有戚忺不可强同然欲灼知其人之賢與其交誼之厚者因圖而益顯其可少乎哉燕君叔毅自其少年已能奮筆入科場科目廢格乃刻志吟咏聲流烏府用薦者言久而不報於是親年老矣遂不擇祿置身刀筆兾展所長然恥狥時好所向不合始繇徽郡改調姑孰同志嘉叔毅之賢不忍其去圖以識别且徴余言以贈其欲君張之屋壁以寄異時無窮之思焉余昔逰宦道出青山觀其鳬鴈魚蟹菱芡荷藕充溢于目天其假子以養親遄疾其驅可也伯羽仲羽余寅好兄也先公植竒石于庭君其候問無恙念疇昔相從長橋之縱飲南潯之秋泛步出蛇門行金陵市俱可繪焉而未遂其果少耶不果少耶宇宙茫茫行者不息鍾情正在我輩爾吁跋李伯時摹劉商觀奕圖有如是松石犖確物外境界也有如是衣冠對奕物外散人也被褐翁惟知拆薪初與何事今袖手旁觀似依依不忍去者其未能忘機耶機心一露與伯時臨摹茅生勒鐵坡翁所題皆贅又使余不已於言得無重贅孰若今劉商者持斧入林作丁丁太古音泯然於心迹之表使大蘇公可作必賞余言為之噴飰滿案跋樂天九老圖同里清父蔣君出家藏九老圖示余俾贊一辭余展卷三肅喜獲觀唐人衣冠之異且以浮屠氏蝨其間風韻幽雅令人絶念世網樂天其領袖諸賢者與按公被遇憲宗時事無不言湔剔抉摩多見聽可晚事幼君偃蹇不合虞人之針雖殫忠藎而新井之篇已萌禍機矣號香山居士於摧挫之餘招胡杲諸人於引年之後然以直言動前旒中人喪氣偉績著名郡惠澤旁流其在唐史已不多見嗚呼賢矣哉其後洛陽耆英圖形於樂天故宅而司馬諸大老莫不許其負志氣之髙嘉其有緇衣之盛或謂十二賢之會與九賢爵位有崇卑之異焉洪範言壽而不言貴貴外物也清父曷以是而曉之陸太初家藏米元暉山水晉帖自唐陵出竹書自汲塜出與夫名畫出於忠義之家而人異之何也物由人重也里先逹府丞陸公諱夢發字太初由科第而仕於宋平生善為詩博洽負氣槩虛谷方史君兄事之不幸奉朝命沒入蔡氏私田餉軍竟為鼠輩所殺承旨官其子無何而奎運銷歇矣去秋八月友人危君太朴乘傳下郡國搜獵三史事蹟余嘗以盧諌議陸府丞二公忠義語之儻以入之殺青公死猶生也所謂名畫者元暉筆也其賦七言太初筆也景山合人與物而兼寶之亦可謂好事之君子矣讀魏公輔詩藁跋僕生晚讀書未多近嵗始得先正鶴山先生渠陽自齊等集閉戶讀之數月大槩其文根据六經而沈浸於關洛考亭之粹及閲奏議二大册惓惓以理義忠懇補衮闕格君心豈止詞章而已哉然所作子雲墨池極論易𤣥同異後生晚學讀之懵然則其詩又豈留連光景者所可仰視三世從孫公輔君頃㑹鹽官出示詩藁碩人叙引珠光玉瑩僕何庸贅辭君詩清熟類多許可然鶴山翁超軼絶塵獨融之以油然之理趣其家法猶在也僕欲學而未能㑹還吳庠假尊經一榻秋髙夜涼青燈對誦益共勉之題長洲尹王公晴雪圖天下至清莫如雪騷人墨客類深愛之然長安貧者所不願多見茅茨之下得無袁生之居乎恤民禮士茂宰事也長洲王尹留意此卷宜起敬矣題赤壁圖赤壁爭戰之地千載崢嶸想風蒲雪浪令人易生感慨坡仙前後兩賦可謂能吐胸中之竒者其與周瑜乘勝意氣不相上下此卷寫湖山景致特為嫵媚向使長公作賦於此欲須江山以為助吾當三呌於其傍洪存心婺州送行詩跋親莫親於父子能則知教得則思與如耕者寸寸而耨之切切而望其斂穫也有國者知其然於是開父任之門酬勳延賞階升序進官無崇卑俾之盡悴報國一而已矣里先逹耐軒洪公尹東陽時奉大府要束更新倉庾穹固嚴正官賦所儲至今賴之垂四十載而孫在來主倉曹人語君曰官庾先大父所作君知之乎君起而應之曰某不佞祇役于兹惟當夙夜警省求無愧於先人耳居有間秩滿受代婺之士友葺詩以贈蓋知洪氏有子能世其官者余為先大父令君托比鄰好與令考君潜齊公忝筆硯交生子如孫仲謀吾兒豚犬耳存心屢執籌算戰兢自持况日夜磨淬世學將懷利器見知於明有司豈與區區廪委者比哉讀是卷益知其人宏逺大之業在此而不在彼也存心其字也皇甫德剛黃山送别圖跋大凡山川之竒特不在乎通都大邑而在乎荒郊寂寞之濵於人之所好者不在乎彈冠結綬之徒而在乎倜儻迂踈之士蓋由物之異者往往離羣而立於獨而於嗜之深好之篤者可以觀其為人焉黃山去新安郡城百里其神仙之往來龍蛇虎豹之詭怪溫泉之觱沸靈藥之叢産其所謂菡蓞金芙蓉者橫陳天際千岡萬嶺皆所拱伏而子焉孫焉者也垂白之老或未能一造其間但朝夕視其儀形抗逺思於埃壒之外不啻足矣間有占危而入如㳂笮橋以行蜀道十步九息拊膺坐嘆可勝言耶比嵗趙仲簡歸姑孰里人洪生繪為圖以送别今皇甫德剛之錢塘洪生又出新意以寫繾綣之情好事者從而歌詩之徽水之源三如鴈爪分馳㑹郡城下東赴浙江以抵海門然則挹黃山之水以釀酒材杓黃山之泉以烹茗飲染黃山之雲以泚筆札孰謂僑居非黃山之人哉德剛早出齊魯之邦氣習深厚來逰紫陽之墟必得異聞為倜儻識時之俊茂日即吾儒迂踈者同其嗜好其無愧乎三十六峯哉因其請言之勤輒書末簡云題三蘇公小影老蘇公面目嚴冷方作辨姦以攻金陵長翁忠義輪囷熙豐不合元祐可以合而猶不合次翁宰績邑時為詩三十六憂國願年豐之意如陽和著物胸中坦然舒徐剛毅似覺不同古今人但謂公父子兄弟自為師友以言語文章妙天下不知其節槩隨所處而安之子由豈以苟免為一日之長乎哉朱府君遺訓跋死生一晝夜理也佛氏宗寂滅夜而不晝老氏學長生晝而不夜惟吾儒有晝有夜是謂逹生死之際夫知所以生而生之理順知所以死而死之理安既順而安非醉而生夢而死比矣然世固有杳然逝而精神不亂者千百無一二人由養之有素而深逹夫生死之理也克用朱公先府君儒者也臨逝遺言所以自序而貽訓者用意至到結字勻整揚揚如平時可以觀其所養矣余因玩清苦二字而有得焉夫清則不汨于流俗苦則不慕乎輕肥以是自持則理義日明操守愈固舉凡天下之榮辱利害禍福過乎吾前皆不足以動其心真傳家之異寶世守之良規也克用方承寵光來戍吾郡於講武之餘而不忘儒者之素業衆人慕輕肥以為榮吾獨以清苦自厲與布韋無間然君之用志𢎞矣能世其家矣他日所至其可量哉題羅郢州撰吕侍郎祠堂記後吾鄉先逹郢州羅公嘗為吕侍郎記其祠且謂得洞賔為二世孫益使人敬心惕然是矣然侍郎為州司馬利祿不入于心乃能脫囂埃讀書水西郭外其髙風雅韻便可祠事百世初不待其孫而後顯也捨堂為寺官滿而然其求福田者耶余暇日因携生徒兒輩摩挲苔井而去跋胡石塘先生贈章潤翁憶昔說往時同舍畢生為僕言石塘胡先生議論風致髙出人表其為文倣先秦漢史雄深雅健莫齡益自珍閟不輕子人䝉莊所謂驪龍之珠深藏于淵惟遭睡者得之非有意於人潤翁之得於先生殆類是耶曰不然前輩文章川停嶽積往往有所為而作亦以其人之可受而授之耳潤翁辭親逺邁將及周星比獲至寶以歸得無嫂下機而竈婢驚走者乎僕願識其人惜乎修文地下矣故重為慨嘆而書以歸之跋桂仁仲母壽氏貞節詩卷驪姬夜半所私之言人所不知後世何以知之襄夫人匿愛公子鮑之心事所未形國人何為使之奪嫡一言之辟幾至亡國一念之辟幾敗天倫猶諉諸欺心而欺人罪可容誅哉春秋聖筆所書宋伯姬卒且冠夫諡而書葬時伯姬年六十餘猶曰婦人之義傅母不在宵不下堂卒逮乎火而死與詩所載衛共姜誓死靡他者同一風節吾故曰春秋之志微詩之志顯所以為禮義之防一而已矣下視驪姬襄夫人輩不啻犬彘七子之母又將何顔面見我姬姜耶至治二年冬余始識桂君仁仲出詩文一通曰真節壽氏題詠且徴言於是引矚動容而言曰未亡人壽氏枕夫君尸股而哭之言之心與夫告母以誓不相見之心之言仲尼可作當與宋伯姬列書而柏舟之詩不絶響矣吁巴林龍畫題詠跋夫龍靈物也能隱顯小大噓風雲激海水而上之世固有不得而見之者矣故比類為聖人而麟翁嘗以是而贊老聃氏嗟夫山龍見於舜服龍盾見於小戎此龍之為畫亦甚古也余竊怪上古至治龜龍遊沼而海濵之人龍挂於秋仲惟見髣佛若全體呈露則滔天為灾其遊池沼固未敢盡信今世畫者又能一一肖似於頭角鱗甲間何從而得真耶雖然龍有豢氏則人得以擾之固可褻而觀之矣伯亮䝉古氏暇日作此卷徴同志題詠且請余為叙首余謂人不可得見之者神龍也豢而擾之者可以烹而食之觀伯亮所畫噓風雲激海水隱以自居得無近是歟題亷守所得東坡逰赤壁圖江山草樹雲石閲千百載而形不可變因人而榮多矣然江山草樹雲石正不自知其孰榮也大蘇公文章妙一世赤壁之逰人境俱勝後之畫史追其勝於毫素間以極夫江山草樹之榮必東坡其人始識之此卷藏之恆陽王家所托重矣書胡氏家訓卷末延祐丁巳余始識相之胡君於中表黃氏家觴行聞其議論秀發若决江河而東注也若摩旟擊轂而赴敵也既而鄉試回同舟促席讀其詩文侈而有制約而能紓意其有受者焉後六年為至治壬戌之春俾其子泰初出示先大父知丞與比部公家訓書為涪翁勸學後語毋慮二百言真世寶也名父子自為知已後先顯融里人至今稱道之相之又能厲學飭行收其故物而不墜厥家君子於是乎知胡氏有子矣因念總角侍先子嘗以考亭遣子從學金華帖一紙授不肖令朝夕熟玩如曰至某郡謁某官某丈某丈其進退必恭唯諾必詳緩市肆毋輒入重邪暗之戒濟川靜俟味需有孚之辭乃知巨人長德垂裕作則於先正知丞公一迹合軌然不肖茹哀餘三十祀異時授簡猶在篋間獨恨與時馳於道不近故於相之重有愧云安氏家傳朝服書于卷末余家粗讀詩知衣服足章其身由上之所命者良可貴也其在唐國風曰豈曰無衣七兮不如子之衣安且吉兮豈非請命於天子者異於常服歟其在秦國風曰君子至止錦衣狐裘顔如渥丹其君也哉豈非始為諸侯受顯服而國人得於創見而驚喜歟候人之首章曰彼其之子三百赤芾其二章曰彼其之子不稱其服是其受命於朝者雖可貴而容有可刺也嗟夫農之於耒耜工之於器械下至閭閻之小人勞形治生僅積贏餘尚為子孫計况士大夫哉安氏為濟南大家世以清德聞始由叔祖朝列公以緋衣傳之淡軒中議公再傳之京推承直又傳之今丞歙邑忠翊忠翊實朝列長孫也三世四傳不知幾何年然愛護彌謹觸手尚新視晏子一狐裘三十年可無愧也莊生有言有干越之劔匣而藏之不敢用者寶之至也今安氏朝服奕世有傳而用愈著其為寶也至矣後之人修德以為寶則詩人之頌美宜在君一門其尚勉之哉題前徽守髙公守拙詩卷始髙侯守吾州適與䝉泉許公相先後䝉泉魯齊許先生髙弟也為政專尚寬惠居三年民大悅服時南邦內附未久治新國當尚用輕典侯一法公度與民休息故徽之人士至今歌兩侯不置口後三十餘年始識侯之子於吳乃翁以守拙名齊其治徽時固嘗得拙之用矣漢世參勃諸賢椎鈍少文至吏言刻深輒斥去故能成漢初之治今觀侯之為人殆參勃之輩儔歟此所以為國初之賢牧也吁艾幼清汝東樵唱詩跋昔人有言讀書萬卷而不用於詩畏其義博而辭溢也夫詩有别材本於性情觸物而發故曰言之精者為文文之精者為詩然觀少陵言讀書破萬卷下筆如有神益知學詩人腑肺非得古今灌溉理義融㑹則如貌枯語澀於善養生人不類頃識幼清艾君授余唐藝文若干卷俾校正上之儒臺喜其博洽多聞略見于歌詩枯者以澤澀者以辨其有本矣或者以幼清儒家而混迹隂陽者流殆未知幼清者伏羲觀河圖畫八卦兩儀立而隂陽具故八卦為萬世言天之原而六經百氏所自出然則幼清豈直為區區俗師拘忌之說哉吾非瞽史焉知天道知天道之所以然惟儒者能之地理李谷隱詩卷跋古之人以賢愚壽夭貧富懸之天由氣禀有清濁厚薄而使之然後世隂陽拘忌之說勝於是以壽夭賢愚貧富委之葬地亦以地之偏正厚薄以明之懸於天者修為責已委於葬地者去就吉凶係人惟吉凶求責於人重而人之求償於我亦不輕雖有忠厚之人鮮不利其貨而移其心如是則宜富益富而貧益貧柄是術者得以私於人矣然事有不然以富人捐千金而求地何施不可然亦有時而貧悴貧者送終或丐一席之地姑事掩藏而其後亦得昌大豈盛衰循環而盈虛有常理歟抑由修為苟契於天而後獲地之冝者歟抑其偶然歟西江李谷隱比入吳過寓館論地理如禹導山川深知脉胳故因其形見之方圓聚散以為取舍進退髙下無不中理視千金之家未嘗利其貨而移其心雖窶人亦與之謀而不少吝吾知谷隱之術行而人知避就矣故贈以言題張梅趣唐馬畫馬止於唐詠馬亦止於唐曹韓之入神猶少陵之入神也後世所謂唐馬者往往能逼真獨少陵諸詩歌橫絶今古作者竟不得近似豈詩難於畫而畫難於詩耶觀者當有所辨常孰州徐仲立致爽堂跋典午尚清虛厭煩局其人風度直超塵表故肥遁之士聞而慕之然在當時公府賔主間率以此相髙主之見賔他未有及問在東米價賔之得主不以料理為務曰西山朝來致有爽氣至視儒術清檢為鄙俗徐君仲立以致爽名堂逺慕晉賢風度固非區區勢力可軒輊者雖然君而今居仕隱之間其致爽固不難也猶當以心㑹不可以力致致以力則如捕風追影不能詰竟㑹以心則內而耳目鼻口肢體百骸外而盤盂几席琴瑟書册是皆朝爽絪緼耳異時君出筮仕斯爽既致融之為清明志氣之神酬酢萬變發揮世業冝不暇與西山俯仰矣僕方擁坐齊閣駸尋霜露猶懼其爽之過取也願與仲立商確之跋先君子梅癯先生講篇後至治初年辛酉八月哉生明偶閲家中舊書得先君子梅癯先生講篇論孟子浩然之氣特詳意其賔序紫陽書堂時也孤不天今三十年讀之凄然以悲元為童時嘗録先生詩詞作一巨編中更乙未郡燬弗存他如理學諸文多所發明具載六典精義猶得為手澤也後之子孫寶之題清之弟梅圖先君子自謂標格爽朗號梅癯翁學者盛稱之年四十餘生仲氏復小字曰清喜其類已也是圖之作寄意實深盤根直幹端嚴自持有父道焉旁枝傑出踈花相依有兄弟思焉諸君題詠日積然未有喻其意者余始發之而凄惋甚矣孤根暖回生意不斷詩不云乎無念爾祖聿修厥德子孫繩繩其愛護之筠軒集卷十一
