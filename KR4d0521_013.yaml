body:
  text: 筠軒集卷十三元唐元撰鄭震父資深堂贊自得之學由益而彰所資者深愈出愈長始由心悟履若康莊如彼積粟有千斯倉如彼植木連林蒼蒼隨用隨足顧比探囊惟兹書燈再世耿光得為己有幽貞永藏久蟄斯奮我車我航在昔陶朱治生有方助邉卜式爰拜為郎我其噬膚彼淺易量歸構吾廬榱桷煒煌居仁之宅惟義是彊養爾靈龜永世其昌吉雲贊水土輕清之氣下生於地上浮于天非煙非雲郁郁紛紛是謂卿雲殆為中國聖眀出也至正初元嵗在辛巳日在戊辰時在未申之間黃道按節欲側未傾唐子步于庭外乃視寥廓凝碧蕩銷氛翳若翦衣剩綵落落勻净若魚龍透浪甲次鱗集若浩劫之園琪花玉樹磅礡巨麗已當飄落投軒委陛上界仙官怡玩良久不散俾下土之人俯嗟仰惜目睒神駭雖辨喙不能道神變絶藝不能模倣佛唐子曰異哉吾所未覩也按雲氣出江淮者正白其青潤蔽日于西北主舉進賢良今考其色初白輒漬微青地屬大江以南而指燕代之域賢良之士其際文昌之運而彚征歟稗官小說古所不廢宜上之太史氏乃作贊曰山川氣騰為裳為衣翦之裁之天女之機爾神駿奔捷出瑰詭冠日依霞吉祥止止題淵明小像晉俗薄禮教公則以彌縫使淳歸之魯叟輕倫類則遣一力與子而令善遇之酣麯糵賦止酒篇以見志典午有是人哉今觀小像其不忍義熙而書甲子之意鬱鬱在眉目間三季以來信不多得吁題朱仁仲小像今人今服內保真醇瞭然其視頎然其身謂為仁仲耶屢扣之而不見答謂非仁仲耶則既呈露乎毫端之春是為主靜之靜求仁之仁庶無愧乎儒紳題巴林水墨龍虎圖噓雲而興澤周八極成功不居寒潭晝寂奮威利爪百獸莫當風低黃蘆慎汝行藏巴林䝉古人有畫龍題詠卷余嘗為之跋太原王才塑工贊夫繪事古矣像設焉非古也金鑄木偶焉古矣土焉非古也尸法不行於後世自𣆀笁鬼神之說勝之也嗟夫日月星辰之為服龜蛇之為旐龍合之為盾以至圖形求相斯繪焉而已太廟之金人芻靈之易俑斯金焉木焉而已考之尸法為祭物有異數禮有異時固未嘗數數蘄於鬼神也是前數者古人特寓於制度警戒求賢之間而非像設之為後世五祀社稷之主無預矣呪誦喧呶金帛雜施而求為福田利益者比比皆是豈古所遺巧而今之為技因時出焉安知楊惠之之徒不再生於僧繇之門而殆猶過之者歟余聞塑畫同出一法皆足名家近世中州塑工精妙逺甚觀其飛土為像切中繩墨殆與承蜩弄丸斫輪去堊同一工巧余方欲識其人而未獲適吳郡府推張公告元言曰太原王才字大用是其人也天性機警塑技實超等倫則凡風雨明晦陰陽之慘舒喜怒歡怨情思之通鬱一發指掌故能倣百物窮象罔意之所詣磁針吻合其大而為天人為聖為賢為佛菩提為金剛身小而為霞為雲為弓劔為鈴鐸翔而為鳳為蛟龍馳而為獅為象為馬變而為鬼為神驚心怵目無不曲盡其妙然後知大化生物之心亟探遽取不可殫詰彼其進於技一至於此亦神矣異時仙宫梵宇以其像設巨麗飾以金碧熏以苾芬佐行其教往往曲意迎導流盻羣工莫與爭能豈偶然哉余又聞前世綜核名實至于技巧工匠率精緻完好其由上之所化人人各自為意毋庸苟且明如離婁巧如公輸相傳千百載之下不與草木就泯王氏其登兹乎昌黎公為圬者作傳子厚亦作梓人傳於昔有徴乃為之贊曰兢燕山之陽是為長春其俗果毅爾性其純埏埴作器本濟吾人藝精一代為鬼為神鬼神伊誰明天地性方趨二氏羣䝉歸正孚顒假廟俾民知敬藝諫時須旁敷厥聞桂巖上人贊并序瞿曇老子好居旃林至聞諸妙香而得阿羅漢道是香於髙僧大士每有利益異時論色聲香味觸法為六根之纍必極於空空而後已何哉蓋學佛人塗耳目去愛戀始能不墮邪見而入於精進之地則是香又或為法身之贅者非耶大抵吾教於視聽言動先察其法不當為戒謹甚嚴則塗耳目去愛戀而一至於無者固異道也常熟之慧日院有僧秀號桂巖取旃檀林之似而有志四果聲聞之教則世之所謂花之最清者莫桂若桂而巖焉固其所也竊意上人聞是花香如驚風飄瓦不墮染著由有至無如醎水入海如堅氷沃日始聞諸香而實未聞諸香初不知其孰為巖而孰為桂也乃為之贊贊曰惟旃檀林瞿曇之家吐廣長舌天女散花一絲勿挂染著皆邪天香石橋仙耶佛耶祭文南軒先生忌辰祝文惟公學傳濓洛道貫天人義無所為論至精純切深孔孟洙泗言仁友我紫陽德日其新位既尊崇澤加於民天生賢哲存順殁寧百世之師陟降在庭以妥以值秖薦于馨朱文公生旦祝文恭惟先生追濓配洛孔道愈明至言鑿鑿讀其遺書是稱先覺永懷初度鍾英河嶽㪺泉登觴采菊盈握神其歸哉九原可作金陵祭楊待制文天髙地下今來古往人品不齊事亦鞅掌嗟生死之一途雖賢智而弗爽惟賢智死而猶生蓋以其道長行於穹壤余謂封君之貴者無文章之足放苟天假之以良才亦罕俟期頥之享其或侵尋乎槁項率忘義命而何仗身當退而留祿竟亦纒綿於世網是皆平日見鄙於先生之門而先生則凛然貞節皎行宜引日月星辰而直上者耶是故論公之學識則胸貫上下數千年之利害是非邪正灼見乎君子小人之情狀讀公之文字則摛華發藻其動如雷力掃齊梁之纎靡可與賈班而繼響昔公之筮仕也起家於文字鼓舞紫陽之士氣每不遺於闕黨及其入憲府也夙負埋輪之壯志事出順動而非強三為主文省闈髙尚士拾芥於功名由明懸於鑑賞儒臺清峻大施教條吏絶為姦士得所養公之譽望愈積而愈光公之父章篤近而舉逺是以聖明天子為之動容滿朝公卿為之稱奬命掌帝制以無慚重涉關河之沆茫古宣擅清凉髙爽之懿名曽不若秦淮邃幽而寬敞歸休引年築室而藉耕大寒不出墐戶而塞向巾車夷猶里尊輩行門攢車馬以問竒室列琴書而匪長閫儀嫓壽而作朋二子俱官而用壯夫何厭世溷濁而弗居忍俾海內諸生而觖望嗚呼哀哉公在新安適丁父憂東城倚廬候問日修公仕浙右化民魯鄒解印而還蘇臺艤舟使者命前釋我羇愁贄以銅彛手弄綢繆來鄭公鄉逺迎道周僕晚而仕千里悠悠見公金陵我老可羞恤我沃我勸我淹留於儕輩中見遇最優銘父墓文佩服琅璆旁觀忌嫉亦衆其咻逮我東歸寒熱靡瘳傳聞訃音已迫深秋嗚呼哀哉昔僕之識公也恨不早及從公之逰也旅進旅退不能忘父母之故邱其歸而復來也蘄一言以自壯何殊乎跛鱉之登山而追逐乎驊騮豈期始疑而終信嚮風涕一而莫收孰為鬼而為神恣是慘酷之陰謀先生其果逝者耶吾知先生之精神默運與造化者侔其蕩蕩乎為祥雲甘雨將變之化之為膏澤而滂流其靡靡乎為良金大寶深藏下土而竒氣不可掩者見之上浮計其昭昭者决不昧特懼夫隱顯出入而難求哀誄投一二於千百斯為巨手筆之贅疣醥清果甘無有庶羞公知吾貧庶無我尤哀哉李晉仲讀之謂髙古痛快當於古人集中求之告祖先筮仕殊早中更淹滯年近六十始録吳庠不十年間三領省檄已而拜一命之榮矣吁仕亦何貴夫蚤同儕既榮而殞亦何恨夫遲桑榆容有餘蔭惟我祖宗眷其皓首恤其清苦毋損其聰明俾不弛於修讀其終相之吳學祝文聖道至大孰敢言喻師表萬世用開太平惟吳大藩藐焉分教是慚是懼先聖尚默相之諸賢祝文惟賢哲不世出上下輝映數百年間聚精神于一堂之上俾為士者永有依歸幸孰大焉某祇役宫墻瓣香告至惟神實相斯文范文正公祠堂祝文惟公秉忠孝上契於天心置義田風厲于百世先儒論宋朝人物以公為第一流吳之士子廬焉食焉祠而奉之禮也分教來此敢不祇敬代甥方真住為祖考妣入壙文惟生事祭葬禮之大經先子偃蹇終身未遂斯志死不瞑目孤孫甚痛之上賴祖宗之靈得先妣姻黨主簿劉公慨念吾祖考貢元之喪在淺土四十八年吾祖妣亦三十三年為書勤懇致伯父中全邑宰荷推旁親之仁賙麥舟之惠以至治辛酉十月丙午合葬於問政山汪村之原嗚呼吾父之志遺諸孤諸孤之志實托二三伯父時之曠久事之難易神之監矣永安厥壙福我後人冥報之貽諸伯父者敢為吾祖圖之平江路祈晴祝文吳號沃壤尤瀕沮洳國賦之儲咸在而海漕資焉秋成之際所兾晴明則穰穰滿家官民裕足頃者霪雨不止嘉穀萌芽成功有虧惟神其憐之亟斂陰霾廓舒霽色則民食不匱吏責可逭用是走告祠下以徼惠於神雜文漢文帝不受千里馬詔昔西旅獻獒於武王王時年八十矣拳拳作書告戒如調護嬰孩其曰犬馬非其土不畜不寶逺物則逺人格所寶惟賢則邇人安朕甚嘉之今郡國以千里馬來獻闕庭凡馬自八尺以上為龍傳記所稱非方物而受之是重吾不德也朕賴天地宗廟之靈四方無虞深居九重出警入蹕將焉用之其復還某國遣使具為令布告逺方毋令復入關者燕昭之世買馬首以致賢士此戰國夸誕之風非先王之教也朕無取焉本路勸農文欽惟聖朝以寬仁治天下以務農重穀敦化原曩嵗頒德音减天下田租之半歌謡載道以頌太平况臘前瑞雪應期豐穰可卜郡守以勸農署銜擇日出郊非徒循故典所以劭農也夫農者天下之本有國之急務古人云一生之計在勤一年之計在春是時不可失也徽介萬山山多於田非他郡田連阡陌比往往梯山而耕尺甽而不成一畝又以溪髙易涸乾旱為灾民生其間勞苦太甚郡守視爾農多艱困常思欲寬征輕徭俾生爾父老歸而督子弟治爾耒耜則器不鈍浚爾陂池則水可潴正定疆界則鄰息爭依時蒔種則物性遂且衣食足然後知禮義今天下郡縣有學鄉社有學門孰有學皆立教法使人趨善而避惡也爾父老重告子弟曰父慈子孝兄友弟恭則家道肥男耕女織不事遊蕩則衣食裕毋賭博縱酒食以破家毋犯上訐陰私以敗俗鬬狠違法者傷身欺詐反覆者致禍皆爾農所當戒也今而兾爾父兄念老守之言朝夕無忘無怠則醇風盎溢善類汪洋雨順風調五穀蕃庶守之願也爾父老之所樂聞也可不勉諸大成殿上梁文伏以夏曰校殷曰序周曰庠司徒掌邦之教夷之清惠之和尹之任孔子為聖之時巍巍號帝王之師浩浩配天地之大眷兹新安藩屏之國是為文公父母之鄉宗廟百官大備其籩豆有踐之禮宫墻數仞凛壓于風雨震凌之秋南渡始創經二百年前守增修又三四老惟聲教漸被於承平之日適事㑹將迎於起仆之機齧蠹掃除良工踴躍恭惟嘉議賢侯太守作民師帥為國蓍龜樂育遊歌學子遂菁莪之詠躬先勸相蒿師來楠梓之材勇猛承當非常事業載惟廣文靜逺博士甫里苗裔東吳儒英掣電奔霆立諾不停於頃刻揮金如土成功豈讓於他人光前絶後繼於浮溪舍舊圖新書于堅石執斧者右執鋸者左方勤指使之勞如鳥斯革如翬斯飛甚便觀瞻之侈合榱桷棟梁而山積兼冶陶瓴甓以雲屯儼臨七十子於前楹逺續三千嵗之正統蓋文王既沒寧不在兹乎自生民以來實所未有也匪兕何貶於吾道鳯兮冝復於東周斯人庶知鄒魯之風來者不忘河洛之績昭昭乎王者之服衮冕有嚴潭潭乎聖人之居溪山巨鎮間架旁增於殿陛規模逺獻於伻圖玉振金聲拱俟大成之雅奏春祠秋享祇言惟德之馨香蓍策司祥虹梁肇舉默助神明之力式聞邪許之歌拋梁東赫日當天聖教同鴈爪水分趨歙浦花屏山繞護儒宫拋梁西簷牙上與斗杓齊郭東門外瞻竒顙鄉黨篇中記執圭拋梁南香火專祠祀晦菴濓洛真傳元的的紫陽髙聳尚潭潭拋梁北九五乾剛奠皇極車書混一古來無禮樂薰陶民作則拋梁上萬里青天堪仰望文昌芒色正分明永屬聖師尊素王拋梁下孰使乾坤長不夜道心炳煥如日星文運流行貫華夏右伏願上梁之後經學通明士志髙尚真知實踐由仁義以正人心立孝移忠卑功利而崇王道體認賢侯之勸學懷思郡博之輸資罔極恩深追慕綏來動和之妙化行俗美丕變風聲氣習之殊侯度增榮賢良輩出兆民賴而一人有慶大道行而天下為公父老告社驅虎文嘗聞禹鑄九鼎而俾民知神姦益焚山澤而禽獸逃匿是先民為之防故居行無凛凛之憂民生斯時得非幸歟後世官有常守以事情不切于國計者委諸神是神之責輕于古而重於今苟神其顧之則民賴以安或黜其視聽而不見恤焉吾民將若之何田農告里之父老言有虎涉于河以逼某民之居者朝視其迹盤盤焉場之麥躪焉圃之蔬蹂焉吠者却走聆者股栗神既知之矣借曰神處幽而弗顯聞可謂知乎聞焉而不力捍而去之可謂勇乎今里之父老與神約三日神其帥麾下倍程疾驅以出境土歸穴乎大山長谷之中則戊祀潔蠲式歌且舞以為神娛又將永永有飲食否則為神羞神其知之明勇之决毋曰昔之負河而去其事在守牧而不我與焉於是父老竦躬屏息再􅕥于庭重矢其言曰有不知斯言者如師溪白水敢告與曹德昭御史書僕曩以淺陋偹貟南軒於山川得觀覽龍蟠虎踞之形勢於人物得親炙繼學夢臣二先生之儀刑稍遂結王生之襪執太史公之鞭於文墨議論亦得從容侍于左右得一言以自壯矣當是時閣下方以宏材碩學力贊臺綱席先公不賞之勳庸重中州人物之妙選掃門晉謁不知其幾投贄五言承曉之曰此選體之餘風也中丞相公詩集刋成嘗獻古詩錦四章承曉之曰老成之製作也贈行大篇深厚純粹所謂歐陽子之文不見於世二百年矣時時發視之尚覺光焰生楮背兒子逺逰持去諸名勝見之孰不曰汝父嘗辱德昭先生湔祓如此若曰嚴挺之有此兒在㒒草芥耳何敢望何敢望伏惟閣下首烏臺薦揚致清朝簡注姑繇元幕旋簉崇班糾察百司風采振動東南半天下欲沾潤澤以蘇凋殘者莫不翹首跂足以觀神化惟閣下心潜世訓目熟朝儀庖丁牛解於衆理郢人斤運以成風宣上德以逹下情公之志也蒼生之望也小稚桂芳依棲宇下久矣近得家問極荷提挈尚兾援之清波東睇文星熣燦惟昕夕盥手焚香以祝德人川增之壽人來儻示一二字以榮遲暮且令子孫珍藏如楚珩昆玉焉幸甚幸甚與孫幹卿書元不佞以儒為業先世嘗領鄉薦與故宋相訥齊同榜而功未竟意謂餘澤粗存於是兀然而守書燈有年稚子桂芳常在側焉朝廷用儒由直學始例徴弟子員其後市井之徒携重資自獻而執柄者魚肉之遂俾儒流退聽亦吾道一厄也所可喜者今更甲令矣後至元中元承乏南軒長入金陵謁繼學王公夢臣張公一見極加禮遇久之稚子逰建業承御史德昭復禮𢎞政三數公薦入閩南夫邑教微職也崇庠冷序也誠不自揆獲登拜于大人君子之門閣下方以雄文卓行名重當時三徴七辟不肯俯就吾兒小子乃蒙眄眷延之西賔灌溉熏蒸皆仁義道德之懿何翅夫入芝蘭之室立金石之懸也兹蒙寄示妙香盈奩前者又蒙賜監郡書屬辭用意尤為至到區區父子何修而得此於相公哉遡風懷感何日敢忘稚子在職滿還皆相公始終造就之力也豫日望之元亮先生儒林巨擘茶次幸斥名末由躬侍几席惟兾珍毖為國自愛慰四海蒼生之望不宣贄見夢臣張侍御書夫天地至大也一氣之所同貫也故氣之所貫可以透金石通山澤一寸之草與千尺之木同其榮一滴之溜與江海之大同其潤蓋形有小大而氣無小大物有精粗而理無精粗莊生所謂齊物物本不能齊亦以其小大一氣之所鍾一理之所命故云耳且夫風雨之所㑹晦冥蔽山谷揮霍動天地其勢力非不赫然大也而一蜉蝣之微則知雨之將至而紛翔一鵲之細則知風之將至而卑棲故易曰同聲相應同氣相求釋者則曰聖人通天下之聲為一聲不見有異聲故無一聲之不相應通天下之氣為一氣不見有異氣故無一氣之不相求至矣哉斯言也吁王公大人之居世則甚超也其量廓而無外比天地於物無不容其勢力奮迅比風雨於物無不披拂而沾濡之世之士一聞王公大人之門則畏其大而不敢進苟進矣復畏其大而不敢言苟言矣復畏其大而不敢盡其情此亦無怪其然者後世公卿大夫不下士久矣見一丞簿尚作難於皂隸况王公大人之門乎伏惟侍御相公閣下碩學宏才大魁天下兒童走卒知誦君實聖天子方以孝治垂拱遴選耳目重臣畀之以激濁揚清之任十道嚮風百僚屛息儒生趦趄而不敢進者蓋有由矣側惟相公閣下以謙撝待士不以已長退人雖小物不違天下之士皆知之故僕輒進天地風雨之說以求逹於左右惟相公進退之夢臣先生讀之曰作手作手論近世喪禮自浮屠十王之說興而天下無無罪之親自七七之教行而天下廢斬衰齊衰之服是何待親之薄耶吾求之古矣天子祭天地諸侯祭山川大夫祭五祀士祭其先是故吉凶必告有疾則祈後世諂事鬼神淫祀無福余兒時猶見先輩執親之喪終三年服漆布巾者近來不滿小祥易素為綵習俗之變士大夫亦恬不為怪矣里人大祥親友助以鼓吹殊不知凶絰在身遺哀未忘孝子何聞樂音耶昔魯人有朝祥而暮歌者子路笑之孔子以踰月則善其中道乎舟喻示兒桂芳日逰吳㑹買舟江滸篙師嗜利而好招人也逼仄委瑣坐卧弗舒炎熇上壓沴氣下蒸不嘔則泄同舟之人懼焉晚泊馬目山下貸舟老叟大可容千斛深房髙榻枕簟悉安余始知善用大者不知其為大而器小者自不可掩也汝由是而知務學矣浮躁淺露其量幾何深藏不市而恢乎有容者君子之道也作舟喻示第五兒桂芳且將以自針焉俞中齊刋書集注裒助疏五十八篇備載帝王之治道三千餘嵗相傳精一之微言能於典謨誓命之文若覩遜讓征伐之事功非苟且見豈尋常昔朝錯口授於伏生義猶難究而伯恭道同於朱子見謂猶疑俾聖心日月以重明宜學子星霜而屢易惟我儒林耆宿雅號中齊老抱遺經每依外傳金猶靡顧有五月披裘之風園亦不窺守三年讀書之志浩翻煙海久積寸銖因成集注之編傳示諸生之誦擬新刻梓自覺慳囊好事而有人得道者多助明科斗之絶學不在兹乎為蔡氏之忠臣是之取爾賦六藝賦邈豫生此東陬兮塊天質之慤醇憤大道之荒塞兮濟聖涯而無津渺太素而刻畫兮汨浮文而淪真昡纎巧以為智兮委古制而遺珍慨羲黃之逺去矣兮儼湯武而孰陳考六藝之本始兮盛行於姬代養顓䝉以聖功兮設梯階而前待紛吾髦拂而昧所知兮夫孰外馳於華彩若童牛而加牿兮柅情波而寡悔仰前修之遺則兮豈重吾之欺詒曰禮防民僞兮吉凶折而賔軍之樂以和夫性天兮聊獨舉於咸池升堂計耦以偕進兮粲爾參連而井儀逐禽以左膘兮御驅逆而先馳書記事而數紀物兮撫民生而有為余固知幼習而壯行兮乃遵吾之先路由委巷以逹朝著兮束筋骸而履素歌二南之正音兮又申之以豳雅而告具中多雋而不侮賢分剡四鍭而如樹御馬正而調良兮固羞言於詭遇彼同文而一志兮稽竒贏而助賦夫何轍東而暴繼兮覽餘焮而靡存𣆀笁荒而申商刻兮復厄訓詁於專門雖稍拾於缺殘兮獲壘洗於盎盆嘆耆舊之白紛兮猶莫探於本根吾小子將何述兮遂潰騰而遭屯被髮於野祭兮羌殺蒸而莫辨諧黃鍾於賈鐸兮顔赫渥而舞萬塗膏脂於草莽兮禍彌增於革貫襄琯登戎以敗績兮縱堅韌而痯痯斯篆出而隸亡兮間架毫芒而握算余登髙邱而騁目兮收涕泗之浪浪揭牛尾以髙歌兮攬岐山之鳯凰毋哀曩昔以若仇兮曷不徴禮樂於廟堂拱神都於燕冀兮亘八紘於康莊校藝文以網士類兮吾將遊帝里而觀光擬騷送盛則賢歸越若有人兮乘長魚雲旗鬛兮鬐為車令馮夷兮為右詔琴髙兮齊驅聞美人兮居海濵出入無際兮飛天津天風吹兮下萬山授余素書兮役鬼神世溷濁兮多變態貴魚目兮棄珠琲胡鬱悒兮吾將行駕風霆兮遊方外登嵩衡而騁望俯黃河兮如帶願美人兮再來遺桂枝兮為佩心相知兮逺離如之何兮勿思擬騷送梅如愚歸錢塘雷填填兮海門倏而來兮濤山龍翔鳯翥兮故都玉帶毬馬兮雲中君羌聲色兮為娛紛總總兮馳奔結桂枝兮容與懷美人兮幽樊攬芙蓉兮為蓋葺蕙茝兮為軒朝晞髮兮若木夕弭節兮昆崙麕何為兮堂中魴何為兮木上寧偃蹇兮好修金石仰觀兮江浪嵗既晏兮將歸渺桐瀨兮孤舫與君逰兮河之渚濯吾足兮石齒齒與君擷兮山之秀托吾思兮華靡靡美人去兮增離憂風蕭蕭兮夜雨天門兮九重白玉闕兮珠宫冠進賢兮巍峩鳴蒼佩兮舂容挹斗以酌兮醇黔黎援箕以簸兮清皇風筠軒集卷十三
