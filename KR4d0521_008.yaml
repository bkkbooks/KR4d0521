body:
  text: 筠軒集卷八元唐元撰五言絶句題蔣子中畫竹及對奕圖我圃延千箇君牕隱一枝秋陽宜辟易開卷洒輕颸又不語機關險頻收局面新百年輕費日一著要先人早起出郭星垂野穿林露濕裘風髙猶過鴈月黒有行舟又官河氷稍解鵝鶩曉先鳴負擔爭趨市騎驢偶出城又半落城隅月猶殘塔上燈羇懐易蕭瑟衰鬢久鬅鬙偶書積潦官河漲舟行與路平何人爭港入鵝鶩忽飛鳴又牕黒遲烏彩船輕勝馬蹄路聞吳語雜身類楚囚棲又避俗聊孤坐登橋忽見山江東雲在眼問我幾時還又雪色催衰鬢蘭芽數稚孫清風渾負我夢想竹邉門又橋轉東西路舟行縹緲仙酒旗風力健紅袖雨㾗鮮又來往葑門路于今又一年祗應橋下水解照我華顚又毎道還家好翻嫌數日長不知垂老境寧得幾炎凉又有弟炎州隔鴈希難得書歸來頭髪白莫遣酒盃踈續書吳童白如雪吳女勝於花戱擲氷盤果縁渠倍憶家又盡日行城市渾無相識人陽山能顧我面目了無塵又江魚初罷市今日賣河豚時服黄襦袴人家矮蓽門又易動豆羮色頻麾夜客戈凄凉泰伯廟憔悴武城歌又鏤巧太湖石舁來動百枝倉黄識新主臺榭摠相宜又老境寧餘幾抄書無厭時循墻憐聚蟻俯檻愛新枝又風度蠲秋暑雲移翳夕曛香盤行詰曲嚴肅事心君又書柔櫓無停響鄰鷄不肯鳴依稀牽曉夣苑轉泥愁城又細簟含秋冷飢蚊减暮喧挑燈抄易罷孤坐了無言又誰悟浮生理紛紛醉夣中安貧無愧怍或許是英雄過嘉禾始聞鵑祗道思歸切今朝漸近家却嫌䳌語贅啼血染山花又壠蜀烟塵雜幽燕殺氣殘茫茫天地闊歸路爾應難又邵子天津聽東川杜老吟月斜煙樹老遺恨夜況況夜坐偶成因憶吳㑹舊逰河響喧舟入窓虛漏月明于今仍是客擁被聽松聲又書燈鏖永夜推枕即窓明却喜還家夣經旬不到城又謫龍纔七日窺豹未全斑丹黒嗔人老今年學住山曉望幽齋十日雨與山竟相忘橋邉稍延佇逺岫雙眉長又羣峯翠撲衣冉冉導行色虎迹大於盤勸君慎出入送汪宗父歸隱南山一十首後五首述舊逰宣平隱南山身逐紫煙去惟餘禮斗壇髙掛藤蘿樹又金陵領羣仙橋山弓劔在歸來構髙堂迺見東郭外又獨嫌山未深脫身友樵牧芝田野鹿耕翻愛一枝足又沽酒下深村摘茶經絶岫浮邱一遇翁新識道門秀又異竹排黄金幽泉注蒼玉靈君衞雲根應耳道書熟又總角快清逰囘頭六十載寄語花瓢仙莫怪顔色改又天梯三十六何異百八盤赤藤巖溜滑烏㡌松風寒又洪俞金石友及余各能詩瑶壇醉吟地雲影今離離又汪仙醸雲泉果核羅籩豆大呌落天星不顧濕襟袖又四䕫化黄壌此老猶華顛家無錢一孔漫有詩千篇退宻庵退食蠶作蠒蛻骨龍欲飛𥅆翁識天道歸採故山薇七月十八日題汪金嶺松林穿笋輿臺笠霑㣲露山深不逢人小橋横野渡又荒年饒美稼流水度雙陂果墜寒塘響松風滿面吹書窓注泉一泓偶成山居厭禽聲近市雜人語湛然寸心存俯視一泓水又莫言江海深蛟鰐禍不小只此涔蹄間亦足樂魚鳥又星光著幾箇雲影可八荒要濯冠上塵請君向滄浪鮑道原錢氏小景釣臺把釣人應逺雙臺入杳㝠瀬猶嚴氏姓山是漢時青又孰不登台鼎多遺汗簡羞至今鳴釣瀬風裡一絲柔班姬題扇婉孌儒家女凄凉團扇詩情知辭輦日花唾笑渠痴六言絶句留别良輔諸君隔竹數聲啼鳥當門兩樹桃花春色留人不住江東客子思家得意池塘夣草驅愁筆頴生花日暖鶯方出谷泥融燕未成家早喜囊中脱頴新愁霧裏㸔花香火縁俄一載琴書伴恰三家即事呈龔子敬弹冠而仕已老刺船以嬉若人文字稗官野史冠童舞雩暮春鳥鵲争喧墮地鳳凰逺去棲梧薄技操觚弄翰時情鼓瑟吹竽未聞一飯三矢尚可斗酒百篇摘頷到無可白著書何有於𤣥七言絶句七月十九日雲嵐王陵留題虎戰龍爭天地老林深塚閟鬼神幽英雄不是知機早奈此雲山萬木秋題張文玉桃竹翠羽漢武求仙事杳㝠當時鳥使亦通靈瑶池宴罷無消息竹徑桃蹊刷翠翎珍禽有意露文章况在春風桃李場何似全身入幽隱舊山唼草水泉香關廟諸生讀書分韻得丹字天下三分國步艱卯金遺燼未全寒陣雲疑壓荒祠黒猶識將軍一寸丹九月八日聞梅坡判簿偕希賢仲賢仲氏清之登問政因賦小詩扣清逰之所得問陟花屏第幾重長松幾樹似虬龍候賢亭上同誰話曽見仙翁挾短笻問飲幽亭酒幾樽山猿幾箇護柴門寒塘果落聲何似度宻穿深日未昏洞裡黄花供物色山頭烏㡌費矜持短籬白屋村村酒斜日青山處處詩葉村道中書所見鶯兒何處話言佳破夣猶欣浣客懐誰向林塘營小隱琅玕百箇護幽齋父子扶犂泥沒膝人間猶見古豳風桑麻無限春心在萬古流行天地中黟川雜詠翠瑶為壁住人家一夜山前聽亂蛙莫恠客衾凉似水淙淙飛澗隔窓紗雷公劈石劣通人處處叢祠覆暗塵香冷乞靈人亦少蘚㾗侵座草摇春山到靄崗天展畫溪分横港地鳴絃烏犍耕罷眠青草白鳥飛來破紫煙二十年前厭路塵還將衰鬂照溪濵竹籬蓬戸更新主只喜青山面目真贈葉君訥絳灌忘言漢運昌龍翁大辨善深藏酒闌豪俠露肝膽清裁斯人孰短長溺口諸賢悔吝隨金人畢竟是吾師要知論事囘天力不是區區嚅囁兒四月十五日携兒桂溪上聞鶯水邉藜杖竹邉居不用移家祗載書稍喜東鄰來往熟流鶯多處最憐渠書生作計太悠悠只聽鳴鶯也合留水北水南行欲徧天青麥浪半含秋感懐偶書鬭智謾誇三十里還家那待一千年舊經行處新門巷斜日輕風樹樹蟬二十四夜不寐機舂伊軋直至曉搗盡空山萬古愁譙念畸人元少寐露莎微咽候蟲秋雪後路轉溪横忽逺峯雪晴猶亞最髙松蹣跚足蠒尋山店慚愧閒僧扣莫鐘題黄氏皆春亭自家意思窓前草滿目紅酣川上花十二欄干風雨齊有人來此岸烏紗山中偶成曙色窺忩眼未開溪聲併入枕邉來長年官堠蹣跚足今日青山不我猜客窓述懐寄竹逸訓導羅君屋近幽林好鳥鳴圓吭宛轉太勞生病餘廢格書聲日只㸔魚兒作隊行溪聲逼枕夣魂冷山色當門笑語佳弄鏡燒香消永日直須平步到無懐鷄聲咿喔不能休汝亦何知氣候周白日荒荒人易老乾坤消得許多愁先生去後斷知聞只見松梢不見雲行過寒塘便愁絶尋常揖别此中分儒碩堂中㸔醉貌朝陽亭上勘詩篇寒塘照影何人共目送飛花只自憐嵗晏書懐五首示第五兒桂芳時留古宣日日霜風掠户驚今朝急霰瓦溝鳴天寒附火何人舍時過金陵第幾程老大生涯墮硯坑寒燈照影欲殘更老妻應道還家晚晴樹虗占鵲噪聲水寺雲廊處處詩揮絃正爾要人知却憐方丈逢知己坐對東林月上時兒時嵗節換衣裳手捧椒盤有底香十載風埃淹客路小窓燈火易凄凉中宵急雨打踈櫺滴碎羇人一寸心舊恨新愁衣百衲恰如針迹宻難尋贈徐伯英月溪溪上識先公五十年前一夣中重見郎君頎整面溪光月色恍然同委巷横街訪故人碧窓朱戸與時新斷橋流水孤山路撩亂殘梅㸃角巾茅屋杜陵今幾間階前踏破白雲閒相逢要覔君新句坐對南溪雪後山暫如休邑有感舊友汪公才欹枕無眠憶舊逰半牕風雨替人愁新豐酒好誰堪共贏得兒童笑白頭酒興如山不可摧詩狂落筆是瓊瑰未應老去甘才盡好借雄風上楚臺文玉餉墨作小詩趣之平生清苦墨磨人几格無端日積塵分贈豹囊應絶倒黒蛟翻影硯池新黒臥梅庭透骨香煩君遣送到山房衰年摇膝吟風月不是龜兒學二郎崑山寸玉紫光浮報以霜毫久未投老去幸逃吞墨汁扁舟追夣過羊裘次韻江賔暘寄盧君警曹汪村渡口據吟鞍聞道將軍教令寛典鷫鸘裘觴使客種琅玕竹報平安布袍曽不異初來戸掩蒼苔詎肯開官舎有梅氷作骨紛紛桃李但輿臺架上書多許亂抽相逢𤣥髪誦如流廣平鐵石心猶在不作人間繞指柔三月二十八日曉起㸔牕前牡丹叔固許送緋桃絳幌春風剪剪寒幽禽破夣客衾單山居近喜無風雨自起開簾㸔牡丹東園咫尺逈蓬萊試問名花一一開别種緋桃深著色煩君剪取數枝來詠史舊題西都酷吏虎而冠厭世張湯僅有棺縱許杜周家鉅萬青編遥夜幾人㸔寳釵百萬貽身禍尤物胡為累子孫鬼責人愁無了日草生偏在貴人門江賔暘詩來賦七言六首以謝警曺盧子去已久望極天涯詩不來忽見山僧擎藥籠夜光錯落向人開賔暘有句幽然光又似冠冕趨朝行老夫貪讀至丙夜月冷西壁紛啼螿邇來有口欲挂壁獨問先生安隱無茅茨一盃酒煞好能令我輩㵼明珠杜門懶與世俛仰讀書頭白忘魚筌申屠不入黨錮傳夷吾自著貴和篇書藏四葉有子讀門對千畦帶雨耕深居愛惜天下寳笑我老作東西行明徳堂中觀㑹弁于今入室似無人堪怪皇天無老眼幽花小草自為春和靖觀梅圖箇箇寒英太極圈軟紅塵裡識詩仙只今人鶴同凄冷漭漭湖光月一天寒夜偶成墮窓殘月一㾗白撼地髙風萬籟隨莫怪羇愁不成寐故山春逗早梅枝老妻多病怯新寒笑我鮎魚上竹竿夣想稚孫初學語買舟何日過嚴灘葑門客夜書懐五首兼簡汪謙父少年不省愁兼病愁病都隨老大來豈是吳歌太凄苦祗縁心緒久摧頽父子三人共冷齋夜闌呼夣語幽懐真成客裡重為客愁聽風軒葉走堦一月無書即惘然安書頻至喜成顚大兒扶母㸔新菊此樂人間勝萬錢寒夜樓頭捧酒杯依稀吾母喜顔開空餘五載霑衣淚松柏岡頭鶴夣囘良朋十載對書燈官冷同為有髪僧君到故園攀夏果我歸艇子觸溪氷贈教諭黄君歸吳翼之字出定武石伯亮藥識神農書邂逅一樽吳市酒殷勤滿筥太湖魚道傍見梅寒林荒澗野心性凄風淡日鐵肺肝置之道傍終倔強豈為俗眼供竒觀商山翁試調護手南陽老扶炎祚功一時張弛亦在我縞衣素面臨春風氷容逈立古道側冷眼㸔盡行人忙豈同苦李人唾棄功成鼎實逺見嘗三月十一日清明雨作因憶吳門虎丘舊逰逺寄青山李先生低簷挿栁翠條條無數輕裾度石橋日暖虎丘山下路閙竿兒伴酒壺挑船窓半掩翠蛾顰為恨輕陰雨壓塵誰弄玉簫聲要妙官河占斷一城春吳王埋骨金何在坡老題詩刻尚新石澗阿誰來洗手碧鈿烟草共分春山中偶成水流石罅聲偏激試引平鋪竹徑間碧幹明當添秀色頻來題字記幽閒寓嘆飢死疫死連萬里榆食草食悲當年化國日長可百嵗貞觀斗米曽三錢鵠面無肉皮欲死葛葉有根山為摧天逺若聞天亦泣韓滉米舟胡不來貧家斗粟償子本可憐孤注蕎麥花霜晴黒實挂滿樹端能少貸東西家秋田小熟面復光尚苦米價昻他鄉黄苫爛盡屋脊見猶有敗壁書流亡千家魚鼈太湖笑幾人僵仆雪風寒吳江平地水三尺飢疫粗息天作難績燈夜半挑愈燄書忩煜煜綴玉蟲百年三萬六千日如此相煎成老翁華山陳搏臣好睡澤畔屈平人獨醒林阿急澗鳴自獻窓中列岫眼能青十二月三日與桂尋梅過田舍墨君三生作仇耦寒梅半面含幽葩水生野碓聲愈急却㳂沙路尋田家草荒曲岸㸔犢過橋度獨木呼兒扶日暄瑟瑟沙滿屨誰掃尋梅涉澗圖鵝兒唼草母亦喜竹本照水孫同長父吟子和路人笑一枝到手先春香題畫鷹卷架上蒼鷹膽氣麄眼中狐兎掃教無雲霄爪翮聊覊束鐵馬將軍待一呼上元夕師潭觀社公燈憶家􅕣􅕣皷響東西社閃閃燈眀上下村待月柳梢憐獨自賣餳擔畔想諸孫燈光愛與溪光接人影遥依樹影逥白木橋頭風掃面吾家月好照深盃三月三十日遣興呈羅履祥黄彭叟人言惜春不肯睡我自開門㸔逺山畢竟殘紅易塵土雲浮松蓋意長閒贈地理楊仲髙馬革裹屍功異域烏鳶嘬肉厄㐫年桐棺三寸猶難覔那識青囊有地仙中原𦵏地平如掌南紀山川禍福多拘忌愈深留腊骨兒孫容易鬢成皤善𦵏景純無逺計一身存殁自難防救貧三十六龍脉猶許聞孫擅世長教諭黄君余舊識於吳庠比嵗横經績邑猥客授山中不獲再見燕鴻相避殊可憾也輒因贈行賦七言二首㑹吳中知舊道甫問訊萬艘魚米勾吳郡百畆儒宫丞相園經閣何能辨魚魯青燈老眼未全昏龔湯已作飛仙去陳鄭今為後學師踏徧吳城人不識踈簾細雨舊論詩龔子敬湯碧山題蘇武牧羊圖身逐羣羝草色秋手持漢節雪䝉頭可憐屬國償勲薄談笑紛紛盡列侯雪暗穹廬少日光嚥氊那得飫中腸誰言漢使心如鐵也為姬人一笑忙題陳生明皇洗馬圖五龍毛骨代間無逺市邉城上帝都珍重君王賞神駿内家别有洗兒圖舞馬筵前豈物妖銀鞍倉猝授天驕范陽孰使遺腥穢賜浴温泉洗未銷子壽公約詠機舂水落一堦翻碎玉臼投萬杵響空山朝朝只為人餬口頗似浮生不得閒歇時杵挂髙梁上動處輪翻急浪中萬斛珠璣飽癡腹古人機巧不言功先君子梅臞先生嘗詠機舂有水落一堦翻碎玉學者膾炙元向年用之矣今再用不敢忘吾親也十二月初十以來思歸排悶山僧獨在山中宿我亦蕭條坐冷齋鄰磬殘聲度幽樹辛酸一掬異鄉懐翁媪霜毛幾許長孫雛燭下誦琅琅江空嵗晚不歸去行遶荒苔百尺廊慣嚼朝虀淺甕氷夜忩猶占讀書燈微官敢羡摩空翮末路何嗟繫日繩邂逅行臺識聶公賞音不用嘆文窮人間信有鼠成虎孰許曹劉摸索中愁本無根底處生惺惺睡眼數殘更誰令索索葉墮瓦暗觸家尨三四聲健兒耐冷送殘更半帶吳歌欵乃聲客子去家三百里殘年能絮祀先羮四皷無眠長抵晝須臾合眼即黎眀却慿飛夣尋親友門巷驚囘爆竹聲王君實約竹隱堂小酌主賔列坐香風吹烏巾挂在桃花枝千鍾縱濕劉伶土何似生前一酌之小亭四面吸山光竹隱堂西夕照黄今日芳筵共歌笑他年荒塚上牛羊文章不直一杯水富貴都同春夣婆箕踞科頭從爾汝輕衫快馬上坡陁崇文一首并序崇文送士友也士友校藝于有司亷侯饑之郊命其客唐元為之歌曰昭代崇文肇始先皇曠視遐世化俗洋洋曰傳法在余惟世祖是光迺詔郡國迺徴賢良迺斷宸衷惛怓翕藏燁燁士子循彼周行豈曰充位資爾稲粱亦既九載其思無疆於皇繼聖為天下王庸敦舊物藝苑載揚迺宏厥宇櫛比蜂房毋窘風雨誦聲炳琅繄惟良牧勸駕是將籩豆惟嘉有酒其香剗華就實鳯鳴朝陽被爾青紫見爾明堂庻幾徽國斯道攸彰題周君實蘭圖孌彼幽姿需沙介石無人亦芳君子之徳名托楚騷根滋春雨沙寒水香毫端欲語筠軒集卷八
