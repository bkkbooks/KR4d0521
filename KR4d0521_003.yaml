body:
  text: 筠軒集卷三元唐元撰五言古詩客齋感興老鸛羽翼長引頸鳴閣閣枝間一么禽清響透寥廓騏驎日千里乃受金羈絡不如退耕牛日斜卧籬落詩窮鼠五技名爭蝸兩角陶公未歸來昨非今已覺又六籍經秦灰訓詁殊有功髙談議漢儒何知爾二蟲後生守一經紛白猶難窮偶然取朱紫驕氣發滿容三傳束髙閣忸怩紫陽翁駿骨已食豆熏衣列房櫳坐令刻木徒見詬常彎弓豈無清苦士秉志如霜松又金性可從革烈焰看瀋流石頑不受鐫錐鑿何時休媧皇始補天事去今悠悠精衛亦何為乃作卒瘏憂海波中不平民疾殊未瘳偶然出郭門蔽港牽千舟坐令栴檀林見此佳麗州生公來説法是中還點頭又南飢死即休北飢乃南來昨宵過村墟屋材隨劫灰何但感巾帨驚仆鄰嬰孩寒衣被爾體破甑委牆隈南北共廢壤中臨炯三台譬如同乳兒焉問才不才有來觀風者咄此民窮哉十二月十四日過平望嵗晏意荒荒雲寒低薄日太湖蓄巨浸東走平望驛篙師尋曲港舟尾不容入問爾何所為官醝勢無敵危桅蔽川面黃旗飽風力古初猶淡薄煮海事殊失利源開一孔橫放無終極齊魯議莫勝桑孔已破的何如燬牢盆亭户改耕織吾民戒口爽大官減供給折衡人不爭區區陋智術送周繼善𢎞道之廣東讀書坐髙閣城隅聽朝鶯粲粲瓊樹枝依依兄弟情中途忽險艱功虧嘆無成冷宦適為纍飄然遂遐征遊吳返故廬簡櫝申前盟堂虛竹風入新涼拂冠纓於焉訪古寺逶遲幽澗行汲井潄我齒倚枝看巖耕如何塵坌牽雨雪淹歸程人事好乖異語别令心驚遙遙指嶺海蠻花掇芳英趍庭篤禮訓所貴匪金籯願言思公子春草日日生夜坐平生愛熟睡常與佳夢期萬事坐不理百拙何所思當其擁衾寐驚呼殊不知日晏未進饋睢盱眼生脂如何卯申縳不作泥中龜踞几對書史口誦而心惟燈明欲語我雞聲一何遲吟肩苦山立不計毛髮衰老學宜自攻振懦真吾師支離華山叟吾道分兩岐觀羅仙石上狼迹仙家養白狼能與天地老朝飲崑崙源暮食蓬萊草羅腰忽騎來謂是此溪好惟餘石上迹落落不可掃隂陽日夜移人生誰自保仙人久亦化石色白皓皓老牛工礪角牧豎卧秸藁陵谷易變遷萬事幾顛倒我生後千載胡不遇公早無方制頽齡有恨縈離抱但聞橋下水喧豗流浩浩酒醒作小閣酒初醒雨鳴林下屋夜深境彌清宿鳥翻叢竹披衣剔殘燈展衾幽夢續塵勞憚江海野性羣麋鹿始看風雪晨林花今䔩䔩餘齡諒能幾居然鬢毛秃胡為騖虛名巖耕期抱犢雨齋社日細雨濕青山淡然見林姿衆樹未云緑對此芳菲時鄰僧俟我至竹下茶煙遲既來興易盡未往還牽思枌榆田父醉陌上行扶兒忽復念閭巷三年違祭祠豈無一杯羮笑語同齊眉丹墨方為纍掩卷聊自嗤哭亡友潛夫洪主簿我有古時劍藏之三十年當年為君舞謂我名龍泉我有古時琴尾焦猶著絃當年為君彈六月飛霜天收劍入寶匣光怪常自纒挂琴在幽窗誤觸風蕭然知音諒靡存淚下如奔川又古道無人行古鏡無人照今人自今人安得古人調平生蚤樹立恥以名自釣有口不論錢頗被同儕笑過門讀我書電眼閲衆妙偶然共快飲岸幘欲大叫立談古樹間解帶圍十抱送之出柴扉又愛山光繞百年大槐柯更賀乃成弔俱亡人與琴無復聆清嘯伊人鐵作肝舉世梔為貌九原雖不起佳兒尚能肖又跛鱉強登山騏驥日千里勉焉那得近流汗血盈指當時同隊兒孰敢窺涯涘比長肆成章萬言直杯水師説早能持乃自吳校始所至奪重茵仕途觀素履如何山中縣氷火遭禨鬼秋風黯黃落日就暵肌髓余時震澤還執臂各歡喜君言需小康共此杯炙美蹉跎風雪晨蒲伏城東市斯人死不亡馨香化蘭芷嵯峩匪岱嵩光芒即箕尾但悲平生言何繇再傾耳五月十七夜極熱祝融始嚴駕朱鳥爭呀呀羲輸向西頽列宿森如麻缺月翳復吐熇熇蒸癡蟇林風靜不發起坐徒興嗟髮短恨不髠渾汗煩搔爬螢光善開闔乘機助紛拿幽禽寂無語蚓竅工淫哇翻思水仙府蕭瑟魚龍家玄珠出海藏鮫綃織天葩綽約自玉肌勞生同縮蝸煎熬閲寒暑鬢色倏已華念汝四序更白露凌蒼葭達人會至理與時同變化葆光匪外榮嵗晏期無瑕九月四日池上泛舟對菊分韻得菊字與鄭元章遊二生并兒桂同往今日天無雲秋氣轉清穆駕言臨深池蕩槳追幽矚須臾層波生疾響振林木船頭載芳醥船尾插時菊延緣入葦間頗驚鷗夢熟魚跳供糝羮登俎間野䔩咄此文翰侣胡為在空谷邂逅適清娛詎嗟毛髮秃緬思平生遊嵗月如轉燭舊交日雕零新知欣在目尚煩澆磊磈羇懷庶云足作詩寄來曽剩欲題修竹郡庠上宣差詩時卒伍有豪橫者公為除害士民悅之吾聞段太尉一麾守涇城于時王子晞領節居行營士卒縱無賴持刃誰敢嬰入市刺釀翁酒由地中行太尉奮髯戟撫几氣不平繫囚十七輩斷脛令人驚至今青史間燁燁垂令名山城聚惡少乃者何縱橫蜂奔而蟻附鬼嘯連鴟鳴婦女被羅織貨賄成丘京投鼠恐忌器城狐任紛爭一朝竒禍作衆矢遭彈抨使君坐堂上叱吒風雲生黎氓願嘬肉部伍思分羮犂庭掃窟宅邦憲其敢輕投畀禦魑魅械束軀莫攖民痛昔未蘇汝罪今貫盈徽人去大憝三市收竒贏頗聞負郭農相率趨東耕栁子既美段斯文叶韶韺我今頌使君實為善者旌續當鐫樂石千載常崢嶸九月二十七日元與潛夫伯初小飲市樓季文後至酒酣慷慨懷舊情不能已飲酒豈不佳所貴得其儔良朋既已至上我鄰家樓樓髙極四望萬室如鱗稠紫陽接前榮屋西揖浮邱郭索來數輩從橫類戈矛復有筥中魚果核亦易求清言領道要諧謔非所投感舊屢惻愴論交重綢繆雲間有雙鳥意氣橫九州豈同鶩與雞爭食而包羞紛紛黃落中青山無悔尤聞禽端居謝煩局適與幽夢期春風吹好禽鳴此髙樹枝披衣步前除喜及芳菲時雜花始向榮疏栁稍已滋十月十九日曉夢中作四句續成一篇夜夢吾少母歡言進清杯覺來淚盈眥雨屋雞聲催今晨梳我頭髮白如銀哉榮貴競時好漭漭窗中埃城中少佳樹城中少佳樹有亦不可即自吾來山中面對好顔色雲生影披披濃淡各有適朝暾羅竒姿軒然見離立堂虛勢若圍鳥上翼斯革須臾風雨喧白晝鬼神入河漢疑傾崩螭蛟驚鬬格收聲向寥寂冉冉睇空碧遊方始自厭侯門事長揖聊從山中居願惜倦飛翮即事愜清賞於焉瀉中臆九月五日登任守釣石識許友山奉簡羣岡莽若奔清溪自環繞中有石巍峩萬古白日照天監佞金人犧牡棄九廟如何得良牧燠休縈寸抱育子從姓任户至扶耋耄行春投釣竿適興取邂逅方來式歌舞勿拜同思召清遊值秋晚蟬冷無留噪登危未用扶撫石一大叫揮杯急酹之萬壑風鳴竅樵豎怪清狂往往拍手笑後乘且勿驅前林明晚燒讀鄉先達羅尚書作任守碑有育子禁問老人及召伯甘棠等事故及之繞實照切燠休並去聲余自二月望因疾止酒至七月朔凡一百三十五日立秋後喜雨雨後早涼始進一杯邴原本好飲對酒不肯喫淵明逃麯蘖止酒見篇什平生揮大白號呼聞四壁奈何衰疾攻餔糟亦驚惕閉門玩處女堅壁禦強敵今晨葛衣輕秋樹涼淅淅呼兒進一杯借我童孺色昔聞重剛制無乃衛生術茗碗分策勳醉鄉戒深入二十日山中大風憶吳會作我昔遊吳會衝風攪回廊窗户自敲戛秃柏摧長楊起視五湖波飄忽失帆檣勸公無渡河蛟鰐齒如霜中流幾遇坎膽掉神茫茫吾鄉山作屏百摺相掩藏日遲塵不動微波皺橫塘夢回驚疾吹氣勢欲撼床尚疑陶朱公散髮弄滄浪安居申前警終焉嗤面牆豈無白鷗天駕此一葦航二十三日疝疾作無寐感懷平生有髮僧此事我知我羈棲仍卧痾湯尉何繇假空齋無人迹日光穿漏瓦照我床上衣紛紛馳野馬飢鼠窺杯盤驅之復來下薄暮兒子歸有懷聊與寫落葉不知愁勢急風兼打燈昏欲屢挑貪睡童陽啞抑憂轉頑耐孰謂真衰惰酒聖客可麾詩豪猶未舍釋懷山中朝聞鶯向夕又聞鴂何況不知名禽聲競啁哳窺案愛凝塵門外罕來轍居然著一翁行坐把書册何以降睡魔茶甌頻一啜平生纍綺語天私廣長舌晚似支床龜閉息甘百拙虛舟足用世怒臂寧當轍持之問青山可以較優劣青山了無言晴雲自明滅山頭兩好樹山頭兩好樹緑葉方華滋朝日上曈曈夕飇披拂之念此長久根不為霜雪移飢鶻從何來奮竦不自持托身既得所巢妃與其兒出則攫百鳥碎腦無流脂勿遭壯士嗔丸擊當離披繁枝詎能庇但驚華葉衰荆舒恨閩子咄咄空自悲范陽腹如瓠赤心終見欺聊為雙樹篇庶效青蠅詩二月二十九夜半起聞雞聲生無諧俗韻萬事付不理忍窮已爛熟幸不皺眉宇攜書學山棲蹉跎易寒暑其中大快意雞聲落吾耳羣雄搗虛回決勝鼓不死長楊羽獵過助叫擒蒼兕萬松立濃隂天清捲風雨多情誤竹肉無譜翻宫徵自吾得此聲大勝享醇醴明當語旁聞咄笑不自已想像迹已逃居然書溢紙會有賞心人撫床中夜起疏齋盧公題郡學先賢閣余府推次韻命元同賦翳翳嘉樹隂穆肅初夏時髙閣一以眺凝神練川涯況兹文翰侶昕夕勤經災藩僚率多暇詠歌在泮詩祥刑悟公理內顧無纎私文彩增煥飾襟佩相追隨永懷紫陽墟燁燁垂清規中流激頽波涵泳遂所怡珠貝爛盈把遺我不復辭尚聆清言要豈恨還山遲九月初三日曉夢亡弟清之兼懷少弟成之晨光度疏牖旅夢方蘧蘧季也墮我前曉然見長軀趣裝欲有適所畏在簡書出門再三顧别意何躊蹰天清鐘入耳叫鴈驚黃蘆幽戶無白日宿草停輀車為君一酸鼻推枕成欷歔少弟殊可念被髮夢北堂戒公無渡河蛟鰐齒如霜念汝亦何尤自顧成佯狂收骨會有歸漭漭崇松岡少壯不自保我老宜悲傷悲傷不可言涕下霑衣裳鄰雞罷三號薄帷明月光村前一大樹村前一大樹衰朽嵗月移潔之百丈長空有摩空姿四垂垤螻蟻巨腹藏狐狸積雨所灌浸野火燒炙之一朝勢甚急西北狂風吹大聲若震霆驚倒村中兒壞屋四五間織婦傷其眉此物久不除蹉跎成禍基拔去眼中釘槎牙化平夷傍株有嘉蔭衆愛扶疏枝十一月初十夜客窗言懷平生愛獨卧獨卧春融融飲酒豈在多但貴衰顔紅晚餐近亦廢脾神尚清通猶憐燭下讀兩目磨青銅常恐梗靈扃掩卷不待終有如猿竊果既去尋舊蹤永思古人心渺渺飛冥鴻窮追恨不前退懦當自攻太息重太息窗竹搖霜風日取霜葉供地爐作乾葉下晴簷凄凄仍索索向來散衢枝喧啾巢鳥雀午隂欲蔽空何畏炎曦灼風霜一以厲榮悴殊今昨取之壅地爐稍稍青煙作本無貞堅質焰收嗤劣弱牆東汲古井草帶相纒絡幽泉借潤色鮮新尚揮霍物微變化間根柢重所託再題霜葉昨日落一葉葉落仍今朝落之又落之仰首窺修條童子戒掃除翕忽盈堂坳天風亦戲劇投隙敲巾袍我家大江東觚櫝夙所操一從守微官枯寂同僧寮愛飲恥空罍抱膝徒長謡欲歸歸未得渺渺川途遙我不如木葉放蕩能超搖於身不拘束於人逃譏嘲出門語青山日薄飢烏號十二月二十六日曉度車盤嶺纎纎月吐翳耿耿星回天風霜劓刖人積雪盈道邊度橋頓腰腳探䇿不敢前荒村絶雞犬列宿瞻髙懸暫憩何人門激澗聆飛泉胡為倦行役纒糾區中緣老妻喜我歸下堂趣烹鮮兒曹喜我歸跪請誦新篇孫雛列成行眉目秀且娟我老不自休微名若浮煙於世既無補有文何足傳願為農丈人勇撤博士氊形靜神亦安庶幾樂餘年十一日發舟宿浦口十二日過街口與鄉人畢仲常同舟仲常浙東稅官好爵磨世鈍微官生白髮往來三十年幾見篷上月故人致青雲倏隨飛鳥沒在者天一涯胡能慰飢渴篙鳴柂并舉忽忽又明發羞囊亦何有耿耿不可奪行當過桐瀨永走客星活髙風徒仰止吾事正迂闊為謝同舟人官曹分冷熱日閲灘險入歙境七日長灘七日程狠石相與角一罅劣容舟古人昧疏鑿巨靈煮隂火百沸釜中作喧豗轉地雷傍觀驚膽落篙師亦慣見解迎知脈絡飽飯不償勞沽酒令軟腳吾人太勞生外物從揮霍攻苦償青燈老大供一噱咄咄何所成躬耕負秋穫命也可奈何固窮慕先覺拋書付年少歸休守禪縛詠程孰池亭景三十五首登山岱峩趺配林海瀰摽碣石冥冥登山道於然資拾級巖谷中呀張竹樹外蒙密有如桃源境導以榜舟入秀野堂新安舊澗瀍赤舄云歸休吾心豈獨樂畎畝同懷憂偶然藝花竹四面春浮浮夢想五雲深清光瞻冕旒漸入佳境長康喜啖蔗舌本味有餘豈知達人心雋永傳家書杳焉塵外蹤曳杖寧徐徐垂堂有前警徒步如安車半山吟所烏巾上有天穩足視平地斜陽界石壁煙霏染襟袂長吟吐古音浩思入無際怪藤工屈盤坐閲人間世倚山書堂堯廷文思深寶玩出羣玉尚餘天語香夜半光煜煜湛恩延奕葉倚山書柱屋有琴不敢彈悲隨鸞鳳觸路通修竹楊朱誤多岐道以通為直稽首虛心仙漫岡排萬碧醉題認欹斜永嘯破幽寂怪石蹲其旁微勞憩腰膝蒼雪闌干坡仙善遊戲竹以蒼雪名繽紛點闌干值此天風生曦輪亦慆慢孰取陽剛精勿以色見我剪水同其清逺開圖畫遙繪拜新號髣佛宵夢真突來浮邱峯寸碧窺簾旌羣岡列萬騎屯擁紛相迎鵝溪練萬丈天孫下垂精極髙隨地有極髙遐想崑崙頂箕揚斗挹漿下接寒芒耿神之化為石日月山中永鳳卯遺蓬山笑拊微醺醒梅邊竹外梅筠三葉心張皇觀晚節羮調驗鼎實粉香紛玉屑石床如砥平年侵乾蘚裂懷古發新題愧我筆無舌蔬圃平生用物精肥遁蒔蔬圃如何食肉相亦識牆薺苦剪韭垂新春烹葵挹零露濯膩銷紛奢此味妙今古桃李蹊桃李在公門其人古伊周堂堂毗萬幾歸來樂一丘行道集瓦礫寧遺珠履羞至今稱舊園賤子追清遊桃李園無言下成蹊戢戢春風樹斛量溢佳實鑽核戎甚愧諸孫似方朔隊魚總清慧課勩此窺園頗解陸生意春色茅簷人間春色媚乃在茅簷間烘曲成直身豈曰衣裳單一洗紈綺習亹亹醇風還寒梅結世好早弄枝頭斑成趣亭云何天機成陶公淡世味邇來屋其中花果分位置山童敲茶臼應有佳客至脫帽髮蒙茸挂在蟠梅樹紅翠亭嬋娟絶流注黛假風中雲我寧種竹桃鐵帚麾妖氛紅紅與翠翠非襦亦非裙一篆古龍涏宴坐娛朝曛百花頭上梅居百卉先山在最髙處政須第一流著屐常來去心探太極妙如持濟勝具翠禽噤無語月照橫斜樹整屐阮生好蠟屐一生著幾緉齒齒陟苔階翛然絶塵想萬竹如受圖頻敲振幽響新梢看拂雲為謝饞夫餉萬玉意足兩三竿吹萬喧地籟塗山委玉帛朝披成一快殺青書租庸餘韻風月外被褐懷其珍猶期魯公拜嘉慶莊后皇錫嘉種始出京華間金錢買寸核甘脆傳人寰坐看火雲蒸玉甃沈清寒散髮乘天風不用嫌整冠晚翠莊松柏森晚翠凛凛雪霜晨髙枝蝨其間嵗見蠟丸新乖龍割右耳葉大包根身居然入湯劑暑氣銷氤氲樵徑牆腰取徑微呼童入山中露濃濕雙屨詰曲嵌崖通斧斯青瑶枝帶以山花紅烹茶聞烈響慎勿燃焦桐桃源路上桃源昔迷途今日天光開猶逢古衣冠共此清談哉愛枝不為薪摘實看瓊瑰嫣然一笑粲蝶蜂毋見猜錦繡鄉中春風錦繡堆管領屬花木羣芳擁後先成此百和香綸巾風披披邀客來相羊亭午坐石間臨風揮一觴向陽花木陽和煦萬類花木生精神重隂自寒沍見此黍谷春棠花翻作洞錦帶如垂紳剛明君子操寸念全天真修景化國日景長至人淡無為掃除伐性具稍受薰風吹葵榴媚時景薝蔔光陸離願言享黃髮金石庶不移晚香東籬居震位南籬見佳山隱然陶令居心共秋花間姬公昔大聖居東多苦顔全髙返林壑戲袖方斕斑攀桂攀桂承家風丹梯上蟾闕買書教兒子青氊我舊物沂水澡爾身咸池晞爾髮明當上賢關穩送霜天鶻耐久交紛紛世道交勢利不自保歸來拊竹石一笑成絶倒豈無同心枝傲睨天地老人間耿青史猶知稱管鮑好景萬木垂秋實寒林燦青黃風霜日凌厲噀齒含天漿未須羡吳姬入手三日香膝前環令兒好景思無疆平安道中佳竹報平安何年構深洞青瑶懸四壁縱橫若機綜狹道劣容人輕飇時自送石磴卧蒼苔如山常不動春草池塘草生覆平池謝老夢非夢千載足神交微風助吟諷黃閣割浮榮退尋幽沼弄手澤奕世傳雲深偃翁仲弄月池青瑶削底裏了無泥土腥秋水清若空瀉竇常泠泠幽人弄明月況值酒初醒寒光竦毛髮梁笱涵三星益清池舂陵有佳嗜芙蓉香益清池上月痕淡池邊人獨行天機眇今古政爾同斯情飛鷗何許來露盤為之傾千里池我聞陶朱公養魚在深池玲瓏繞萬石魚行渠得知積貨致邱山我心淡無為他年費雷雨觀此變化時筠軒集卷三
