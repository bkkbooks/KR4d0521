body:
  text: 筠軒集卷十二元唐元撰辭倚山書院辭倚山書院者程國寶之所葺也國寶先公平生號倚山有嘉遁之志焉先是以枕雲名亭公圖書觴詠于是無何迹與事遷人琴俱逝于國寶葺而大之更榜以先公之號用寄無窮之思君子謂吉國公有後矣同里唐元乃為之辭俾工者絃之以相春秋祀事其辭曰雲蒸蒸而上浮兮公胡為而枕之忽中路而散漫兮弔千古之餘悲山猶倚於杳冥兮欲觀之而愈逺秋月苦而春飈蕩兮但見孱顔與偃蹇何音容其靡靡兮念年華之易晚禪嘉名以締思兮願申之以無倦奠桂酒而椒漿兮延佇乎神之來返後有人其勿替兮撫斯文而悽惋道録雲崖蔣公哀辭并序蔣氏之先出自會稽為歙之始祖曰儼者因官而家焉余生晚不及見衣冠之盛識景明號雲崖於老子法中余食貧嘗客授歙南洪氏家景明遣猶子從學涼風佳日輒命之逰登髙望逺交唱迭和籍是以慰幽憂無聊之思後去一二年逺或四三年過其鄉必扣公之丈室而訪焉每見辱具酒茗香果留一餉極歡而罷既去而涉幽澗並長林必為之凝佇以寄其遐瞻矧公於婦翁聚秀老人締交厚善語及廢興存亡之感為之流涕公於余平生之所謂愈佚悲傷勞悴偃蹇至情所鍾雖德業之異未為不知己也公年八十六而觀化其無愧哉或者序其出處以官汚道是猶鑿其天倪而為真純之纍耶余獨愛其老壽巋然髙卧雄溪之南極三十年教其徒先論孟以明孝弟忠信為主本始及五千言與夫道家藏室之書故其宗門日新月盛晚益市田以膳其徒取其尤歸玄妙示不忘初世之庸夫以町畦自私者相去逺矣余謂雲崖向使不早孤不絶人逃俗亦必能為宿儒嚴矩彠猶幸為黃冠師則吾州之有道而文者實推公首稱其來也雲旋其去也風消吾知浩浩乎於天壤間也故作哀辭以泄吾之悲以遺其徒其辭曰嗟嗟人之生世兮其又何求輘轢宇宙兮八方浮遊走受鞭兮汗服輈衆營一飽兮常包羞孰若斯人兮守故邱左琴右書兮黃庭與儔爰清爰靜兮暑葛冬裘金石仰觀兮滔滔衆流命既長兮譽又垂休人莫怨兮已則何尤蓬弱何鄉兮物表悠悠謂生羽翼兮事實難酬舟有心於壑兮壑無心於舟應盡而盡兮悟浮漚溪風瀟瀟兮猿啾啾蕙帳空兮誰與留宣斯文兮垂千秋墓銘松江府判致仕吕公墓銘惟吕氏逺求世序自師尚父始宋尤盛於蒙正之門今散處於江浙間者皆薑姓所自出也公諱良弼字輔之姓吕氏世為歙縣人蚤從余逰其所恆習方册整齊若手未觸警悟異常兒已而父即世俯習吏業未嘗一日廢學初吏于歙邑郡更治浮橋人曰吕君甫執吏役不苛於民而橋成將遂相如之志矣已而果然會省符徴繭絲絲非土産民憂惶不知所為公奮然請赴省卒用折收泉貨民至今誦之遷廣德廣德於江東為下郡即議修水利通灌溉勸民課桑木以為衣食之源轉嘉興壤沃民富人有賀之曰君自今生理裕矣君曰壤沃則賦重民富則事繁益自慎重衣粗食淡門絶私謁人笑之曰吏役何用是耶竈亭戶視他役彌酷有司秖慿戶籍定差嵗久衰耗公白上官從富戶補充經理田糧東南騷􅏒公主海鹽州文案晝夜不寧幾滿嵗月膳無取於民增田必根故籍宫賦以饒酒課浩大舊富戶名存實空新富者負資求避公力卻之從衆定論富戶包辦公私克濟其理問江浙行省掾史也從省臺官馳驛浙東整治盜賊奏讞平允民得無寃其弭盜方略體究民情幽隱之中猶寓國家寬仁之意丞相首須之廣濟庫失陷腦子諸物管庫𨽻屬皆貧人雖破家鬻妻亦不能償公上言均之賣舶貨家衆藉解免其為浙東帥閫掾史也從阿都拉宣慰抽分畨貨於泉州衆所啖利如飢渴然公獨不為􅏒從馬元帥鎮伏倭船於定海又從仲嘉努鎮倭船於福清立法博易夷夏安之除將仕郎知事寧國檢舉泰定二年以後未申除錢糧虛作實在為數巨萬即日申省銷破免郡計纍和買赴北上供紙號為民害徽為最宣次之舊比最下等估價既不恤民矣况宣非土物轉販者並緣為姦公兩平定價日厯紙先事移文令民預備公私便之有指強盜者以木梯為證出為竊盜有指勒死以詐人者辨其辭異卒遇赦免除從仕郎經厯太平前壓烏臺後臨憲府仕者重足而立公惟知奉憲章而已御史過其境亟稱譽之嵗收田財賦及江西糧五十餘萬積附餘四萬餘石公乃合正糧報省任事者絶私已之望矣嵗徴絲綿令民親執權衡自公立法始司庫者絶弊端矣分司公廨宋酒務故趾有司嵗葺以釣竒為貨議用官錢為定二百勸富室三十餘戶撤而新之自門至寢室几席帷幔無不備完父老刻之石姑孰江左名校田租有力占為世業積逋五千石會尊經閣幾仆公為追逋完葺舊繪從祠嵗久黯滅公創塑像校官刻之石郡財賦額重姦民謾陳荒茀公於未斂穧行令驗實公租無失蘩昌等縣蘆蕩魚陂官豪詭冒公議從工人佃種利及於民府倉海運糧米庾人以髙下手槩量致交擲瓦礫近倉民舍露立公白官長與海道官較斛行槩遂得息爭運糧傭五日一給宿弊一旦頓除公仕官二十年其於荒政尤所留意初吏休邑即勸邑長立義倉九十六所積粟萬斛以備旱暵調歙邑值嵗大歉命主兩鄉斂富人粟七百餘斛以活飢人二千六百口遷廣德行案義倉之虛耗者積粟萬餘斛發建平官粟舊儲二萬餘斛鄉豪黨罷吏竊執其柄惠不及小民即斷遣之浙東帥閫從元帥拜珠公運浙西糧十五萬斛涉海賑飢時萬夫長所領士卒駕哨船蜂午難制公日給糧糒約束不離舟次居人德之在寧國日值飢饉公主施糜粥於僧舍貧民以次受餐戒強暴攘奪廢疾無親屬給食養濟在太平日又值嵗祲建言以官廪附餘糧及海運顧舟羡價若干周之不給申省撥官錢千餘定周之又不給勸率上戶輸米萬餘斛鈔二千餘定繼之凡賑男女小大一十八萬餘口民無轉徙吁活民命者得非陰德耶公早孤刻厲自樹立為人惴惴周慎居官以廉自力家食告匱俸錢常以聚書尊禮賢士劇談竟日無復顧慮後日計以故與同官正直者居率相親附監郡某官貴出戚畹裁成郡政多倚公公亦為之盡力在官時鄉里故人孤貧投謁同案而食解衣以衣之謝去無不滿意垂代無資於篋無田於野亦無少悔憾于懷里之巧宦沈酣貨賄歸市美田宅以自多者其人賢否何如也公既殁大火迫廬烈熖而得自全矣天報善人不誣也曽祖某祖某考某用子恩追封池州青陽縣尹母汪氏追封宜人公自姑孰滿還北上升徴事郎貴池縣尹明年春赴上忽嬰風疾亟請引年授承務郎松江府判致仕妻邱氏封宜人子某女某適周某次適鄭某孫某今為某處倉官次某至元六年五月某甲子殁享年若干葬城南紫陽山之原銘曰孰不為學學既榮身孰不為仕仕優治人孰不為分終以窶貧不曠其施遺愛亦均以疾懸車胡不百齡銘以告哀驗于後昆唐處士墓志銘介翁處士於余伯氏行也元己卯自金陵南軒代還伯氏亦歸自番謂之曰古祭法重宗子家獨幸弟昆各強健嵗時之奠其來助祭乎於是陪盥薦既卒事舉燕寢禮焉公始生三月二日與賤生日同奉觴往返意甚樂也蓋自頃嵗以來弟兄留滯他州歸而皓首龎眉兩門子孫嶄嶄頭角意方來之日未艾也明年公就養于杭嘗賦五言相問勞又明年而訃音至嗚呼吾尚忍銘吾兄之墓哉公姓唐氏諱如介字介之號介翁世居徽州歙縣始祖諱承昈汴京人守官于徽遂家焉至公十一世曽祖某祖考諱昶考諱紹龍三世皆不仕而行義聞鄉里考君研經好古開門授徒簞瓢粗給意晏如也孫鉉蚤頴悟大父愛之手寫毛詩義成帙俟他日課舉子業時時携入城訪姻舊教以事長之理先是水火革命民遭俘掠公與兄純夫扶持二親避難學宫一日卒伍突入欲盡掠之後乃知為儒家免焉公年益茂忍貧苦學授徒村孰生計蕭然或曰吏術時尚也君舍方册而從刀筆可乎自是始探討科條舉口成誦縣有大獄疑讞資君勘治然持心寬厚不忍深刻志竟不干祿公家故貧紫陽書院以公為世儒獲霑廪稍由此伏臘稍裕極力奉親於後母尤篤母亦愛之不啻已産平生儉以足用創置附郭土田經營屋舍修治墳塋培植竹樹嵗率宗族上邱墓以追逺焉鉉既就學從星源雲峯胡先生永嘉山甫薛公皆明師也以故讀書明大義筆劄魁然在諸生右科舉廢格勉從吏役初試于邑公曉之曰汝慎之哉母貽吾憂尋補太平郡吏官事有疑者歸而質之公憂始解以其用父命也公杜門讀書不入公府太守華父賈公聞而敬之遣子就學郡佳山水未嘗不共載以逰常慮俸入之薄托以持齋茹素以堅子所守曰吾不能如陸生遺子以橐中金吾何望汝人為酒食哉其後調番以江東憲府薦章上之行省選充理問令史公又曰行首提封益大理問刑獄之源汝慎之慎之挈孥居杭日引諸孫閲書市肆傷宗周之禾黍詢遺事於故老久之則曰西湖水禍好溺人其來久矣思還故里而未遂至正初元四月一日杭城災鉉時直于省鞫問死囚連逮百餘人案籍山如何暇問及私室所居烈焰四合公則告天曰某僦居家無聚斂不道之財天其憐之有頃風煙退息而所居獨存人以為異公為人周慎不苟言笑於姻族有恩與人交始若淡然無所迎合退而知其言雋永人咸謂公長厚而有謙享年八十至正二年六月晦日忽嬰心腹之疾翌日尚啓親朋書問酬酢如常但不飲食迎醫至則曰不可救矣日晡正衣冠坐于正寢杳然而逝杭人傳以為尸蛻云妻孺人汪氏先公一年生又先公十年死溫淑靜專絲蓄粒聚經理其家如夫之志孝養舅姑姻嫁子女合宜男一人鉉女四人長某適提控案牘楊至餘皆適人早亡孫男五人曽孫男三人將以是年八月庚申祔葬于紫陽山祖塋用治命也孤子鉉自為狀來且曰惟叔父立言必信葬而不得叔父銘是無葬也既受命慟哭重曰處士當早嵗孝謹克家而得為令子中年恂恂居鄉以謙默約敇得為善人晚而極力教子及見其樹立所恨者廪祿不能速及其親持是三者以居世於人道何慊哉雖無圭璋朱紫之貴是亦榮矣乃為之銘銘曰才足用世識臻至理肥遁而居善保終始義方之教庶觀有成仲作銘詩以永厥聲銘蒙齋銘星源存翁鄭公於余為丈人行後三十年始識其孫某以蒙名齋來請銘銘曰乾坤定位屯反為蒙蒙而物稚昏暗未通其蒙伊何下坎上艮山下出泉載清載靜惟泉始出未知所之遇險則止時中自持孰導而前為江為海動焉有括貽兹吝悔吾人之生天賦厥衷心為靈府萬善俱融惻隱無形未見孺子靜存於中性其全體逮夫已形精察無愆童牛壯趾泉逹火然哲人研幾實先養正善保純一終焉作聖曷云果行果以勇言曷云育德育以仁存內外交修毫釐靡失惟仁惟勇作聖梯級彬彬學子朱里之英以蒙名齋先覺是程嗟余晚學往昧童訓庶厲餘勤大義焉竟新井銘奕奕新井渟涵固密度土攸冝中庖匪逖是雅是鑿惟工惟力工積二百測深則石水由地行功自上出程君伯仲天性孝友相國餘波霑濡既久庭無間言溫恭是守汲之大來裕資百口雲仍浚清昭示不朽家藏硯銘豫家藏硯四世矣度僅四寸許橫如度三之一仰平俯窪側視若丸然豫平生無他好服食逰息文字間故常與之俱硯億吾髦吾與硯無相辱也故常稱其質剛理柔溫絶無燥色類有德者吾祖愛之吾父愛之吾又愛之逮吾兒曹保護益謹吁其亦有所遇者夫雖然世有千金産必遺子孫豢奢稔惡視吾硯異矣或一再傳枵不旋踵焉况四世矣是宜銘銘曰迹混瓦礫道何卑兮貴比珠玉豈求知兮惟其自全是以能傳筠軒集卷十二
