body:
  text: 筠軒集别集類四元提要臣等謹案筠軒集十三卷元唐元撰元字長孺歙縣人與洪焱祖俞趙老號新安三俊泰定丁卯以文學授平江路學録再任建德路分水縣教諭以徽州路學教授致仕卒集中朱克用總管詩會序作於至正乙酉自題七十七嵗推而上之生於宋咸淳五年己巳蓋其始終當元盛時故所作多和平溫厚之音極為虞集所推許又嘗著易大義見聞録諸書於經術頗深其議論亦不詭於正特元以鄉校祿終其身未嘗入官臺閣而集中有扈從灤陽清暑四詩玉堂夜直詩及察罕諾爾李陵臺諸詩未喻其故疑嘗從人扈蹕上都有所酬和而傳寫者脫其標題也據朱文選行狀元有敬堂雜著思樂雜著吳門雜著分陽雜著金陵雜著藂稿幾七千篇分為五十卷乃其子桂芳手輯故集中間有桂芳題識此本為程敏政編入唐氏三先生集者僅詩稿八卷文稿五卷則其所佚固不少矣案元史方技傳述元代塑像精妙者為劉元諸人而此集有王才塑工贊稱中州塑工精妙逺甚飛土為像切中繩墨太原王才實超等倫是元時工此藝者尚多亦可以補史所未備云乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀筠軒集原序詩以格髙為第一三百五篇聖人所定不敢以格目之然風雅頌體三比興賦體三一體自有一格觀者當自得之於心自騷人以來至漢蘇李魏曹劉亦無格卑者而豫乃創為格髙卑之論者何也曰此為近世之詩人言之也豫於晉獨推陶彭澤一人格髙足方嵇阮唐惟陳子昂杜子美元次山韓退之栁子厚劉夢得韋應物宋惟歐梅黃陳蘇長翁張文潛而又於其中以四人為格之尤髙者魯直無已上配淵明子美為四也吾州在萬山間詩人不少朱文公早為胡邦衡以詩人薦公配享孔庭人品近孟子不止於詩唐長孺諱元自里中來訪出詩五十四篇始年三十六嵗其所以可人意者格髙也何以謂之格髙近人之學許渾姚合者長孺掃之如粃粳而以陶杜黃陳為師者也藝圃有作所謂小園僅百步者凡十六句似乎擬陶後二首亦然豫為題曰藝圃小集而序之以歸博讀精思而苦於吟進可量哉大德八年甲辰九月二十日同里方回萬里敘元頃自金陵南軒代還寓隱問政山中性資頑鈍凡以遊戲筆墨取重士林者一無能焉惟日翻閲舊書早嵗所未悟者如戶牖搴開遽登堂室急如破竹迎刃而解及為應俗文字每因平旦清明才一觸所思浩浩乎覺其來之易無向來囁嚅艱澀之狀心私竊喜況在金陵時會繼學侍御王公夢臣侍御張公甚加稱引志行晉仲公日承磨裨各賜贈言如拱璧而歸古人所謂閉門造車出門合轍亦一時之竒遇也自已卯至丙戌凡八年得詩文若干今去其大半文得若干詩得若干命生徒繕寫求同志者訂焉削之又削取百十於二三始遂吾志莊生所謂道在稊䆉雖不足熟饜人腹然生意所發或以為可觀非愚之所望也至正丙戌九月望七十八翁唐元自序
