body:
  text: 筠軒集卷七元唐元撰七言律詩海門潮海門東望樹蒼蒼劃見銀濤混𣺌茫萬古月華同進退千山雲影互低昂魚龍失勢移新穴鷗鷺忘機不亂行估客倚篷心膽掉潮平釃酒酹斜陽金輪湧出海門開萬皷聲喧一線來吳越中間分島嶼乾坤上下變風雷幸無鰌舞張旗幟信有胥魂吸酒盃古往今來幾翻覆中天不動拱三台拂郎國獻天馬西戎獻馬大明宫九尺頭昻立朔風身遶黒雲蹄踐雪眼明紫電骨如龍圉人飫豆須三品明月當盧映兩􅎸雉貢越裳周道盛歡歌重見入居庸駿骨西來路幾程涉殘滄海覺身輕一尋向上真非畫萬馬皆瘖不敢鳴玉署詞臣揮賛筆虬髯使者被恩榮可憐漢武窮兵日得似天朝賀太平淵明菊誰錫嘉名配往賢香生髣髴義熈前孤髙莫比閒情賦慘澹如思述酒篇白白黄黄荒圃地風風雨雨晚秋天縱殘不受塵沙汙百卉中間節最堅東作垂白村翁懶出門兒孫活計在田園雷掀地上龍蛇窟雨暗江南桑柘村曉起荷鋤山月白暮歸濯足澗流渾芹芽笋茁供厨饌耕鑿難忘聖代恩三月三日初度八十山翁秃鬂蒼衰殘何計硯田荒眼看稚子頭皆白夣想故人天一方有手尚堪揮酒盞當塲誰敢論文章賜衣一襲君恩重門巷風清拂袖長花朝訪朱元輔不值白版橋邉水帶沙穿深度宻訪君家䋲床棐几門㣲掩野逕山蹊桃始華處士未歸籠有鶴耕夫纔饁樹啼鴉知音不遇空囘首獨立東風幾咄嗟近苦目熱齒疼老去都慿造物兒潘郎何恨鬂成絲身如大樹頻生菌眼似明河詎有脂擬借麻姑搔癢具浪傳淵客泣珠為直須靜黙安靈府驅盡閒愁聽奕棋百年四萬日垂老三十六牙城早空老去寃親情頓減俗間毁譽恐非公長康啖蔗扵形外杜老㸔花似霧中甚笑懲羮憂熱惱氷虀百甕策神功扈從灤陽清暑漢皇移蹕向囘中風伯清塵暑氣空驂乘文儒承顧問獻𤓰父老撫疲癃夷王逺致金駞座宿衞頻分玉韔弓萬嵗千秋奉明主此行逰獵得非熊萬里提封掌握間離宫風露占清寒乗輿纔動關星象御食精調領大官金齒蠻王來獻寳玉堂學士摠彈冠惟應逰豫安中外萬嵗齊呼天可汗令下趨燕早離秦龍城風露正侵人上方寳劔光馳道大駕金根警蹕塵千里桑麻觀樂土三時鼎爼得賢臣善調玉體清凉國聖厯宜過億萬春尚覺尭居古兾方鈎陳太乙暮蒼蒼稍同漢室清凉殿不比南朝石步廊味薦猩唇來島嶼囊盛馬乳挹天漿遥知煇翟承君寵下士何由望末光次韻周彦明纔出城南眼倍明周園讌集客非生漁家結屋通隣好水廟飄香度竹清曳杖毎愁苔逕滑開軒初愛葛衫輕路人偶識先生面怪我媻跚勃窣行築屋南宫牕戸明堦閒一任紫苔生石橋誤覔天台路竹院平吞練帶清林果毎垂簷際重茶烟直繞樹頭輕閬州絶唱今誰繼大似麻源上谷行家園夜坐追思舊日感懐寄洪存心卧㸔天星嘒嘒明還從蘋末覺風生人驚老醜縁多病天錫詩材忌太清建鄴城中千日醉桐江波上一絲輕不如歸老尋姻友明月街頭一字行卧聽秋蟲咽到明驚心髀肉不重生厭吟旅舍烏棲曲幾嘆豪家潁水清先友記中春夣冷貴人頭上雪莖輕倚門望久歸來日又向金門掉臂行次韻學正青山李公齋閣深藏學懶殘時從池影㸔雲還尋花尚有春孤注庇士誰為厦萬間人似雲松髙偃蹇文如霧豹見斕斑忘年幸結同寅好毎愧踈庸頼鑄顔次韻劉時中郎中題垂虹橋二首後除待制初疑蜃氣結穹窿還訝晴虹下飲空影動星辰天拱北勢連湖海日流東祗言履險宜求濟不用需孚已奏功擬效相如題幾字區區駟馬愧雷同岸束黄流訴不平行人朝暮躡長鯨占星已覺天根見不日能驅山骨成萬里途遥催驥足三更潮動聽鼉鳴沙門願力彌精進從此津梁徧海瀛艾㓜清北逰平生父子遷固史人間拘忌隂陽流青山白髮老更好黄河泰華君重逰吳人熟念旅𤨏𤨏范叔自笑寒颼颼圖書東壁委山積儻因文藝資旁搜送于尹之官烏程延祐初科名進士烏程百里新郎官醇如箬酒光照面清似霅水晴生瀾熊吞貉子誰敢過鶴在雞羣人共㸔循資便合上栢府輸盡平生一寸丹次韻許彦昭見貽之什客忩慙息帳浮烟畏暑情懐易惘然歙嶺遥瞻天一角吳門經見柳三眠白頭映雪須盤蓿金盌盛漿只玳筵丁卯集成詩律穏竹林今日識諸賢天平山天平山裏唐朝寺蘋藻重來薦范公夾道松陰常帶暝傍巖池影秖涵空石排甲士雲千竈藤走文蛇地百弓心與義田同不死年年䆉稏舞秋風眠松何年手種吳山阿鐵石作幹枝森羅蟠泥爪甲自菌蠢干霄意態寧婆娑孔明竟是卧龍者安石其柰蒼生何慿誰喚醒出空洞山前萬耦披朝蓑饑馬昻夫郡侯赴池陽紫馬東來有耿光九華秋色對蒼蒼氣涵西極山河秀材壓中州翰墨塲飽腹蓬蓬民有飯中流𣺌𣺌濟逄航循良傳裏無多事勸學劭農徳意長往嵗從容侍次公今年又識大蘇翁傳家龜鶴留清節驚世文章有古風五馬二毛新郡牧九華千仭舊江東遥知沙際迎笳皷旗影翻翻曉日中送牟景陽都事之官帥府浙東𣺌𣺌吳江接蜀波廟廊勲業舊鳴珂一門兄弟身先貴三世文章譽不磨大府賢僚參賛暇元戎小隊笑談多諸公不作臨岐醉奈此朔風吹㡌何龍飛在御仕逢辰潧府俄遷帥府新慷慨要為天下士雍容且作幕中賔文章政事熊魚味野店山橋車馬塵十萬軍民同挾纊梅花角裏亦囘春送李録事正卿歸安仁止善堂成煩董役采芹亭厰舊論文味甘吳郡三年水影共江東一片雲柳媚河津知送客馬嘶官路悵離羣賜金増秩皇恩近歸去萬山吾隱淪過養材村養材源頭桑柘黒息溪渡口烟水昏蠶生羞入懶婦手燕乳不擇貧人門冷官嵗月空得老客路荆棘今消魂三十六䇿歸最好迎人稚子踉蹡奔宿梅堰日斜梅堰散牛羊漸近鄰舟借燭光夾岸長楓渾欲醉持篙小女白如霜幾年湖海催衰鬢半紙功名笑漫郎大小馮君文雋雅相㸔喜色映眉黄十一月一日雨齋作急雨投窓作意鳴昏昏城皷欲初更青燈猶是忘年友黄菊終然不世情床下小蟲工細響風前老鴈恨孤征便應心膽渾如鐵飰顆相逢亦瘦生種花隔嵗學兒嬉又及秋風洒菊枝指甲秃無搔癢具形容衰似别家時雲臺功業年華晚黍谷陽和造化私苜蓿盤空猶健飰霜螯適與麯生期去去重來若隔晨踈窓暗壁漫凝塵獨行荒圃忽佳菊偶值同鄉即懿親縱辦笑談供餉客尚憐幽閴易傷神家山此日開爐飲笑擁孫雛白勝銀再用韻荅顧薦卿驍騰伏櫪待長鳴解織天機日七更客路風埃先得老道人木石本無情履穿何用嘲東郭句好元須繼北征來往脩廊共談笑今宵賸喜月眉生讀子敬龔先生江東小藁詞場詩社老䏻成宿將臨邉號令明盡洗鈆華㸔絶色何煩絲竹聽希聲謝韋向上無圭角濓洛方來以道鳴自古文章分正閠紛紛齊楚孰爭盟宫墻面對閲時流能事髙懸水鏡秋清苦三年嗟刻楮繁華滿目付浮漚坡公門下無多客工部毫端有萬牛倘乞刀圭生羽翼㑹隨雞犬上瀛洲寂寞祠官升斗謀山川黄落未歸舟五更孤枕六旬客二句三年雙淚流醉倒浣花宗武在行吟楚澤屈原愁願因紵縞酬投贈不貴人間萬户侯再用韻謝龔子敬繩削無煩早混成直須平步到泉眀深窺鐵網珊瑚影響徹金蛇霹靂聲傾蓋交情嗟晚合追風意氣羡長鳴問渠大國衣裳㑹蕞爾江黄許乞盟老子圓機傲九流誰將塵滓混清秋談詩直指形神影撫世何心夣電漚愧我智多非老馬輸公硎發失全牛功名未譲麒麟閣賦手先還鸚鵡洲瀛謝奎殘淺近謀居仁首縝宻如盛水不流楓落吳江知鴈過月明巫峽聽猿愁玉堂今夜凉生硯李廣材髙老不侯老竹道中離離官堠蘚㾗生苦為行人管送迎投老年華憎厯換近鄉途路覺身輕危峯壓雪爭寒意疾吹驅雲漏日明想得祭先新釀熟糟床急㵼雨簷聲次韻汪處謙雪中度昱嶺見懐凍合無聲竹下溪蹣跚投宿野橋西人行蜀嶺愁應絶路入仙源意轉迷浪湧鯨鯢連鉅海天輸玉帛出全齊今宵且了還家夣不管楊花撲逺堤長城如畫練横溪歌吹何心戀竹西白首尚違商嶺卧多岐爭奈具茨迷千山雪齊銀屏出一夜氷生玉筯齊稚子忽來推午枕相邀挑菜步前堤歸來未擬泛南溪夣繞𤣥裳已掠西芳草池塘春尚淺殘梅亭榭徑偏迷詩如大國誰雄楚酒似青州直到齊猶憶往來吳㑹熟虹橋飛舞跨長堤二十七日謙父詩來是日僕如獅潭越三日二月初吉用韻奉謝碎月灘前共飲溪泥留指爪逐鴻西歸尋松菊盟猶在舊㸔烟花眼不迷泉竇通時流易滿柳條多處剪教齊墻頭過酒休辭醉草軟如茵襯碧堤剪刀峯凸接獅溪東嚮書齋背日西小飲喜從山鳥勸安禪寧為野狐迷牛磨老樹胡偏動馬嚙枯荄齒易齊乍别市朝謀寓隱閉門擬欲斷橋堤次韻程静齋倚山書院夣斷東南一角天當年宅揆帝圖全安邉充國無居右胙土周公已拜前御賜有來分鑿落威聲或許過燕然詩書遺澤傳三世竒寳于今屬後賢往事傷心杞國天幾家喬木得生全清門鼎鼐流傳日緑野煙花指顧前塵境夣身今往矣秋風兒淚故澘然倚山精舍新題榜剰說青氊奕世賢乃翁仙馭上寥天身贖嗟無計萬全猶見雲横朝枕外空悲月冷夜臺前相門自昔推長白耆舊于今憶浩然更號定知羊棗意孟莊那得並稱賢瀟湘一舸水中天歸訪人琴兩不全成佛未應居謝後爭名寧用愧盧前雲山在望徒紛若絮酒臨風為憮然聞道嗣宗多子姪仲容雖老最為賢今日桃源别有天四時欄檻百花全摇摇翠蓋清風裏采采金英白露前玉樹郎君應俊甚霜髯學究想皤然逰吳適越真堪笑客授如公覺獨賢次韻蔣野巖寄仲山二首兼簡雲巖先輩詡徑聲猷豈勃興公家伯仲摠堪稱人間狡獪嗔三穴年少輕肥笑五陵晚境衣冠宜質朴故園梅菊有交承詩來字字含烟霧報稱應慚錫百朋九十年華撫廢興貞元朝士尚誰稱芝歌自昔悲商老麥飯何從洒漢陵物外仙蹤諧夙好眼前俗子祗羞承林棲未卜重參請玩易空憐龜十朋次韻陳國表秋日登姑蘇臺漭漭重雲鴈影奔慿髙極目水邉村黄池未覺盟言冷宰噽空令主聽昏離黍秋風増感慨斷碑殘日鑒亡存方來楚漢無窮事説與芻蕘亦黯䰟讀書堂上芥為舟夣想乾坤外十洲政爾客氊真得冷猶嗟病骨早知秋有心擊磬寜忘世國表近奉儒司委董石磬無計歸耕却恁愁鴈塔題名何恨晚西家畢竟愧東流國表山長偕諸君逰虎丘屬兒子桂芳卧疾敬用次韻聞道兹逰取友端虎丘山下水雲寛青燈不似少年好白石空歌長夜漫兒病自憐如鶴瘦客氊誰念似氷寒坦途付與安行者未信人間百八盤次韻朱竹齋見寄詩到人憎不直錢吾儕參請幾經年響鳴赤壁江臯鶴清嚥蘇公雪窖氊净洗腥羶歸白社豁開雲霧見青天邇來有口且挂壁梔貌紛紛值售鞭十一月十九日先君子始生寓館薄奠凄然感懐明日馬上作陽生葭管凍㾗交尚憶親容淚濕袍弟姪上堂紛拜跪老翁扶杖醉酕醄天荒地老梅魂冷月黒雲深鴈呌勞客裏情懐元自惡門前風樹併蕭騷四日猶遲月下弦平生此日倍凄然寒梅不死春風面孤子能忘罔極天時果隨宜來肸蠁靈衣髣髴見連蜷忍貧正足光先志但願書燈久逺傳正月七日雪後過鄭村陪祭鄭録事私諡貞白焚副有作雪後溪山盡陸離笋輿伊軋度前陂孟貞曜諡哀終古郭有道碑無愧辭薦􅏕有嚴賔在位含酸豈但哭吾私郢歌不斷凄凉意颯颯隂風動素帷午厨元章餉溪螺菜心妙甚種自園丁始甲芽得從溪女淺含沙針鋒入殻挑深肉椀面横枝帶嫩花翡翠脫翎分𤨏碎淳母到口敢矜誇不隨羊酪同肥雋只許南烹伴蛤鼃九月七日曉牕聞雨有懐白髪蕭蕭奈老何驚㸔木葉下層波百年最恨别離苦九日無端風雨多儕輩舊交登鬼録江湖滿地足漁歌殘生懶作禁門鍵隨分安居養至和前月慿軒望斗牛舉頭鴈影又深秋黄花有幸霑新潤歸燕何心説舊愁甲子雨占禾附耳庚申夜守客搔頭兒曺想理登山具碎月灘頭上釣舟連雨九日乍晴風閣簷聲靳不流尚容老子望清秋千崖萬壑爭新齊黄菊紫萸欺白頭侯喜誰同温水釣山公曽共習池逰卷書危坐思疇昔萬里終慚浩蕩鷗煉師吳定夫孫元京先生外孫元京無嗣勉繼家學山中夜話因贈小詩半世求田未得田老來尚結讀書縁千山濃淡古今畫一水微茫上下天閒侣鳴鳩管晴雨偶隨孤鴈立風烟野山詩客騎鯨去猶喜賢甥續斷弦十月初六日携芹芳入藤坑將營壽藏題詠山石犖确日欲昏天寒人家早閉門昨朝聞虎過西崦一翁抱犢耕前村露華成珠草頭濕月色走汞波中翻篝燈呼酒雖稍急避席欣逢老弟昆百年鼎鼎寓塵寰寒暑相催不暫閒自笑讀書生白髪也思埋骨要青山虎龍深抱泉源鷄犬相聞里社間但勒詩人唐子碣浮生誰脱鬼門關病起雜書荒齋孤坐思凄然齒痛無聊隱几眠病減終朝那廢藥體衰初夏尚裝綿百年誰免夣槐國萬事何須使鬼錢却笑山丹矜節序鮮葩如火噴晴烟單衣未試晚風柔村舍歸來過石頭眼力不勝燈力燄蛙聲偏競雨聲愁聃翁久悟身為幻李廣休嗟老不侯閒客不來心愈静聊將歸思問沙鷗欲落不落山上月思歸末歸菴中人可能快手剸犀兕况欲被髪騎麒麟㝠㝠磨刮詣理窟惺惺警悟存書紳昔豪新懦忽自笑松花作意霑烏巾病中釋懐衰病相尋不用悲花殘葉脱恁天時親朋先死數十輩造物遲留千百詩齒痛雖無食肉相眼明猶辨受辛辭傍人莫作龍鍾㸔百榼開筵把柘枝九日同元亨逰崇福寺懐鄭景尹山長奕夫山中古寺四無隣此日尋幽度澗濵快馬氣驕欺老子閒僧醉熟避逰人一枝菊瘦秋光獨百尺樓髙旅望頻遐想豁然文學掾揮毫題徧練屏春次韻童一清兼簡槐里諸公當年玉殿聽宣麻森栢祠前過客嗟鼎鼐樓臺俱世業林泉詩酒是生涯揩磨文正床床笏愛惜平泉樹樹花幾度思公乘雪棹愚夫終笑戀西家仙源易得是胡麻濟勝何須羡咄嗟義訓惟應傳竇儼物妖真足唾王涯寳箋尚閟宸奎字畫册多描别殿花峙玉森森知敬客江南文獻定誰家懶婦無功治枲麻黔敖餓死恥來嗟少年有志功名㑹投老相依水石涯閒傍青松承露滴愛拈紅葉綴霜花去來横豎皆兒戱莫訪成都賣卜家寄吳郡汪叔志推官三譲名藩古不磨官塘魚米萬艘過新安城裏浮溪𣲖延祐塲中進士科執筆詳刑寛箠楚化民知法避江河是行慣識平生操細酌寒楓葉底波廿載湖山兩見之瓊林炯炯照須眉忍饑正字思亭記投老都官宛水詩隨世功名鞭影動圜扉惻怛草心知吳箋搗就秋溪石閒染雲烟郡閣時文公聞孫仲謙以韋齋故宅為里豪所奪將白之憲府比來山中徴言余適卧疾弗克見敬謝七言荒村卧疾闕知聞有客相尋水石濆筆底難為皇甫湜人間正少孟嘗君酒沽野店頻添水袖拂松梢半惹雲日暮想君投宿地柴門木葉落紛紛維摩示疾寜非疾吏部送窮還得窮身似春蠶初伏日貌如霜葉乍禁風大賢有後昭先徳東魯歸疆待至公今代宛陵宗匠在書成萬一寄飛鴻對雨書示兒曺時與老妻俱大病新起一種霜毛鏡裏分禪窻静對度微曛山妻近喜扶床坐老子新箋斷酒文馬革裹尸無長物祈連象塚慟三軍儻令身後銷遺􅆨未用深悲溟漠君病餘幸脫鬼門關肩聳如山耐曉寒老至萬縁雖是夣愁來一枕正難安多情社燕歸茅舍薄宦鮎魚上竹竿江海鳴舷猶解賦何須苦道誤儒冠湫隘㕓居過白頭五年天假住林邱十分竒事聞喧澗二月東風索敝裘家問頻通煩使鶴罌儲告乏愧耕牛未妨舉案交相賀菽水清懽尚可酬湘竹簾髙映夕曛支頥㸔度北山雲壽徴漫㸃眉間白睡思頻添枕稜紋自斷此生巢飲醉誰能免死鬛封墳羮桮糝芋便衰齒猶笑何山易破葷春來風雨厭經旬簷菌排釘眼底新年過六旬賖死客花寧幾樹待逰人溪流窘束黄牛峽汗汁渾霑白􅏩巾之武自嗟還自笑英雄幾聚北邙塵淳安方良輔惠訪贈龎字韻荒齋夜雨厭浪浪小市俄㸔陸作江踈鬂雙飄憐我老洪鐘萬石待君撞青山擁坐如招隱白雪聞歌别有腔此日掀髯成一笑從知早嵗許敦龎再和龎韻今代提封邁樂浪文華舊説盛吳江晴天虹影中流見山寺鐘聲半夜撞謬倚講帷常靦面強横孤笛不成腔分陽近喜陪詩社能免黔驢陋質龎五用龎韻贈王在中老硯嗔人兀矮窓南隣索茗杓分江五經文字從師讀百尺烟樓待子撞静玩圖書心有法圈存魯薛皷無腔相逢飯顆縁詩瘦莫問將軍骨相龎次韻僉事聶公分水道中名重中州泰華峯胷澆今古覽怱怱坐令列郡銷姦黨猶許諸生立下風垂象盡知宗北極瓣香今幸拜南豐分陽原隰煩絲轡掃却浮雲見碧空分司聶公令賦冬日田家屋外茅茨滿意秋轉頭風色易颼颼暖囘最愛三竿日耕罷方閒十具牛豆筴暴乾髙著架麥畦嫌淺更開溝青樓歌舞新衣換軋軋寒機卒未休三家村裏澹風烟凍合銀床曉汲泉逐兎惟應當臘後教牛須要在春前經霜早菜烹來羙入碓香粳擣出圓桑樹雞飛犬摇尾主家頻索地租錢田家雖苦樂猶真新搆茅簷壓樹身婚嫁關心從賤糴羔豚餞嵗接比隣地爐柮榾烟銷冷籬落梅花暖笑春八十老翁筋力健兒孫俱是太平民說著田家百不憂冬來芋栗已全收日暄披著黄綿襖露地㸔殘白牯牛書學兎園甘苜蓿聲聞野碓代更籌薺花吐出春風面笑我何為滯此留老翁生不識公侯羞殺逢人曲似鈎薄有田園供嵗計莫將名利惱心頭籬懸苦瓠將收種門掩蒼苔逈得秋旋斫松明留客坐瓦盆浮蟻酒初篘經簷日薄映氷清暫息扶犁隴上耕户析差科少官事年豐粔籹作人情草枯可了烏犍飽甕小猶堪白􅑁傾賸對兒孫戒勤儉方今四海不言兵阿翁阿嫗髪如銀喜弄孫雛過近隣酒入豳風偏養老芋藏土窟可延賔誅茅牽補先防雨植柘包纒不待春官府清明公事減桃源那得似堯民村墟煙火抹山灮尚覺頺垣井竈荒寒夜織殘機杼月豐年填滿富家倉葛根縱白難充腹蠒纊徒温不在床貸米浙商貪子本莫教鴻鴈度斜陽過淳安投楊如軒主簿勾稽監税兩勞人官舎如舟近水濵剰賦詩篇掇風景肯將鞭筭費精神笑談喜近文儒地行旅新過道路春猶有趨隅舊文學蒼茫來此問通津題程伯玉盤趣亭盤趣亭中酒一杯葵榴照眼履侵苔林深别有天地濶梅熟毎招風雨來王氏槐庭増黼黻米家書畫壓瓊瑰衰年制飲真成醉相送煩君首重回將之金陵留别彦珍叔固伯善世延楚善諸生小軒向夕一燈紅紙響蠶聲角近功老我聊為俄頃助諸生俱有古人風靈山窓外松千樹采石江頭月一篷黄卷鑚研宜喫𦂳家聲元是宋三公筠軒集卷七
