body:
  text: 筠軒集卷九元唐元撰序朱克用總管詩會序孔子論詩可以羣夫合於衆之謂羣有所為而為之之謂㑹明良之㑹始於虞廷詩歌亦自兹始及觀古之作者或於山水所經羇旅所留一見朋從情之所鍾此唱彼和何啻千萬也至正乙酉正月㑹詩于紫陽書堂自克用朱侯始預盟若干人大篇短章各出所長仍用真率遺規酒行有數詩書謀帥孰謂古然而今不然乎然則觀㑹通以行典禮亦可為講習之一助豈留連光景而已哉叙其事七十七翁唐元也送鄭彦昭侍親歸西江序虞廷用賢有曰敷奏以言明試以功蓋奏言匪文不彰實以開後世詞章取士之原漢世䇿士如晁董諸公存名奏對事尤近古異時風益頽靡糊名搜挾周防百端待士之意浸薄向使不世之豪有如荀卿揚雄莊周屈原輩尚肯低眉俛首於其間哉同里彦昭鄭君吾友稱隱汪先生外孫也其氣有自來其學有自傳早嵗巳負詩聲力窮經術自試久矣秋塲不利於是吟嘯湖山間於意似有不釋然者余告之曰孟氏所謂動心忍性増益其所不能與易言致命遂志皆有始困終亨之義今而省親歸南安於養志之餘深据書巢撥置凡近勇猛精進淬礪舊聞他日一第溷子又何晚哉邇者宣文檢討太樸危公奏制以三朝史事來徽過余其言彦昭材諝常薦名于朝觀光上國有在此不在彼者矣科名一途安足以盡天下士哉趙學正滿還四明序海之為物天下之至鉅也鵬鯤之所變化蛟鰐之所孕育非大莫能容風帆浪舶一瞬千里人生而俶倜寛裕由氣禀勝也復之居四明東海之濵也余平生舊得三人焉初識景尹鄭先生已而識繼道丁君最後得復之趙君三君子皆號能詩所造詣不同車斜競病日倡月和亦既多矣復之君子人也來糾正徽庠棲遲冷齋家無應門之童讀書之暇登山臨水初不知嵗月之我加也迺托麯糵以陶情淵明阮籍之儔匹歟余七十致政而歸君年差先後君強健步趨而余足槃散局促如轅下駒此不及君一君滿引數十余僅霑唇急急謝客此不及君二君將浮逰江海而余粗懸山經水志於屋壁以追思平昔覉棲厯落之勞此不及君三黄鵠一舉寥廓何能少挽其留耶歸見景尹諸君幸一問訊讀余文其念之否耶洪氏端本堂序同里洪元白彦道伯仲榜其燕居之堂曰端本濂溪周子之旨詳矣夫端者正之趨也本者基之立也古者之教自蒙以養正教之端嚴始迨其長也行有戒見於履絇身有戒見於珮環居有戒見於盤盂户牖之間長而益壯必擇端人正士以資磨切而浸灌之其於人之道庻知所往矣如構大厦必壯其柱石如築重臺必固其基址然後可以庇風雨而臨眺望由其本之素立也向非擇其工師之良而定夫䋲墨之正則方圓未周而楹杙之弗審其如本何哉君世居歙南自祖宗以來増光飾美甚矣今伯仲之居斯堂也將以甘旨奉慈親以友愛結同氣以謙抑禮師友顧余老悖何以承君之問而為一得之助耶乃為之説曰舉天下之物則大為本而小其末本不大則易摇為自修之學則以小為本而待大以成焉曰學殖曰治心幾微之所當謹戒者也理明則心正身修而後及人古之人化行於一鄉有守劔而不去者矣况其所施之逺且大乎然則端本澄源之學吾曹之所當講也願與賢伯仲共勉之徽國文公生旦致祭詩序天之生聖賢也不數蓋將以立萬世之法程為人心之大防也是故周庚戌而生孔子宋庚戌而生文公尼丘之禱圩頂輒應與宅井之紫氣上騰一生而榮也山頽木壊與大風拔木洪水崩山一死而哀也孔子之道著於心發於口筆於書而六經成先生足其所未盡羽翼之而傳註出其道同孔子周逰天下僅為侯國司冦先生在朝四十日丐祠補外晏如也其出處又同孟子曰君子之澤五世而斬先聖後賢之澤雖千萬萬世不斬可也今天下學者咸知尊紫陽而父母之邦專祠在焉至正二年壬午九月既望為我徽國文公始生之辰書院率循舊典修舎菜禮初獻則廣信張公景範亞獻則番陽朱公克用終獻則三衢張公仲亨祼薦有臨昭荅靈貺退而燕于明明徳堂醆斚序行酬酢有儀雍雍于于髫冠侍列笑談交作芝蘭芬襲神人懽喜於是新安唐元賦詩以彰盛集明日屬和繼至克用公且命元為引首將刻梓以傳山長史君仲衡溧水人僕紫陽老諸生也是為序送李生序廣平李生如石景修侍其大父别駕公宦逰新安從吾兒逰三載矣今將歸請贈一言余謂玉石待於琢磨大學釋自脩之義偹矣雖然盈天下者石也地之四象則少陽焉髙者懸嵌巖下者集坑谷與其履之卑孰若視之巖巖所以明立志也性剛悍兼柔滑皆得以已疾有夾持相磨礪皆得以成玉工其用於世者所以為才也豫之六二介于石而有不終日之貞吉所以為徳也吁志也才也徳也是人之効法夫石而石亦不知其得於人也然則自修之道莫切於讀書余嘗坐筠軒頗與生講誦聖賢之言生首頷心愜必知世之珠玉不足以為貴膾炙不足以為味苟得其皮毛而未得於真實亦猶未也况别駕公盡捐俸金買書數千卷以歸生其閉閤深居誦之毋勞閲市安有天下之書集之於公之門而不能窺其藩翰者耶生勉之哉異時孝友根於身文懿稱於里閭咸曰生自紫陽而來者耶非前日之阿蒙矣既為字序併以贈行云送江信可隂陽水法序古今論序事文章莫嚴於禹貢史臣其能言哉今觀其山水所治既䟽於九州之下及其導山導水更述首尾于篇末所以一經一緯之也吁禹貢天下大山水圖也惟禹知天下山川之脉絡故功成而書作太史公論隂陽家以為衆忌諱使人拘而多畏恐當衞文徙楚丘周公營洛之時未必如是之屑屑也後世書出多門而俗尚禨鬼因以惑人亦必儒者持中正之説掃鄙俚之論俾孝子慈孫得以輸情近得一人焉曰婺源信可江君自少年脩讀外致意青囊至其講明水法要自胸中洒然異於俗見余謂山水在九州則有九州之脉絡其在郡邑林麓間則有郡邑林麓之脉絡山以静而立為福禍遲水以動而神為福禍速大抵穿削箭射交鎻織結此其訣也信可其同耶否耶余乂聞赤松景純一行季通諸公有書而未之傳固自視缺然也縱不能如陸鴻漸之精到至味亦㮣聞川上之風矣今而後知景韓之授受于信可既曰可矣余其可微一言哉是為序送方廷傑主簿臨川序吾州方氏始以詩經領鄉薦能大其家虛谷史君早嵗頴悟絶人先逹秋厓方公竹坡吕公極口推許迨壯以别院省元冠多士已而入朝為太學博士出守嚴陵學既大成與江湖文章伯名埒上下嘗自賛曰行路萬里讀書萬卷作詩萬篇晚而學易無極太極先天後天其詩宗放翁而造少陵其文其學得鶴山魏氏的傳亦可謂江左豪偉之士矣余壯逰錢塘以詩三十六首投謁史君報之曰子詩以陶杜黄陳為師也其後益自奮厲衰晚不自休冢嗣中全别駕與余交益欵洽若孫若曽孫從吾父子逰今主臨川簿廷傑即其曽孫也將之官請一言以壯其行余讀前史每進閥閱而詘寒畯謂其目熟朝儀而心閑治理也吾嘗見今之仕者性資周慎者疑其遲鈍好為機變者人易側目周慎者循䋲守墨以奉公機變者侵官越公而夸詡君家世傳清白宜知所適矣山木方升秋水將至其勢可參天而使人望洋君其慎之送知事張仲亨序郡古侯國也有寮寀焉有從事焉從事獨稱以賔者所以重其任也故凡徴賦之出入差繇之上下刑獄之重輕案牘之情偽以至興教育䘏寡弱迎上官觴過客得以興利除害者莫不關聽著心惟其設施有序彌縫合冝則衆口翕然譽之曰能職要任重而匪輕較然明甚郡承蠱壊之餘綱紀不振伍符尺籍輒造公庭可否時知事張公自三衢來寔嚴扄鑰洗濯刮磨否既傾矣居有間㑹景範張先生任大府元僚二公皆自進士起家座主門生有不期而㑹之喜㕘賛庻物若前所云云者頼二公拔憸邪之牙距履王道之坦平不亟不徐潜驅黙化有如金石相宣水火相濟用儒之效似非文吏苛察之所能也况知事公力賛前守更新孔子廟非常壯麗又買田土以養多士舉課試以誘英髦此其為政之大者其小者可槩見也余頃嵗引年歸里與公接近隣巷毎相與往來獲親其粹容雅量雍雍于于如在玊山上行使人頓消鄙吝間出其辭藻温潤深厚大類其為人也漸之上九曰鴻漸于逵其羽可用為儀釋者謂其志卓然而用不凡觀象玩辭公其有焉日承公命為序不敢固譲謹書之以居羣言之首洪存心常寧監税序潜夫先生吾郡之望也疇昔以詩書禮樂詔其令子存心洪君君器局整暇㓜學壯施是能世其家者豈尋常任子比哉至元五年夏五月受行省丞相之命監句容常寧税將擇日治行同志之士相與葺詩以贈或疑君枉家學之長而勉為錢穀之任者余曰不然國家之治財猶日用之水火也民非水火不生活猶五穀之養生也人無五穀則飢餒至凡嵗時之上供百司之經費皆繇此出是謂一日而不可缺焉者也古者富藏於民而上無争利然摘山煑海鐵冶𣙜酤盡籠天下之利自前世已然矣龍㫁罔利則有征商之法自孟子以來未之改也然則什一之賦與二十取一之征嵗有常數並行不倍然後財用足而公家緩急無侵牟於細民為國之大計有天下者便之為日久矣此漢儒議罷鹽鐵而卒不可罷也况君駕輕就熟而恢恢有餘地乎孰謂征商無取於詩書禮樂之用乎古人謂禮樂之行無處不有同寅之恊恭與夫賦民之有藝者此其所易見也以儒者之論為迂者非知言者也持是以求儒之通焉者可也比余逰宦金陵去句容三茅近甚余樂逰焉拘職守而不能竟往聞君治所適居三茅山下非君之所獨能往而遺余之所憾者乎君其行哉為余問訊三茅君君必曰汝故人之子來謁我猶汝來焉奚以憾為遂書為送行詩序廣孝啓蒙序天地有初乎曰鴻荒顓蒙之世吾不得而知也生人有初乎曰孝為人道之極吾願有考焉是故舜稱大孝所以開後世事親之源仲尼為經所以求後世事親之實源可浚也實可紀也聖人有望於天下後世何其至也且四海九州上際下蟠蒼蒼無窮其為地廣矣浩浩萬古去者不居來者不徐其為世逺矣斯人寸心温柔懿順豈徒已存實為衆有所謂一人之心千萬人之心也故人道莫大於孝比物連類如芬芳敷暢父母欲之鄉人好之可謂榮也巳尤莫大於不孝如臭穢汚濁父母仇之鄉人惡之可謂辱也已是於一榮一辱之間而壽夭禍福吉㐫隨類而應鬼神旁鍳令人毛髪悚惕可不畏哉同里方君顯忠摭經傳子史之説以為廣孝啓蒙其目有六莫不原於天有契於天序天秩者藹然孝友何莫非天也嗚呼古之人惟任教也防民心於未然後世惟任法也懲民惡於巳然吾觀周官卿大夫黨正之屬以正嵗月朔讀法俾民知所避就世教陵夷毎竢其罪之著暴從而刑之是亦棄其民爾安得是編摹刻盛行家至戸曉古風其有不復而人心其有不淳者乎故余序其所以而世之為孝子順孫者願相與勉之焉送花伯玉赴閩閫序海於天地間最下最鉅物也風濤掀舞一瞬目數千里然人安土定居窺其涯涘蓋寡余往年道經海寧得縱觀焉然亦未能深入其區奥也花君伯玉日從吳中來訪余筠軒因與劇談海漕時事側聞駕萬斛之舟寄一絲之命玩魚龍之幽室接蛟鰐之涎口飛輓積粟逹于神州返棹南還彚詩成集偉哉伯玉之為人也夫負勞勛而受醲賞殆不為過然朝廷甲令之所該僅從閫帥簿書之役然後授之以民社君受焉而無望容將行請言於新安唐元元謂閩海東南大邑凡貨財珠璣犀象之所儲積甲天下况當大盜横行殱夷之餘流離未歸田廬未治雖從事於大府簿書期㑹尤當以勞來還定為急寛征弛禁與民休息此其時也昔人有言曰甯戚毋忘飯牛時管仲無忘射鈎時願君毋忘浮海戒謹時於巳何所不立於人何所不濟君其勉圖之梅庭弊帚詩序吾友潜夫洪公自總角時訂筆硯交居則磨切以近于道出則肆情山水間雖酬酢於盃觴而口未嘗一出傲慢語真樂益友也以故余得自力於困窮而氣不衰者頼公居多一時門人所可見者唯文玉眷兄嗜讀書躭於吟好覈論人物有鑒識大抵詩律尚圓熟吐辭坦然明易無搯胷摧腎之嫌不以鈎章棘句自詭近人宗長吉怪誕綺靡刻畫則過之故優柔之味减正大之情遂失論大家數者少之一日過先姊氏家出梅庭弊帚一編請余以評余謂梅庭自號也弊帚謙辭也家有弊帚享之千金如買馬首以五百金百萬買宅而千萬買隣之類明重輕不相當而意有所屬然則文玉之帚未見其弊弊焉也雖力掃陳腐可也余年四十三以少作三百首印正吾潜夫公以晦菴古今詩分為三等之論復命君今年四十四作詩富矣惜不迨先師一見而猶以語我先師之言在耳顧吾學而未能吾尚何言哉雖然和平冲澹之陶韋盤摺老硬之黄杜上之為漢魏騷雅君既已讀而又復之㑹當庭梅舒英清香細嚥梅耶詩耶久而俱化矣昔賢謂乾坤清氣散入詩脾願分芒芴以振刷摧頽枯瘁之陋文玉起謝曰豈其然哉今宦逰三茅之麓曰存心父者先師佳子也雖從事監税不廢於吟亦君所樂益友兾以吾文寄之吾兒桂芳亦在焉文玉曰可哉績邑石印詩序夫石以形不以氣者也其在地之四象為少陽焉故見於醫經餌之能長生剡為矢鏃堅可以禦侮人見而拜之者不以為狂繇星而隕者不以為異大山長谷之間窮荒逺徼之奥神剜鬼剔千怪萬狀孰可殫紀其能以印彰者惟績邑最大抵符章篆刻所以示信而防民之偽也向使示民之信而終以履信防民之偽而終以無偽此豈俗吏能之哉是石也確而厲亷而方生於油溪寂寞之濵每察夫邑治之得失而為之隱顯焉其顯也軒豁呈露若有以揚之其隱也潜深伏閟若有以抑之謂以形拘而不以氣通者衆人之見也必有造物行乎其間而與之謀者是以上下數百年間始為黄門蘇公出又為正言崔公出為㕘政張公出今為王令君出先後相承協于西都大臣畫一之規吾想四君子臨政有如砥之平聽訟無嘉肺之枉信而無偽與吾民相安相養久矣其出也固冝然非次翁有以啓之則邑民何由而蒙王侯之惠乎自今以往聞侯之風有能興起者則斯石不一出其為惠不既多乎余聞泗濵浮磬昔遭乎都俞之朝大聲泰和之盛此豈特為一邑之祥上繫乎邦家之榮是可歌巳歌曰油溪油溪有石若浮惟令之賢為民之庥油溪有石視賢而出蘇公首之侯其合徳送余志賢序自西方之教興而塔廟盈天下金碧晃耀雖極侈靡人無有議之者由以禍福之説怖於人也視吾夫子之宫墻則荒凉卑隘穿漏夷拔其悍然而不顧者亦獨何心哉竊怪學校進人法屢變而弊愈深近嵗以來於寒畯之士絶不與焉由多資之子弟進則不知謙遜由素習吏文之徒進則多懐險譎由非儒而儒進則遂昧亷隅一署楮尾而私意鴟張危據講席而肆無忌憚何吾道之不古也吾儒大聲疾呼訾謷二氏彼則攻苦食淡以効其勞朝謀夕慮以成其志此則以飄風墮瓦視嵗月幸其滿去而少升於梯級其勢則反出於下而漫不自知吁世豈無特立之士力振其久屈之勢而一旦深思有以奮於其上者謂世無人則公道泯矣今婺源州學正余君志賢魁然一儒者也貌瘠而道腴文多而志確自其居職時則拓其土田飽其徒衆償其宿逋潔其祀事廟學齋垣則煥然以新花木果蓏則植而就列尊耆艾以厚風化行課試以朂俊茂此其學政之大者也余偹貟所至凄冷亦嘗揆力興脩以賤姓名書楣壁間抵金陵以詩謁侍御夣臣先生曰三為老文學士廪絶芬塵夜或夣先聖庻可逃怒嗔然不逮志賢多矣公行矣由州庠而升之郡校必將大有作為俾四方官於學之士有所矜式用儒之效其特立表見如此日讀諸公贈言紀無余美姑掇其大都以歸之因推二氏之勢益張而憫吾道之不振不無望於方來也易氏竹圃序沅湘之水清妙天下而靈均居焉平生滋蘭樹蕙江蘺薜芷皆所紉佩比物連類以芳香自許蓋欲規正於君惜乎懐王之不寤也夫物生異彚而人之所好不可强同易君楚材之良也自其少時侃侃以功名自期殆厭於奔走而退營肥遯乃闢地數百弓從野夫求佳竹若干種久之而雷雨初作迸地銳出笄而植焉掎而角焉雜而立焉參而伍焉縱踈而不曠愈附而弗狎封之以土壌潤之以雨露逮嵗久而林成矣君嘗語人曰太史公取渭川千畆富比封君是以貨視吾竹漢公卿下淇園而塞瓠子是以戕視吾竹毋授長房懼以變化厚誣我也毋捍之以為城剡之以為苛削之以為戈矛懼以不仁用我也皆竹之不幸也必唐之六逸以遂其髙愛如子猷以順其性然後其為天者完而不少屈也復攷圃之義或以種蔬茹或以實果寙或以毓草木蔬果屬饜於口腹而草木就槁於蕪穢惟虛中直外傲睨氷雪以為賢儻以老圃見之訾謷吾甘心焉余家武峯之下手種篔簹二百箇常以與可石刻懸之堂上翠色寒光日相掩映余引年歸老萬念可廢於此君不敢少忘今而得與君交於數千里之外竹而有知必曰幸哉幸哉謹以復吳季實之請而其文歸之易氏云復紫陽莊基序先庚戌而生者孔子也後庚戌而生者子朱子也道統寔有關焉歸魯之侵疆者仲尼也歸紫陽之侵疆者唐侯也功有足紀焉嗟夫天下萬變之機日過乎吾前而吾心自有一定不可移之見以理為之凖則也即事論事則如梔言蠟貌適足以文其姦即理論事則如覆盆之下容光必照今紫陽之荘基是也惟我書堂前代太守思軒韓公創之靖齋魏公繼之靖齋之父鶴山先生與西山真先生號南北兩山皆宗文公之學克承父志故於紫陽特加之意買田刋書惠至渥也佃甲輿臺之役也始而事主擎跽曲拳終而叛主操戈入室春秋書三叛人與夫竊寳玉大弓事雖小大不倫叛主之惡亦無少異宅爾宅田爾田書堂業也今乾没之以為己有天其可欺哉雖犂其庭掃其穴亦不過也昔魯仲連嘗謂人曰所貴於天下之士者為人釋難解紛也平原君欲以千金為壽而仲連却之故有髙世之知術者所以能成不賞之功後世稱誦不已然則昔人所謂天下之士者其在公門矣惟公文足以善化㢘足以厲俗仁足以及物智足以摧姦以是施之百里之間一洗往昔臨民之陋習神鑒其衷有孚盈缶於學田僅一節耳由是以推其餘其允合於人心興墜而起廢者何翅百千也夫砥礪以剸犀兕者其鋒不可犯仰觀羣流者惟金石而為能循良志伸貪夫吐舌其舉甚盛也余老矣幸忝宗盟未諧一識輒為引首以寓賛美之意焉通鑑發明序至正四年冬十月江東憲僉崔公行部首見于廟語諸監郡太守曰尹氏通鑑發明文公之忠臣也其刻梓以詔後學可乎咸曰唯唯越明年梓工竣事命新安唐元為之題辭元竊聞春秋史外傳心之學文定深探其㫖其曰春秋有變例定哀多㣲辭又曰直書其事不待貶絶而惡自見又曰史文如畫筆經文如化工可謂善論聖經矣嗚呼春秋托始乎隱公為平王不能自強於政治也通鑑托始於威烈亦為三家之分晉也綱目追法春秋固先正例然凡例間與書法不侔者用變例也畫筆之變態有限化工之變例無窮也今攷綱目所書多史遷以來不正明其罪有待文公之特筆其定名分正國統重名節黜姦邪凛凛可畏可謂善繼志於仲尼矣雖無傳義名家亦可也愚故曰善觀春秋當攷胡氏之説善觀綱目當攷尹氏之説尹氏其亦善繼志於文公者歟此姑舉其梗槩言之若必曰明褒貶於一字二字之間自有其書在愚何敢贅李簡文序余曩逰金陵偶過太祝周君之廬出示導江先生文一巨帙其文家數浩博亟讀不忍去手人曰志行楊公其門人也然志行文尚竒澁似不相類思欲讀之不可再得廣平李簡文侍其尊翁通守新安日相往來觀其意度閑雅辭吐周慎公庭無接武惟知把玩書策宛然一儒者氣象也問所從逰則曰濟寜尚聖功吾師也聖功學於導江導江學於魯齋魯齋學於仁山仁山學於北山北山則勉齋先生髙弟也紫陽一脉上貫洙泗君其有所受哉尊翁在郡三年杜門却掃自處晏如同僚臨事羣疑滿腹取决於公之一言如車指南如矢破的議者多之公年將致政即拂衣而去歸裝蕭然惟載書滿車而已古稱黄金滿籯不如教子一經公之志也簡文勉旃李氏族譜序天地有初乎曰函三為一是已生民有初乎曰氣化而孩是已由氣化而形禪前乎千萬世其孰知為吾祖耶後乎千萬世其孰知為吾子吾孫耶然其初一本而已知其一本則知吾所自出推之為吾同出可不敬歟吁因生賜姓皆出神明之後晉太康中㑭臣僚共訂家譜而唐貞觀因之前代為重事何後世視之為寥濶耶然盛衰相承如寒暑代謝或由田舎而為公卿或由公卿大夫降為皂𨽻論者以數存焉以自詭天其可欺乎哉世之欲吾子吾孫無窮之傳實自不欺心始不欺心斯不欺天矣此所謂不譜之譜也可譜之譜人所同見不譜之譜吾所獨知甚矣乎心之難養也元㓜讀程文簡家譜言其族出黄墩朱文公亦自黄墩出今李氏亦自黄墩東遷文簡謂黄墩地本惬隘衆不能容特巢賊重巳姓不施殺戮以故衣冠之家多依之非土著也吾祖兄弟三人卜其所遷俱以從田諱徳鵬遷祁門之裏田徳鴻遷浮梁之界田徳鸞遷婺源之嚴田此吾始祖也六世至相三子鵬舉下宅祖也次將上宅祖也紹興初釋褐筠州教授諱炳登進士第尚書都官郎中諱知巳奎晚進士知上元縣諱桃其遷祖所出刑部尚書諱珏冠葢相望代不乏人嵗時序賀填衢塞街或車或徒亹亹文雅斯一時之盛也山泉先生既譜族仲氏又譜之表兄深谷老人書來曰族譜之不講久矣吾惻然以相視如塗人是憂然前修之文􅍥藏尚可攷也用是傭書凡若干本以遍告于同族之人有子孫者則書之粲然如南箕北斗之相向也夫然後知天倫之重則知禮義之所當先葢不譜則親盡易以忘本不辨則傳久而易以庬此老人修族譜之意也雖然為父兄者能以不欺心以培子孫之厚禄為子孫者又能讀詩書以不墜清白之傳是不肖拳拳所仰望也生祖小十貢元諱玘字子器以書經冠鄉試與丞相程訥齋同榜先君子梅癯先生諱虞字常道出繼郡城唐百六登仕後屢領鄉薦登仕版先君子與伯父直軒公諱洪同受薦隱德不仕兩子詵詵表兄諱龍字仲良授祈門縣儒學教諭即深谷也元授徽州路儒學教授第五兒桂芳授建寜路崇安縣儒學教諭姪孫李宗奕海南北道肅政亷訪司掌書仲氏唐煇嘗厯廣東西憲府書吏表兄今年八十二元年七十七俱抱曽孫祖宗福我厚矣深谷為族長命元為引首繼山泉公之文觀者毋以為僣云孔世潜北歸詩序自古帝王名位極乎崇髙而膏澤之被于天下者未嘗不廣且大也然有位必有勢勢盡而膏澤亦盡後有聖人者出無勢無位而其膏澤之施于天下雖更千萬世而無窮其故何也以其道之有在也夫所謂道者三其綱而五其常也三不綱則人倫熄五不常則人心死倫熄而心死國其能治乎嗚呼聖人吾不得而見之矣誦其詩讀其書斯可矣嗚呼聖人吾不得而見之矣得見其子孫論金石絲竹之遺音古經之在壁其尚無恙斯可矣頃以冷官留金陵方引年告歸俄有孔氏聞孫翩翩入精廬即延之坐東向問其字曰世衡十年前來遊曰世潛教授孔顔孟子孫二生隅坐甚恭肅其稱孔氏之家兒者耶出㳂牒則知來江南營製竹籩若干事以歸奉祀孔子曰爼豆之事吾嘗聞之矣軍旅之事未之學也乃今南方用兵小醜猖獗自古文武兼資是為乆長策武科舉則勇智出文科復則忠義興况文事武備聖人已見之行事矣君今北還試以余言質之洙泗諸老焉何如哉送沈晉可序三代之士養於學戰國之士養於客此遊士所由始也通都大邑登髙望逺士之逰多矣有如馬周悠然獨酌於新豐固為偉人然棲遲逆旅授以客枕釋其憂懣亦自咄咄可念余老來正苦行役毎顧影寂寥時一發浩嘆近自金陵歸番陽沈晉可來謁曰某好逰者也將之吳之越而欲觀黄河泰華之大兾即其人之賢以啓沃吾之志意願請一言以行余謂君番人也忠宣之偉節龍溪之詞章雙峰之理學今合三先生之長雖閉戸以求之可也何以逰為君曰昔太白求見荆州願得盈尺之地以吐胸中之竒老泉區區涉蜀道至京師薦其二子豈鄉曲果無其人哉視鉅人元夫之門固有間耳公獨不見夫井底之蛙乎終日跳梁不過尋尺之間及夫背負青天之翼動以六月一息故善用大者不知其小安於小者豈知其大此小大之異也吾之計决矣余乃壯其言而應之曰子行哉行哉不知長安道上猶有昔日所謂餅媪者乎遂相與大笑抗手而别送張廷玉教諭太平序昔明善張先生隱居城東上路以行誼卓冠鄉邦文氣尚深厚削去崖異浮靡一時門人髙弟與其二子咸以禮經領鄉薦郡守知名詣謁禮與鈞聞欲廪于兩學以助不給則卻而不受平生希榮倖寵一不挂念簞瓢樞甕意泊如也詩書之澤再傳而為仲文公公自弱冠從郡博弗齋陳先生㳺先生愛其通敏頗授以劇務時值革命多艱吾道不絶如帶兵卒蹂踐柱礎露立先生夙夜經營興復頼公力居多其後從祀易像以木論堂宏壯完好皆仲文為之其長紫陽也山水暴至蕩為汙淖公批亢擣虛翔材驅石殆若神助為屋百餘楹論者偉之比嵗郡太守嘉議公一日坐明倫堂上諗於衆曰吾欲大新孔子廟惟爾多士其誰可屬籌畫者咸以太平邑教廷玉對君念其世勲負勤銳然有終畆之志廼犯炎暑厯深峻躬督斧斤䋲曳克底成績郡侯濡注尊禮愈至俄而迓吏蹐門矣余竊謂明善先生潜深伏奥無資用世而天錫善類毎加畀于子孫故其父子接迹儒林于吾夫子獨加之意非信道篤而若見聖人于羮墻者則倀倀外慕邀覬福利非俗則佞而為士者羞太平為古宣附庸榱桷棟梁待子久矣由是而施教循規順序宜無難者若間架齊一無少罅漏亦作文法也莊生曰用志不分而凝于神廷玉其能兼收並蓄哉故于其行始終言之筠軒集卷九
