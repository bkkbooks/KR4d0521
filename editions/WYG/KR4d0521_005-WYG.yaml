body:
  text: 筠軒集卷五元唐元撰五言律詩由嚴陵入杭舟行雜書碎日揺江面危檣簇岸隈鷗雛隨浪去蟻子上篷來自得浮溟興慙非作賦才海門知已近潮信一時囘又晚泊富陽縣髙吟倚柁樓乾坤雙眼碧江海一身浮鳥度煙横外帆來天盡頭忽聞隣舫笛旅思不勝秋又雨轉浙東去潮來海口長蛟龍移窟宅賈客亂帆檣險極終須易閒多未省忙勞生迺如此千古幾殘陽重陽前四日餘杭道中村酒難為醉羇懷易得愁雨毛偏著面風葉蚤辭秋夢遶陶公徑寒催季子裘還家慰兒女猶及菊樽浮􅆜川道中竹輿從俯仰山翠自横陳客路偏逢雨溪花尚占春衝泥憐僕子訪舊介樵人出塢風煙豁初看萬瓦鱗午日江賓暘留飲小閣香蒲酒青燈細雨詩交情淡中見節意旅邊知近水蛙鳴亂空山鳥去遲祗應歸思動後夜費相思曉坐露重危秋葉雲輕冪曉池流年供世故白髮誤心期食指多為累生涯政作癡固應忘寵辱亦復斷憂疑又細憶為兒日攤書愛滿床風雲終契闊霜露久凄涼魏瓠徒呺大南箕不簸揚搜拈聊自逸應俗苦相妨曉卧吟癖兼書癖閒居歲月深清心知旦氣病骨覺春隂負米寧干禄披裘不願金曉牕無箇事卧聽一枝禽次兒耆藤坑省族因憶舊遊避亂垂髫日千山導板輿開門當樹色隔澗認隣居未省談宗譜何能讀父書苟全吾所獨同里甚欷歔又避亂垂髫日慈親雪半簪釣魚臨澗水打栗上荒林風木悲清夜寒燈誤苦心吾兒訪耆舊遺迹好重尋偶作貽問疾親友貌改初心在胡為病使然衣寛連垢膩食忌徧腥羶小甕醅初熟髙齋榻未縣肯來同靜夜雨後聽山泉八月十六夜山園小酌月色如晝返念去年今夕與鄉友對月吳山蘭若即故喬相讀書地也賦五言律四首聊述雅懷萬籟沈清夜千門遶舊河雲移吳樹逺月照海門多猿哭仍紅樹蟲吟盡緑莎慿髙懷古地慷慨欲悲歌又秋風吹澤國清夜此凭欄樹影隨江斷盃光接海寒鄉音知聴異旅席覺愁寛好待潮頭起晴空看雪瀾又市逺塵囂隔山寒謦欬清四人月下影獨鶴風中聲僧嬾佛燈暗鼠跳僮睡驚異鄉逢勝集意氣此時傾又今夜山中月清光照酒盃髮明空得雪心在冷如灰縱死能忘學逢時愧不才飜思行役倦招隠意悠哉送鄭國用譯史歸嚴陵四聲同自出吏牘必兼書法不傳蒼頡官曽領象胥霜楓歸興裏冰蘖宦情餘莫怪淹留久亨途奮迅初九日與徐繼元張定甫長兒徐卿登水西蘭若身在千峰頂平城一望賖白雲迷鳥道黄葉滿僧家節意看萸紫年光感鬢華重遊應有約迎眼亂秋花三月一日偕族姪兒輩拜髙眉尖祖墓有作路入青松徑微風拂鬢華孫雛欣得筍老子愧簪花碓響知村近牛歸覺日斜相邀宗子舍有意泛流霞又尋芳何恨晚聚族喜相招隔塢猶聞笑深林忽見樵松楸闗逺念山木寄長謡笙鶴來何處因風得細飄汪村道中林黒初過雨山横半截雲犬牙雙嶂立鴈爪一川分灰舍依寒樹茅茨映夕曛筆耕終不補端愧夏畦耘五月五夜大雨明日水驟入邑雨兼河漢下舟可市㕓間湍急疑揺屋雲昏盡羃山愁銷涼葉舉望極暝鴉還今夜思鄉夢懸知逺度闗宿黄岡留題投宿尋林舍泥深一徑横熏衣燎松火餉客煮藜羮急雨蛙時歇山寒牛夜鳴明朝又行役擁被聴雞聲吳門寄弟清之百粤炎蒸甚三吳澤國深新秋鴻鴈影投老弟兄心對酒山侵座談經竹滿林他年歸里社此樂尚堪尋鹽官觀海怒潮初退後衰草嫩寒時浩蕩浮元氣微茫入島夷帆歸分夕照醝運殷秋鼙自是羇棲者何妨步屧遲又海風吹秃鬢江樹映深盃潮落烏犍卧天清白鳥迴貢輸通萬國象緯印三台極目真無際方隅亦壯哉再用何字韻少寫歸田之味藜床嘗穴坐無寐五更過吟敵秋蟲苦書成柿葉多雨窓原憲飯樵徑買臣歌剔蠧無休日餘生僅幾何嵗晏書懷年光逐飛鳥暝色集栖烏老大常為客蹉跎負壯圖交朋半零落往事幾驚呼湖海收殘夢依然一地爐又巧宦徒欺世多金亦減年不貪元是寶熟睡即真仙已恁巾常墊旁嘲履下穿酒思前日量詩許後人傳又老不趨時好栖遲竹下齋生涯逢宋鷁談笑類齊諧靖節生前祭劉伶醉後埋寃親都悟徹平步到無懷又内弟黄彭叟頭風近稍蘇過門每相覔情話可能無搗藥山疑動抄方筆尚濡椒花催獻壽想不要人扶又目送横塘路時聞竹下風追隨千日醉勃窣兩山翁志合疑無間言清亦屢同可能羣貉子正自羨㝠鴻又君章早年友好在魯靈光足弱憐經嵗扶行始下床佳兒能哭竹舊妾久辭房老淚沾巾罷餘生自笑忙又已遂懸車志鐘鳴行未休旅遊毛褐綻家近臘醅篘臂痛頻纒纊天寒莫倚樓老妻應念我燈火夜窓幽又天寒爾行役建業又宣城一月無安問長宵幾黯情馬周頻對酒梅福舊逃名緩轡青雲路春羮試笋萌又負笈懷明復斷機期樂羊嬌兒知問訊慈父念遊方篁竹猶防盜圩田乏裹糧鵲聲頻報喜嵗晏定還鄉近第五男桂芳自金陵歸喜而有作又向茅山去三年望汝歸流光催舊厯急雪舞征衣北鴈嗔來晚南翁喜莫違家人多釀酒指日扣柴扉又晚嵗違離日他鄉去住心讀翁詩滿壁念母雪盈簪反哺烏飛逺傳書雁影沈一欣消百恨節近不孤斟又進食哀韓信斷機聞樂羊男兒須立志弟子頗成行白塔尋鍾阜清池過景陽山僧應說我醉墨洒長廊嵗晏留别槐里諸公三度金陵客幾年槐里賔支床龜自活祭食鳥相親帳冷梅花月盃踈竹葉春主人分席暖夜話見情真又老増兒女戀每見一歡然寄食應懷愧貪書不曖眠醉抛千日後健比十年前一事天慳吝囊無使鬼錢又旱極陂塘竭城灾瓦礫場天心垂告誡人事覺凄涼廩積渾收秕園蔬半蝕黄依稀殘雪徑晚步不須忙又畏冷常闗户乗閒漫炷香問年遺一老困學愧三長稚子方歸里諸生近擅場子桂芳歸自金陵周生近中科目喜多成折屐不是酒邊狂九日攜長男登譙樓火後青山近風前烏帽斜清溪迴晚棹古木認吾家斷飲萸空紫禁寒菊未花慿虛雲滿袖一一數歸鴉又節令欺人老親朋鳥散餘獨攜靈壽杖誤讀褚公書木落秋容出沙寒雁影初扶行有兒子白髮喜相如次韻朱克用自南征歸饋魚不受閩海收羣盜歸逢雪剪瓊健如窺草鶻飲似吸川鯨賜杖翻成愧嘗羮乃見榮懸魚吾豈敢羊續太無情又君家好兒子目漆貌如瓊霞舉占祥鳳潮生掣巨鯨弓刀騰逸志禮樂紹前榮我亦吟曽稚因知䑛犢情又貌醜如梨凍相逢葭倚瓊餘生成退鷁故友嘆騎鯨虀熟寧無味松孤晚自榮賣文資鶴料豈謂絶人情次韻程以文黄山星橋末章屬仲安今日題橋者燕山耐朔風寄書逢驛使問路介樵翁村酒添泉白林曛晒屋紅浮邱不可見笙鶴度崆峒又悠悠俯雲影浩浩吹天風解珮此溪女負苓何處翁焙出茶芽紫义來魚眼紅山家慣延客何必羨崆峒又一入桃源路茅茨異土風山前采桑女山下祝雞翁池沸丹砂紫柸香豆粥紅蔡家兄弟老書寄自崆峒又屢讀虞卿記髙懷激懦風歸疆榮魯史興學慕文翁種秫樽常緑看花頰尚紅藏書侔秘府知道鄙崆峒又聞道麻源谷遺民尚古風路逢傾蓋客人訝被裘翁柱石中流白汀花隔岸紅名山三十六何處認崆峒題江伯玉雪舟皓雪滿天地衝寒在此行檝枝揺太重蓬箬聴還輕黄葦投爐濕遥山隔岸迎𤣥真有幽致妙嵗不求名又泛宅清溪上香醪不外求滿篷堆載玉萬石似停鷗急洒侵鄰舫斜飛上柁樓斯人輕世味有志慕羊裘又刺船敦夙好非醉亦非狂影亂錦袍客寒侵黄帽郎魚來吞栁絮鷺下立銀床畫手兼詩筆風流屬二唐又此士非漁父無人拜浪婆船頭輸玉帛水面覆銀河細認玲瓏樹遥聞欵乃歌婦翁同把釣醉後舞傞傞郡監識公涖任三年僕未嘗造其廬嵗晚滿秩以詩謁之手執拙句不離手第五兒桂芳多承品裁報國丹心在終更覺白頭名登循吏傳官是富民侯野寺朝朝雨甘棠樹樹秋三年雖報政尚冀冦公留次韻黄竹隠兼簡張允元桃是𤣥都觀人居海上山升堂兩童侍坐石一生閒要𦕈遊仙詠幾微夢覺闗兼參仍細悟應見古風還三月望經張明善墓下作尋春何恨晚却值雨紛紛鳥度雲將暝牛歸徑自分愁生墳上草醉掃壁間文丁令猶來往山前獨鶴聞又農務因時動山容過雨鮮澗清宜犢飲桑緑未蠶眠客醉依山閣樵喧上瀨船行防泥匝磴路轉得平田三月初二日連雨有作并簡丁繼道照磨桂薪憂竈婢蘆絮擁鳶吟勢急疑天漏愁生抵海深巷窮無過客杯覆乏孤斟一事知翁喜閩南遞好音又聞道青溪宅濤生地欲浮溟濛憂立鶴浩蕩快輕鷗牕暗難臨字天寒怯倚樓何時乾后土老子欲春遊克用公過余約詩㑹再用韻詩法如何在篇章忌躁浮雪牕麾野馬雲岸立沙鷗重挽千鈞弩雄夸百尺樓相期拾瑶草李杜是真遊又洛下書生詠山頭飯顆吟成章金愈煉汲古綆宜深布穀催農種提壺勸客斟連床不相覔微物有知音九日陳梅溪諸詩友環碧亭分韵峯字澗字清遊酬節意古洞剖雲封菊冷含青蕊池深印碧峰探幽窮狹徑望逺倚長松預想還家路山重隠暮鐘又驅車鷺前征入谷鳥頻喚如何轉崖腰蹄泉注窪澗黄花戒亂摘使我盃泛泛移樽坐平蕪洒屋斜暉爛古劍寶匣深藏閟神光射斗牛潛驚妖鬼膽曽斬佞臣頭水火虛磨淬雄雌遂怨仇直饒銷蝕盡尚可作鋤耰又吹吷鋒難觸磨鐔彩尚存斬蛟新遺血躍冶舊遊魂獄市金精化將軍玉具恩時平無所用念爾拂塵昏郭外訪梅石磴從横路春風冷淡枝問樵疑不答見月轉相思野店泉添酒山家雪擁籬玉人愁耿立未許凍蜂知遼東告飢民有易子而食者朝廷惻念發粟十萬海運濟之二月二十五日風大作感而有賦吳城風折樹海運最愁人坐湧三山浪全輸二百囷廟堂憂旰食川后縮威神盡捄遼東命乾坤本至仁又風伯方馮怒重隂羃古城髙空無鳥過平陸少人行海道懸危命遼氓解急烹願言天與力蛟鰐自波平吳庠九日小集青山學正謙父教諭莊子正酒散有懷草草酬時序瀟瀟怯鬢華盃浮那待菊客散倍思家霜栁池光靜風廊帽影斜無山供望眼獨立數歸鴉至日書懷寄廣州清之弟節近心彌愴年侵病易攻思親猶洒淚搔髮久成翁旅思炎涼外人情拜跪中中孚觀卦始吾道可能窮又令弟炎州隔書來慰陸沈寸心懸萬里丸藥抵千金逺鵠翔雲表鳴鴞集泮林思歸仍嵗晚夢遶練江潯送孟宗鎮主簿㑹稽婉孌闗雎詠聰明戚里孫蓬萊空淺水燈火自清門簿領頭將白儒冠道更尊東行探禹穴詞氣藹孤騫又佐邑方嚴駕承家早象賢衣冠逸少㑹富貴買臣年手把勾稽筆春囘坐客氊應思桐瀨水照影只依然送青山李公學正歸姑孰儒官三十載壽相七旬人慣鼓談經舌休嗟墮甑塵庸流憎直氣吾道恁長貧陶令歸來晚松花㸃葛巾又出山元自早歸老未妨遲模楷須前輩勲庸付令兒客氊空得暖僧壁賸留詩絶倒期他日青山酒一巵姑蘇歸舟行雜詠吳郡三春夢徽山半月程年隨衰髩白心與暮江清衣敝偏饒蝨吟豪欲拔鯨子陵臺下過慚愧一篷輕又祗道還家樂翻成逆旅驚卜程防戍卒亂眼畏潮生憶弟淚含雨懷人心劇旌依稀記殘夢漁唱起三更又篙工相爾汝客路識艱難夜氣侵燈短灘聲逼枕寒衣冠從野製螺蚌入朝槃泝瀨經三百惟應引恨端又吾郡揚之水濫觴為淛江灘崩饒雪浪石狠撼船牕瀧吏詩難繼吕梁心半降鹽商撾晚鼓賴爾酒盈缸又水暴魚無市泥生燕有家朝羮供苦茹鄰舫餉新茶雲破懸厓屋波揺側澗花羇愁聊自釋柰此髩邊華又犬牙徽睦郡風俗舊知醇桑樹髙於屋樵蘇每見人荆釵慚越女源谷尚秦民漸喜鄉音似聴來殊未真又山色無中有灘聲抑更揚村童來賣蕨溪女自梯桑野曠牛眠草風暄蝶度檣豪吟撼鄰舫老蚌弄珠光日徯交代徐君璧未至平生徐孺子下榻久相迎坐見三秋老能消幾日程雨窓聲未了河水緑初生白鷺沖烟去新詩此處成又畫船虹貫月茶竈火生風解纜星橋北瞻雲震澤東寒楓揺隔岸鮮鯽出連筒日日占烏鵲燈花幾誤紅次亡弟清之壁間韻鴻鴈吹行斷蒼顔恨莫同官身炎海外旅櫬夕陽中已謂詩瓢失誰將酒榼空摧頽遲暮意松柏度悲風十六夜過長安堰下堰舟如箭行橋馬似龍已無燈照寐猶有月流空菌蠢躭吟頸迂疎學古胷殘年少風雪正爾慰途窮觀書老不於人競躭書尚作癡掇皮非肯綮捕影祗支離頭癢占隂潤燈殘迫睡期趨庭無少日立雪想移時輓吳南峰二首兼憶雪窓眷丈清之亡弟論交常恨晚語别輒思君醖藉胸中史吁嗟地下文夢寒霜樹葉吟斷石潭雲解橐披遺墨銅彞旋炷熏又南翁隣雪叟棣萼早聨輝忽作青山去真同白首歸野猿催淚落沙鳥傍人稀憶弟渾悽斷慿軒對夕霏野望葉脫通林影溪迴束洑流人情逢歉嵗野望怯深秋淮甸兒行役村墟客滯留陶公方止酒何以答清愁竹㑹寺竹向何年㑹閒僧幾白頭龍從長房化人負謫仙遊髙閣平吞野孤亭俯枕流往來頻下馬松語一山秋又殿古旛幢黒門臨杉檜髙飯僧頻洗鉢諷唄誤聞潮山逼衣常潤溪清檝欲操牛羊爭逕晚緩䇿却尋橋又道人不嗜酒隨意坐僧房愛石頻敲杖看碑獨遶廊塵勞三世械圓覺一爐香莫遣寒山笑金聲在孔堂任公寺任公曽此釣勝迹寄浮圖尚憶桃花米何慚竹使符溪聲還似舊草色幾囘枯清譽流今古唯應激懦夫嵗晚思歸莫怪還家晚生涯比漏巵青蠅㸃圭玉衆女疾娥眉淮甸兒歸日山妻病起時荒年猶有酒不敢問醇醨又躭書深入夜怯酒淺為杯疾稍除無妄天應養不才驥牛能共皁瓦釡漫鳴雷說與池梅影花看兩度開送程仲本再入東廣長樂縣循州寄父節卿龍岡六千里將子共南征縣小胥徒減官閒獄訟清居人無結韈佩劍更趍耕盡說新來宰鄉亭謝送迎又略說炎州事從來氣候偏土風嫌質子畜鶩代耘田百貨無商賈三家亦市㕓教兒勤筆硯有口肯言錢十五夜溪上觀社公燈後二夜觀汪王燈㑹豐城寶氣化九土正歸唐武德風雲盡越封春草長迎神三獻曲遺愛一爐香燭影隨流水簫聲度短牆九月二十一夜燭下獨坐偶讀所為先公家傳凄然感懷荏苒更新化蕭騷愧白頭中宵千嶂雨孤館一燈秋養氣言從寡思親淚忽流孫雛苦痁疾覔睡擁黄紬蒼頭初得小犬稚犬從何得蒼頭買近鄰畏寒初離母學吠稍驚人警盜期猶逺分餐喚易頻因知推艮象併感諫獒臣筆秃戲作齋閤無佳筆將何較豕魚生前髯主簿老去秃中書湘管光華始金墉退黜餘苦心終不朽遺迹漬裙裾十一月十九日先君子梅臞先生始生客齋小奠父蚤憐兒慧兒今念父慈音容頻夢見心緒許誰知四世緦功盛餘生風樹悲客窓陳奠酒老淚易交頤又四十年前夢如今一泫然情鍾假山記哀盡蓼莪篇老雁摧炎海嬌兒别楚天杳無音問至水澤又成堅寄題江元直林亭擬訪山中宅先敲竹下門日光浮栁眼春意擁花根猿鳥驚生客詩書覺後昆多君五色筆借我掃苔痕九月二日送夏叔通山長宿洛口寄沈仁甫地勝仍東洛蕪平放牧洲溪流天目水人送郭仙舟急雨連床夜微風古桂秋東陽詩共瘦漫刺未堪投二十九日仲文教授生旦炳竹山淇澳迎年永椒盤獻頌新逺乗千嶂雪來預一堂春晚嵗朋儕少清交義味醇我筠公是竹貞操兩宜人又白髮隨年健青衫向晚披雪寒堅竹節春近粲梅枝藍尾長生酒苕川錫類詩使來分鶴俸宴㑹喜追隨訪鄭元章伯仲薄宦淹分水挑包返舊林春風千嶂雨賔主十年心動喜看連璧知音拂古琴鶴鳴透寥泬薺長滿牆隂又春光濃似酒野潤步偏輕犬迓非生客溪流祗舊聲笑看塵榻字話極嵗寒情明日又行色離觴莫厭傾舟行五言律支港飛泉白疎篷漏日紅尚餘隂嶺雪偏值打頭風亂眼迎梅栁荒村過梓桐髙居誰氏子行役笑怱怱又舟小能容客山多不計層荒村雙港水古廟上元燈旅瑣鄉音接年侵酒量増如何今夜月同照髮鬅鬙又草草酬新嵗征衫勿厭勞灘迎疑雨勢舟順快鴻毛晚覺漁燈動晴占霜月髙棹歌嫌鄙俚默誦楚人騷又舟行惟數日去鳥亦忘歸路暗樵夫出天寒漁者稀隔江晴樹逺向日落梅飛且了還家願征塵又染衣又過棹村墟異當春服色新但知逢節日元是别家人簫鼓叢祠晚牛羊野水濵客中仍送客此處最傷神又苦憶白眉老迴橈一見之市聲不到處門静立移時小出尋柴步幽懷許鶴知題詩徧脩竹聊以識吾私又千古桐君宅仙蹤不可追山虚答人語邑近怪帆遲牽路穿苔磴漁家隠竹籬日髙猶未飯吟苦笑吾癡又又過桐廬縣明朝即是家江城衙鼔動野店酒帘斜山逺深含霧舟行淺帶沙黌宫冰漸泮春近迸芹芽自新安江而下舟行亂石中篙工最苦畧說舟師苦東西似轉蓬篙前猿挂樹帆底鳥呼風貫索尋牽路沖波礙釣筒千勞償一飽終愧守家翁又詰曲疑無路中通一罅波灘長如受敵石狠似降魔篙誤親相詈飯餘兒共歌置身鼇背上險盡鬢増皤道經果願寺抵周覽塘回途留題溪淺晴沙露秋髙緑樹殷未瞻黄面老先過玉屏山引望鄉關逺無心物態閒魯連觀小節却笑髩毛斑又黄栗連山樹青蔬並舍池垣頽穿繫豕冬暖發春枝柴戸趍朝販漁家過午炊鴻泥聊寄迹草草不言詩客窓奉懷孟威趙總管歌戍文公里言還君子營束書行李重飲水宦情輕愛石連雲買移花作洞成諸郎駢玉峙快誦鼔琴聲又筮仕年雖早遊方職轉卑思家慿夢往攬鏡覺顔衰斷酒朝増飯抄書手任胝迴橈嚴子瀨嵗晏以為期寄吕輔之經厯鄭子美鄭元章飄泊東遊者于今髩盡皤欲知窮學究莫是病維摩舊物烏皮几新愁白石歌所欽煩念我書札問如何題邵氏深秀菴我來不見深秀菴中仙但能朗誦深秀菴中句江湖多少作詩人透紙喧然操鼓吹想公來往蓬瀛深化為蔚秀之瓊林嘘陽吸隂入無際朝與鶴飛夜猿吟千金良方出海藏聲名彷彿倉公上平生一寸濟物心嵗晚佳兒甘㫖養諸孫頭角競嶄然廩有餘粟地流泉先生雖去典刑在詞林繼和東臯篇又珊瑚掣海底翡翠映蘭苕澹薄天機隠清明物象超瑯琊分左服天目發中條遐想千年鶴歸來䕶藥苗留别潘公明交代方良輔友兄小市張燈夜幽齋待月時歸心泉赴壑客路鳥黏黐不寐窺梅冷清談喜漏遲尚憐傾蓋晚後夜費相思又老不趍時好三年兀客窓歌成慚畫一韻勝喜無雙别意浮寒樹歸程泝練江相看揮寶唾能使寸心降元夕作詩謀歸新安客裏逢元夜臨觴氣倍増風迴仍急管巷僻亦疎燈畦菜留孤注篇詩當百朋往來何所有歸作住家僧舟中雜書七首末篇奉寄夏大之龐公不入府入府又何如縱有屠龍技誰飛薦鶚書病多翻惡酒髮短不禁梳賸喜生還日桑榆且定居又芳年初筮仕投老尚無氊曲誤周郎聴鞭輸祖逖先錢神招百諾傳癖負三遷畢竟歸來好相看一囅然又浙江篷裏客世載貌清腴孰計青雲路空摩白雪鬚鬛封悲後進楊閏昧前途得失常相補臨風一嘯呼又蠶食臨毫紙風生唾有珠朋儕殘宿草時好盡吹竽白日思甘寢衰年誤信書明當上丘墓麥飯洒盤盂又箇箇孫排竹山妻髮櫛銀百年能幾有屢夕夢成真蟫白書新理鵝黄栁未勻老名更鎖住重養鴿兒馴又入郭猶清曉烟光鬱未開廟脩興衆役巷塞曳雄材叱咤騎生馬凄迷溺死灰迅雷方到耳髙卧子陵臺又蹭蹬青霄翮斯人坐警曹海雲蒸筆硯朔雪滿弓刀德化收儒効威風伏土豪思君不可見倚柂讀離騷奉和王知事宛陵詩韻一雙白鳥度輕烟萬玉揺光似渭川馳驛歸來脩禊飲風流不減永和年驛亭見樹濃還淡山店沽醪濁更清乳水翩翩橋下影分明人在鏡中行又宛水寒流白徽山曙色清鳴鳩相應和逺樹半隂晴客路春兼晚年光髩未明髙吟追謝朓歸夢過宣平王伯循僉事詩卷臨軒親䇿士攬轡此詳刑西極來天驥南州見使星繡衣持白簡寶匣出青萍惡類成葅醢空留草木醒次韻望靈山作迴杓傾北拱浴日接東浮天半長含雨松深不見秋𤣥㝠標鉅鎮白首負清遊馬上頻瞻望數聲黄栗留筠軒集卷五
