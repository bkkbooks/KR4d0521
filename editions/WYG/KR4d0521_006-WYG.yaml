body:
  text: 筠軒集卷六元唐元撰七言律詩送俞伯初遊錢塘水國霜風吹弊裘暮雲烟樹使人愁一尊自勸猶孤影兩地為家更逺遊俗士每深鄉土戀是行寧獨稻粱謀袖攜明月煩加護湖海逢人莫暗投爛醉翻思秋月朗清狂迭和短歌行百年豈少新知樂此日難忘欲别情薄飯未能支衆口固窮真足見平生西遊倘見劉師魯十載相望闕寄聲千里驅馳一諾同殘年敘别意怱怱賦詩定說俞清老驚坐知逢陳孟公湖水清泠招秀句樓臺髙下看春風人生只合錢塘住為報山靈吾亦東次韻𢎞齋曹先生春初書事擢第經今四十年當筵誰復唱真元前朝尚有衣冠士後學同宗禮義門緑野耕殘牛引犢青松種後鶴生孫絳人甲子何勞記木養靈根水浚源擢第經今四十年苦心馴熟不加鞭日遲簾幙人思睡花到蕪菁春減權閒共門生釣温水亦攜隣曲詠斜川不須捫蝨談當世閒對爐熏意澹然擢第經今四十年平生不辦俗間縁霜莖蕭颯三千丈錦瑟凄涼五十絃晚節畏名如畏疾閒居忘我併忘天槎頭著釣殊多事却笑襄陽孟浩然送杜希聖檢校江西省孺子亭前秋草長驂鸞此日快翺翔龍泉合避文章燄雙井能供齒頰香偉甚竹林青眼士居然薇省白頭郎臺端壽俊真知己憲使盧公早晚牽聫上玉堂八月二十八日與同舍游紫陽道館時孫次臯偶自休寧來預席為賦細菊含英漸次黄賞心樂事早重陽樽罍下引清溪緑笑語平分老樹涼天近神仙騰綘節地偏猿鶴䕶丹房白雲截斷塵凡路去馬來牛一任忙千仞岡頭日破晴松杉委翠下簷楹不須半嶺聞清嘯但覺當塲有善鳴甓社珠寒明月並鍾山鷹出衆雛驚夜長旅席為詩惱坐對秋花只自評次韻趙鵬飛照磨行春微雲䕶日午風輕獨木橋西小作程野蝶喜隨藜杖去樹鶯貪看酒盃行山園此日尋花意鄉國深春上塚情麥穗桑枝闗政事歸來好語報專城清明日病起不能出漸喜勿藥尚憶兒時矜節物插花臨水弄扁舟題詩多愛白塔寺把酒還尋芳草洲零落舊交時鳥散蹉跎急景大江流年過四十愁兼病始悟人生萬事浮病來勢似百川東病退俄收汗馬功人笑聳肩同老鶴天留小技學雕蟲黄金謬作千年調白髮誰登百嵗翁甚悟此生宜任運花殘又付北窓風送山甫薛教諭宋公能識薛公賢千里相攜過練川詩律熟於霜後果宦情清似樹頭蟬揮盃勸影身常客挾䇿從師骨盡仙馬塢荷香留不住臨平山下藕如船廣文盛則軒屢示近作深切起敬奉呈句不驚人心不休味從諫果苦邊求家藏古貨真難賣袖有明珠豈暗投天馬蹄翻西極道寒蟬聲切暮雲秋鄧林渇死終無補肯乞醍醐一滴不孟史君壽旦遊黄山同舍邀作淳衡湖居士癸丑十月十六日紫陽權學菊花開後到梅香嵗嵗黄堂酹月光心逺每思林壑美政成不在簿書忙玉簫吹徹洞雲白竹杖行吟徑葉黄想見巖扉題醉字山猿起舞鶴翺翔壽盛則軒象翁台州人本郡稅務提領先為考試官有詩文集熱官宜異老槃阿廨屋如舟柰冷何星斗夜垂文氣老竹松春瘦古心多天台雁蕩鍾竒絶龜息熊經養至和兩度花屏分壽席梅邊老子剰婆娑梅魂幾樹吹香過斷橋為渠吟苦髩蕭蕭村荒更送凄涼笛月冷誰歌大小招堂上目成勞逺夢水邊玉立見髙標遺珠解佩精靈在千古春風恨未消再賦微風淡月滿林臯縞袂盈盈韻更超飛燕耐寒元不粟鮫人傍水即成綃似無還有幽香閟乍見仍猜瘦影揺誰為空山弔岑寂清泉薦罷讀離騷次韻徐府推遊福田院觀羅漢畫像詩豪今代五言城行扣松闗誤晦㝠荒寺曲通樵徑白逺山斜界麥畦青能文舊說紅蓮幕占象新沈貫索星遊衍何妨先問俗和鸞振響路人聴暫出提河過五城千年畫手未沈㝠神龍玩戲雲常黒天女飛來髮最青露牯眼中瞻佛日野狐禪裏認妖星拈槌豎拂難尋妙玉振金聲著細聴次韻黄志齋劉平洲蔡志同遊問政山秋晚霜遲木葉鮮屏為千嶂繡為川雲間笙鶴來何日洞裏烟霞别有天盛席每孤青鳥使髙談應到赤烏年絶憐三笑成圖畫句裏工夫剰學仙次韻蔡志同春雨阻遊書窟光隂冉冉過案頭鐵硯尚堪磨盡看千樹杏桃去柰此五更風雨何著燕畫梁泥爛熟拈笙玉笋凍頻呵先生不出情無用危坐長吟憶老坡送歐陽仙尉之官臨湘郡幕初逢玉樹郎還看鳴鳳向朝陽諸儒待上三千牘四海同尊六一堂鸂䳵灘頭新御史岳陽樓上舊文章君山莽蒼浮天際㑹醉佳人錦瑟傍次韻胡敬存兼簡定宇陳先生柴桑歸去是邪非懷寶終嫌始願違天上誰分水蒼佩林間自愛芰荷衣耆年並駕雙曈碧吾道扶顛一髮微想得相過共談笑儘留風月坐重闈九日與汪謙父晚登烏聊山節意蕭然易得愁烏聊晚望且悠悠百年駒過人將老九日山寒菊未秋雲入楚天兄弟隔波横黟練古今浮舊遊何在論心少沽酒同君向市樓次韻徐府推遊問政三耳丹房占碧峰南州髙士躡仙蹤懸林小狖頻窺果絶壁行人半隠松石塚苔深愁立馬瑶壇雲黒呪驅龍蔡家兄弟希來使露裛傳書易剥封次韻黄志齋早春殘梅飛盡又經旬池栁揺風自在春料理窮愁中酒聖品題紅紫問花神金錢素鄙清流士鐡硯翻磨白髮人賸欲挽衣隨李廣南山射虎不辭頻送友桂文德二朱丈歸婺源星渚源頭宰木春浮雲蒼狗暗傷神思亭記在數百字族譜引中初一身趙璧可完充子志魯疆能復賴侯仁考亭地下應含笑今日雲來有若人送劉伯善遷憲史籍甚梅山藹世芳僦居猶喜接鄰牆單傳天禄詩書譜來仕文公父母鄉恩滿花屏歌豈弟名髙柏府快翺翔要看入幕新風采行李無多面帶霜鸂鶒灘頭兆豈虚梅花驛路雨晴初緑林久喜無藏盜烏府今聞有薦書鐵面冰霜籌畫畔錦腸風月嘯歌餘紫陽山下雲泉響後夜相思蝶夢蘧送汪謙父教諭長洲孝節堂中一掬泉斯文端的有家傳氊寒百里專師席語妙千人聴法筵今日彈琴調雅韻明年射䇿快先鞭白頭亦擬東游計目送晴江書畫船髙郵巨擘客宣城我友潛夫舊結盟近日謝詩傳好手當年魯泮淑諸生似聞𤓰戍希來使頗為蓴香惱宦情如此吳中二三老刺漫何得倦逢迎屬龔子敬千里遊吳今又歸山中春近蕨芽肥侯芭最擅諸生業萊子空懸五色衣搗玉冰溪聊待價追風天馬可容鞿曽邀弄檝荷雲浦不待清秋鴈影飛方千里早從先子授業寄陳定宇胡敬存二先生五色鸞凰肯自驚暮年木石了無情海濵猶喜有大老魯國可能無兩生承露盤中餐玉屑煮茶爐畔聴瓶笙眼前駿骨人希識他日圖形費逺征十六夜夢中得句云夢裏麾貧氣亦雄足成五十六字應俗無方拙更慵僅從編簡䇿新功偶然得句喜欲舞夢裏麾貧氣亦雄稚子身長衣漸短寒梅花小意無窮莊生齊物應難喻且向陶情酒一中送胡貴卿北還公子辭親勇著鞭簡書那許嵗時遷春風桃李江南路大府衣冠冀北天刀筆定應培盛業詩書猶喜惜芳年馬周老去慚門客倘值金臺一薦賢甚笑書林日課勤荒齋邂逅挹清芬謝家子弟温如玉帝里人材望若雲勿謂親庭嗟逺役應從相府䇿竒勲紆朱曳紫年華富天馬騰驤定出羣夜賦有懷洪潛夫眷兄種竹門闌冷若冰於人無愛亦無憎百千事過隨春夢五十年來有髪僧稚犬勿驅從傍火飛蛾欲救急吹燈品量文字成孤笑忽憶平生耐久朋二月二十六日清明苦雨不出薄相天公未肯晴空令佳節負遊情鳴鳩占樹如相答乳燕分泥了不爭貧擬賣文那自給老思治圃尚慵耕竹萌供筯聊摩腹喜聴孫雛學語聲客身頑懶雲粘岫世味倉皇鳥遡風早達有人登鬼録深居笑我坐詩窮佳辰得霽如逢赦老境無心酷似童幸有一樽齊物論壯懷傾倒雨聲中送方千里教諭貴溪龍虎天髙役萬神鵞湖宗㫖認畦畛青山有意迎來客白鹿遺規淑後人伊軋笋輿穿石徑飛揚栁絮亂江津窮經得用何嫌晚老馬追風尚絶塵四月二日欲遊翠眉亭以雨阻不果呈邑中士友翠眉不是畫眉嫵石鏡正嗤明鏡臺夢想清遊過半世天將竒事付深盃風風雨雨殘春色擾擾膠膠走路埃急掃濃雲推朗照肯教游子首空回乳水源分河漢津只今人物數荀陳千家古邑雲中樹一㸃飛花道上春稍厭光隂留過客直愁風雨濕吟身鳴蛙鼔吹宫牆近聊學新豐獨酌人再用韻宿邑校作甕牖真成臨水樹春風徧作雨花臺雄豪空負詩千首磊磈誰澆酒百盃髙樹鸛鳴知積雨荒齋鼠迹驗深埃苔封堦户人來少搔首長廊去又囘人間何處問通津過眼風花迹易陳多恨尚嫌鳩喚雨相親元是草生春未償文字三千櫝肯負乾坤七尺身且喜客牕紅燭燄鼕鼕街鼓未眠人五用韻謝喻真卿惠詩團團朝日蓿盤開不減當年致饋臺器重黄流金作裏文成繁露玉為杯蠅頭細字矜明目麈尾清風掃俗埃追及漢庭詞翰手賡歌樂府上之囘讀君七字喜津津盡洗從前句法陳挺甚儒宗新甫柏悠哉道味舞雩春誰云白髮今垂領政待青雲足致身梁顥年華今尚少當場休讓一鳴人贈戴訓導師初先生幼子剡源已化遼天鶴驥子今非同隊魚對客每談先友記挑燈盡讀故家書舞雩春服朋來後校藝秋場百戰餘千載風流吾欲繼過門莫待雪盈裾松友石山長承寄示近作報以七言四章併呈明經山主及南軒胡公識君猶晚别君難幾向秦淮共笑懽剰擣香粳供學子每騎瘦馬謁臺官香芸曽閱藏書庋細栁應尋拜將壇信有人家金石友書來五嶺暮雲端鍾美亭詩擲筆成千言翻水座人驚黄埃白髮方歸客明月清風幾動情縞帶尚能留破篋青山渾不記初程因君寄贈思前夢四屋雞號雜雨聲雲翁揮麈冠蓋集安國養士庖㕑香福田祗為孔孟種易藴盡發程朱光駿奔孝孫酒灌地焄蒿盛氣神歸鄉白駒空谷仰前哲有客來自春風堂南華老人别三載萬栁營外春風遲清秋强勝謝祝噎道貌常春無凍梨詩牋毛氏紙為貴坐有孟公人所師煩過精廬憐逺客滿山黄葉菊離披十一月十九日先君子始生兼懷亡弟清之寒猿聲急雨啾啾簾掣尖風射弊裘畏老嗟卑心已死思親憶弟淚交流紅塵人海歸何晚皓首山林意未休薦罷清樽燈燼冷翩翩飛夢遶松楸湖海飄零迹易陳去年今日倍傷神甥孫扶拜衣垂地木主開函手拂塵稍願顯揚淹禄仕空餘衰謝哭蒼旻逢梅便覺心如割忍看山橋破蘂新次韻稱隠州判方慙絳帳共春秋世外空聞大九州對酒方能麾老氣挑燈殊不盡羇愁相尋剡曲今安道早謁蘇門舊少游天地全人似公幾六旬未老宦情休沙卜珠萬户南征凱旋萬國車書極盛時誰令小醜犯王師兔狐何啻營三窟鼎鑊難逃命一絲勇共鐵鎗稱健將功成銅柱震南夷彤庭異數榮雙節上宰分庸鏤列彞次韻志齋總管酬克用總管壯嵗論交向士林巷南巷北愛長吟照殘夜月雙蓬髩吹老春風一寸心並砌蘭芽迎日暖臨階竹影映波深代間罕見詩書帥正用靈源著意斟正月初五夜大雪詰旦起視筠軒玉立百箇真偉觀也午後東隣小酌七十衰翁舊布袍慿軒坐嘯氣猶豪陽囘大地三層上雪積虛簷一尺髙半夜栖鷄先喔喔荒郊去雁正嗸嗸顔公米帖從誰貸且共隣家醉濁醪次韻黄彭叟與江子厚飲于髙亭門外誰呼祈孔賔此生信不羨平津慿髙幾見蒼山老撫物何嗟白髮新草向春融青滿眼梅因風度笑隨人保安堂上踉蹌走天假同躋七十春四月二十三夜夢中賦梅得前聫因足成八句塵纓不用濯滄浪每到花開倚樹旁有宇宙來惟此白從風月裏見清香裂皮禿幹藏生意淺澗寒塘拭淡粧一夜夢身輕似蝶吟殘牕隙漏朝陽江賔暘以詩來報以七言過我翩翩盧照隣持來五色筆花春少陵對月丹心苦蘇武還家白髮新舊汨塵沙無逺韻方來天地有閒人靘粧蘭澤髙難嫓鄰女空悲欲效顰先君子諱日將至客思凄然投老思親意轉悲報親無路托文辭青編加䕶周官學墨本方鐫有道碑籩豆馨香魚菽祭緦功先後雁行隨嵗闌未遂還家願一酌清泉手自持近寓花屏得觀仲明真人樓觀飛空之盛仙子藏身在玉壺飛甍百柱出雲孤行空風雨神明㑹真本蓬萊島嶼圖松菌竹萌留客飯芝田术塢貰官租真成孔老通家好不待君王賜鑑湖白雲當户草沿階静極方知太古懷澗水每從嵌竇出山禽時聴話言佳樓臺地勝供春望笋蕨㕑香趁早齋自許殘齡聊屏迹籜冠藜杖曳棕鞋三耳仙人駕白龍九霄寥泬去無蹤丹房幾見滋新蘚老鶴歸來認故松蜃氣樓臺滄海轉天香草木碧雲封遊人醉舞下山去斜照依依送暮鐘比來多病承文玉以二律問安枕上失記嚴韻用昔賢和意例以謝少失師承晚自强青燈老屋漏寒光文成敢謂如山積筆禿何堪作塚藏正色無媒空老大羇懷所至易凄涼篇章湔祓胡來我重爇平生知見香雅好山棲棲在山雨聲爭送籜聲殘衰年百病如期至非意三彭忽我干巳恁爬搔勞指爪何愁賡載鏤心肝老奴勃窣頻來往一路松岡幾屈盤平生法喜不同衾頗學熊經更舞禽正自寡言為暖藥常思穏坐罷長吟洗頭玉女盆難遇搔癢麻姑爪得尋我昔瓠肥星嘒嘒小兒造物苦來侵發塚何曽到紙衾生擒勁骨似霜禽閒為洛下諸生詠半是天涯游子吟竹洞有門身習隠桃源無路世難尋病餘閣束春秋傳老硯從渠碧蘚侵復叔剷地仙一再入藤原為余卜壽藏也異時得大書新安詩人唐長孺之墓君與力焉賦此以謝冷宦歸來一事無簞瓢粗足免嗟吁縱同彭祖終須死預計菟裘理豈誣步屧履霜寒巳勁支筇上嶺氣難蘇多君盡發山川秘為我親傳壽域圖神仙蛻骨逃螻蟻憂樂無心問髑髏舉世賢愚皆夢幻孤生牢落負箕裘青燈未了三千牘白髮驚踰七十秋有子應門孫擁膝虛舟隨浪恁沈浮把筆題詩閱嵗年安貧那用歎迍邅平生未辦求田計老去應無埋骨錢酒味要求杯杓外泉聲只在枕屏邊胸無芥蔕吞雲夢此意逢人莫浪傳方外有懷徐方舟用韻兼寄種樹墳前鳥欲巢年光暗逐海門潮哀除近報都無恙服禫應憐不自聊酒興可容陶令止詩魂須待楚人招手抄祭禮方成誦月冷烏啼共一宵小鏡贈送國寶先生承再索儒字韻懶贈佳人贈世儒從他粉面笑吾迂揩磨巧匠饒餘力鼓鑄神明想暗扶揚子江心明水貝秦王宫裏望舒圖知公掃盡巫山夢只許飛鸞弄影孤元窮鄉晚進學不如人近為同里羅夫人作行述上千名筆於大人君子之門使人囘誤蒙伯生學士盛加稱許俾賈鐸之微音獲厠黄鍾大吕之側餘生欣幸敬葺俚語上答知遇倘沐不賜鄙夷得褒貶二字垂教尤為荷幸仰幾鑒亮軒冕辭榮逺世紛真成一飯不忘君緑隂靜對西清客玉殿頻揮大拜文威鳳九苞塵外物蓬萊五色望中雲歸休洛社談風月猶為羊欣寫練裙一代文章屬大賢賞音何望到林泉尊翁作傳非吾事投老虚名只浪傳疏氏餘金猶餉客蘇門下士敢齊肩仲宣雅有登樓賦擬泛西江十丈船玉座從容侍帝躬格心事業樂融融多聞上下三千嵗大冊翺翔六一翁甚愧雕蟲攻小技遥瞻鴻鵠駕髙風倘因授簡垂褒貶不恨窮鄉兩鬢蓬寄夏大之教授并述識其先公放翁之意君家父子文章伯振鐸西江易巳東指畫馬前憐賈島安舒床上識龐公聞風早覺興廉懦流俗何能論介通衣帶水間難㑹面暮雲回首送歸鴻題鄭子美師山精舍師崗有待閟脩容恥構人間媚佛宫十里溪光浮席上千年道脈寓山中巖呀徑遶栽松竹飯白㕑香剪韭葱邑子多賢資木石遄看講麈動清風中秋夕隂翳更餘皓彩爛然鼓絃侍飲呈程國寶一枝隨分寄林邱夢冷當年上庾樓老矣嫦娥卧仙闕凄其杜子憶鄜州遲遲皓彩生庭樹續續清歡較酒籌堅坐何妨親醉貌頻分茗椀亦風流八月八社日仲實自崇安歸省二親次日赴杭試九月初六日歸初九同到槐里請賦劉梅隠武夷山水墨圖武夷山上虎頭畫九曲溪邊牛尾歌仙掌􅏒時雲浩𣺌丹梯躡處石陂陀數聲鐵笛樵人聴百丈仙橋羽客過小隠堂詩守家法清晨扣齒事𤣥科恨不相逢捋白鬚人間果見列仙儒詩兼摩詰有聲盡道在希夷太極圖梅底讀書成大隠洞前滌筆施靈符幔亭世逺誰為主縹緲先生宅一區神禹棊分大九州武夷曲曲氣涵秋何山不是金鼇戴有水咸通銀漢流素練遽看朝霧濕苦心潜與化工謀願求一本懸吾室夢到沙頭上小舟再題武夷山水墨圖路入微茫九曲溪仙家吐綬養朝鷄雲移隂壑招難至樹戰秋風望轉迷水墨圖中闗氣象琅玕石上認鐫題桃源自是衣冠古不識邊隅振鼓鼙碧削千崖萬水通輕舟泛泛幾漁翁懸知天帝有息壤故遣神人此御風术圃芝田開谷口金鷄玉犬隠雲中道人一笑捐囊粟畫手從他奪化工武夷真君上天去梅隠山翁今地仙呼來畫史自盤礴盡掃溪山入太𤣥平林逺樹雲作机飛泉淺瀨琴彈絃扁舟著我亦不惡蓬瀛萬里求無縁傳墅遥遥畫始分至今毫素吐餘芬光浮佛國難消雪逺接巫山欲斷雲别浦漁歸舟不繫平沙秋晚雁成羣從知吾父經行熟對客吟詩酒半曛江和叔近以詩十首見寄屬和者再三乃賦七言一章兼簡賔暘二老城東古縣白雲層邂逅諸郎問寢興洛下書生前日事襄陽耆舊幾人登竹松開徑資三益父子觀書共一燈生幸同年各强健㑹心誰識在家僧士則廣文自試院監謄録回奉寄七言三朝儒碩虞太史再世交遊胡伯泉書畫船行今楚水波瀾亭在舊徽川贈言已見膠投漆語别俄驚筈離絃堪笑疎慵叨裁品詩成未得雁奴傳羅夫人輓章五世尚書飫舊聞公家郢鄂總能文不増米價黄承事淨洗鉛華鮑少君女嫁男婚循禮典藥爐經卷了晨曛雙魂一笑蓬萊頂應話髙門再造勲次韻允中雨後遥山翠欲流東風尚覺冷颼颼生來聚鐵能無錯客裏慿欄易得愁詭遇久知慚嬖乗滑稽殊亦陋旃優吉祥止止安吾分莫向人前借箸籌五月十一日余病左腰胯間凡二十日纔復舊白紵裁衫短帽涼頻將疎髩弄池光鳴禽不畏朝風雨老樹曽經古雪霜晚嵗為文才易盡清香縈几意何長列夤占象真無妄病起今晨喜據床星源汪氏快閣兼寄曉窓吾表姪曉窓父初軒公先人甥也涪翁快閣天下勝又見龍溪幾世孫笑指闌干人老大共銜盃酒月黄昏山中草木多靈異溪上雲烟互吐吞祖德不磨金石耐代間甍棟幾家存節推之後曉翁在快閣秋來得醉吟老去誰憐俱病足書來猶喜共論心鏡中霜雪千莖白夢裏烟雲五嶺深四世姻盟俱有子藏書終不愧籯金過昌平不恨功名晚未收斜陽古道亂蟬秋細泉出澗文成蹙逺岫當闗翠欲流雁塔題名新進士牛羊徧野古并州青銅四百堪呼酒一洗征衫萬斛愁洪贊道中提封𣺌𣺌舊秦周鳥度闗河欲盡頭六月火雲天不雨一軒風露客思愁心源浩蕩翻文海眼底浮誇笑蜃樓晁董登朝催對䇿新豐酒好莫淹留察罕諾爾白海何年疏鑿近王城中有龍嘘白浪生童孺慣曽觀鹵簿鑾和從此謁承明汪洋靜照千官影砰湃遥􅇽萬嵗聲尚想先皇開國日諸賢附翼定章程李陵臺懷古煌煌青史後人看矮屋挑燈客夜殘取女巳膺王爵貴歸朝寧望漢恩寛直憐國士家聲落誰念征人血淚寒勇奮功名嗟不遂從容就死古稱難二月十四日承郡幕丁公繼道迂訪不肖留問政山中報謝七言湖海衰殘一禿翁邇來持硯向琳宫雖無却疾三年艾猶有應門五尺童跨鶴仙人留客醉雨花天女笑床空堦苔喜印先生履溪館歸來夕照紅送危檢討學士兼寄程光道御史清禁衣冠侍玉宸丁寧天語耳邊真三朝國史編年法萬里風埃遊子身宇宙不磨先節槩死生難忘是君臣退之不作誰堪繼回首千年迹未陳送耿純仁攝教明經書院精舍髙居考渚湄山田秋熟黍離離論材酷似牢之舅攝教新迎泮水師翠壁雲横微雨後青天雁叫早寒時掃除傳注明經術香火縁深百世祠先人舊友兩山翁安國名郎建校宫齋鼓鳴時㕑有飯談鋒交處麈生風村墟地盡寒溪碧錦繡林開夕照紅空谷馬嘶驚野老衣冠來自大江東次韻克用朱總管四首時官賜金服乾坤俛仰不貲身腹要藏書筆有神古樹為門初亞雪寒虀翻甕未迴春賡歌來自千夫長命服重頒一介臣餳賣膠牙盤簇菜老夫著此㑹親隣四海誰非大患身癡兒抵死媚錢神殘陽挂樹何嫌晚細草沿堦自得春對酒强為霜葉貌著書免謂布衣臣浮舟湔拂分泉井早嵗虛翁接近鄰嵗晏有懷洪存心張文玉第五兒桂芳客閩南家問言旋喜而有作再用前韻故人有子專征稅逺使將詩􅏒鬼神萱草庭闈滋白髮天涯霜雪迫青春書燈不負箕裘業鞭算難嘲聚斂臣家釀將篘催祀嵗殺牛何必問東隣老夫有子閩南客逺道身安勞百神未辦輿臺供甑㸑應隨袍笏賀王春朝聞鵲報斑衣喜夜宿猿驚草莽臣不比羌村醪味薄菜絲雞􅌜餉姻鄰溪聲溪聲萬古流不去付與幽人自在吟細可入絃翻雅調猛如過雨撼空林魚遊近渚眠難熟猿叫空山響易沈七里灘前更澎湃幾人能洗利名心擬吳體黄牛三峽厭朝暮瀼溪歸愛清漣漪非宫非商調自古兼風兼雨常如斯浣紗小女足屢滑角力篙師聲更悲武夷山前棹歌發頭白老父思吾兒神仙變幻事已古桃杏妖嬈春正遲樓髙自可摘星斗句好何用求毛皮暖融迸地笋滿尺坐久煮茶藤一枝參同契好不易讀鄒訢談笑真吾師聴琴髙歌一曲拂梁塵盡愛淫哇狎坐人洗耳尚憐敲羯鼓知音誰解識陽春九霄吟鳳凄清夜萬壑飛泉浩蕩晨自笑陶公大疎懶朱絃不具樂天真星源黄克讓乞詩因寄子厚縣宰南山千仞子真隠明月一章雙井黄至今草木助姿態況復金薤聞琳琅風流方朔喜玩世官譜越人傳禁方州縣勞賢頭未白㑹當嘘送升巖廊三耳仙人生羽翼洞中丹竈猶依然蒼頭放鶴碧霄上好客扣户茅堂前有來快語近𤓰葛誤聴此老能詩篇朱門叔父為别久論心曽到赤烏年玉堂夜直門懸鈴索静無譁分草詞頭日易斜夜月光生青玉案春風吹老紫薇花吏共鴝眼南來硯宣賜龍團上焙茶遥想宵衣勤聖治丁丁漏下鼓頻撾筠軒集卷六
